ly first **3 doses** in the ED/inpatient acute phase (GINA 2024).\n- Guideline Must Know: Systemic corticosteroids should be given **within the first hour** for severe exacerbations; expect clinical improvement over hours, not minutes; usual adult course **5–7 days** without taper if short course and stable (GINA 2024; NHLBI/NAEPP 2020 Focused Updates).\n- Guideline Must Know: **IV magnesium sulfate 2 g** is recommended for **severe** exacerbations with poor initial response (e.g., **PEF/FEV₁ <25–30%** predicted or persistent severe symptoms) as an adjunct, not a replacement for bronchodilators/steroids (GINA 2024).\n- Guideline Must Know: **Rising PaCO₂**, or a “normal” PaCO₂ in a patient who is still working hard, suggests ventilatory failure and is an ICU-level warning; obtain ABG/VBG if mental status changes, fatigue, or uncertain ventilation (GINA 2024).\n- Guideline Must Know: Avoid routine antibiotics unless there is evidence of bacterial infection (fever with focal consolidation, purulent sputum with radiographic pneumonia); asthma flares are commonly viral or inflammatory (GINA 2024).\n- Guideline Must Know: Discharge planning after stabilization should include controller optimization and inhaler technique; for adults, ICS-containing therapy is foundational and SABA-only strategies are generally discouraged for ongoing management (GINA 2024; NHLBI/NAEPP 2020).\n- Practical titration targets: aim for visibly reduced work of breathing, ability to speak in full sentences, improving aeration, decreasing accessory muscle use, and oxygen stability; if you can measure, target **PEF/FEV₁ >60%** predicted/personal best before stepping down intensity (GINA 2024).\n- What must happen now (sequence): oxygen if hypoxemic → SABA (repeated/continuous) + ipratropium for severe → systemic steroids → consider magnesium → reassess response; if inadequate response or red flags, escalate to ICU and consider NIV trial only with close monitoring and immediate intubation readiness.\n- Pitfalls that hurt patients overnight: underdosing bronchodilators; delaying steroids; mistaking “quiet chest” for improvement; giving sedatives/opioids for “anxiety” when the real problem is air hunger; missing triggers like nonselective beta-blockers, NSAIDs, or vaping exposure.\n- ICU/call early: persistent tachypnea and accessory muscle use after **1–2 hours** of aggressive therapy, need for continuous neb beyond initial stabilization, worsening hypoxemia despite oxygen, inability to protect airway, or any sign of fatigue/altered mentation; coordinate with respiratory therapy for continuous neb setup and monitoring.\n- Adjuncts and what not to do: IM epinephrine is for suspected anaphylaxis or when inhaled therapy cannot be delivered effectively; avoid mucolytics and routine chest physiotherapy; ketamine can be considered for induction if intubating (bronchodilatory), but intubation itself is high risk—optimize medical therapy and call experienced airway support early.\n- Ventilation principles if intubated: avoid dynamic hyperinflation—use low respiratory rate, allow prolonged expiratory time, permissive hypercapnia if hemodynamically tolerated, and monitor for hypotension/barotrauma; watch for auto-PEEP and treat hypotension with fluids/pressors as needed rather than increasing minute ventilation.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Persistent or worsening respiratory distress after **1–2 hours** of aggressive therapy (continuous SABA + steroids ± magnesium) or **PEF/FEV₁ <40%** predicted with poor trajectory.\n- Any evidence of impending ventilatory failure: **altered mental status**, exhaustion, **rising PaCO₂**, **silent chest**, or inability to speak more than 1–2 words.\n- Escalating oxygen/ventilatory support: need for **FiO₂ ≥0.40** to maintain **SpO₂ ≥93%**, consideration of NIV, or inability to tolerate/coordinate inhaled therapy.\n- Hemodynamic instability or complications: hypotension, arrhythmia, suspected pneumothorax/barotrauma, severe lactic acidosis or hyperkalemia from high-dose beta-agonists needing close monitoring.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Albuterol nebulizer (intermittent or continuous) — {2.5–5 mg q20 min x3 then q1–2 h PRN OR continuous 10–15 mg/h; titrate to work of breathing and aeration}\n- Order: Ipratropium nebulizer — {0.5 mg q20 min x3 for severe exacerbation}\n- Order: Systemic corticosteroid — {prednisone 40–60 mg PO daily OR methylprednisolone 60–125 mg IV once then 40–60 mg IV q6–12 h; convert to PO when improving}\n- Order: Magnesium sulfate IV — {2 g IV over 20 min if severe/poor response; monitor BP and reflexes}\n- Order: Monitoring and respiratory support — {continuous pulse oximetry; oxygen to SpO₂ ≥93%; peak flow q2–4 h if able; ABG/VBG if fatigue/AMS; respiratory therapy evaluation}\n\n## ABIM Style Question 1\n### Stem\nA 38-year-old woman with asthma is admitted overnight for an acute exacerbation. She has received three back-to-back nebulized albuterol treatments and ipratropium, and she was given methylprednisolone IV 1 hour ago. She remains in severe distress, speaking in single words, RR 32/min, HR 124/min, and SpO₂ 93% on 4 L/min nasal cannula. She has diffuse wheezing with poor air movement. Peak expiratory flow is 25% of predicted. Which of the following is the best next step?\n### Options\nA. Administer azithromycin for presumed infectious bronchitis  \nB. Administer magnesium sulfate 2 g IV over 20 minutes  \nC. Start oral theophylline for bronchodilation  \nD. Give morphine for dyspnea relief  \nE. Discontinue ipratropium and switch to levalbuterol only  \n### Correct answer\nB\n### Rationale\nFor severe asthma exacerbation with poor response and **PEF ~25%** predicted, **IV magnesium sulfate 2 g** is an evidence-based adjunct that can improve airflow and reduce hospitalization when added to inhaled bronchodilators and systemic steroids (GINA 2024). Antibiotics are not indicated without bacterial infection, and opioids can worsen ventilation; theophylline is not recommended acutely due to limited benefit and toxicity risk.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 55-year-old man with asthma is treated overnight with continuous nebulized albuterol and systemic corticosteroids. Two hours later, the bedside nurse notes he is “less wheezy” but now appears drowsy and diaphoretic. Vitals: T 36.8°C, HR 118/min, BP 146/88 mmHg, RR 10/min with shallow breaths, SpO₂ 92% on 6 L/min. On exam, breath sounds are markedly diminished bilaterally. An arterial blood gas shows pH 7.28, PaCO₂ 58 mmHg, PaO₂ 72 mmHg. Which of the following is the best next step?\n### Options\nA. Reassure the team that reduced wheezing indicates improvement and continue current therapy  \nB. Administer a benzodiazepine to reduce anxiety and improve synchrony with nebulizers  \nC. Escalate to ICU and prepare for endotracheal intubation with a low-rate, long-expiratory-time strategy  \nD. Stop albuterol because tachycardia is worsening and switch to inhaled corticosteroid only  \nE. Start empiric ceftriaxone and azithromycin for occult pneumonia  \n### Correct answer\nC\n### Rationale\nThe pitfall is mistaking a “quiet chest” for improvement: drowsiness with **rising PaCO₂** and diminished breath sounds indicates impending ventilatory failure requiring ICU-level airway management (GINA 2024). Intubation should prioritize avoiding dynamic hyperinflation (low rate, long expiratory time), and sedatives without airway control can precipitate arrest.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: In a severe asthma exacerbation, what does a “normal” PaCO₂ suggest? A: It may indicate impending ventilatory failure if the patient remains in marked distress, because PaCO₂ should be low from hyperventilation early in severe attacks.\n- Q: What is the typical adult dose of IV magnesium sulfate used as an adjunct in severe asthma exacerbation? A: **2 g IV over 20 minutes**.\n- Q: When are antibiotics indicated in an asthma exacerbation? A: Only when there is evidence of bacterial infection such as radiographic pneumonia or another clear bacterial source.\n- Q: What bedside finding is a major red flag for imminent respiratory failure in asthma? A: **Silent chest** or markedly diminished breath sounds with fatigue/altered mental status.\n\n## Guidelines & Key References (3–5 bullets)\n- Global Initiative for Asthma (GINA). Global Strategy for Asthma Management and Prevention. 2024. https://ginasthma.org/gina-reports/\n- National Heart, Lung, and Blood Institute (NHLBI). 2020 Focused Updates to the Asthma Management Guidelines (NAEPP). 2020. https://www.nhlbi.nih.gov/health-topics/asthma-management-guidelines-2020-updates\n- American Thoracic Society. Management of severe asthma (official documents and statements). Accessed 2026. https://www.thoracic.org/statements/\n- British Thoracic Society/SIGN. British guideline on the management of asthma (latest update page). 2019 (updates posted). https://www.brit-thoracic.org.uk/quality-improvement/guidelines/asthma/\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute severe asthma exacerbation (status asthmaticus); trigger {viral URI/allergen/nonadherence/medication exposure}; severity {PEF/FEV₁ % if available, speech limitation, accessory muscle use}; objective evidence {RR, SpO₂/FiO₂, ABG/VBG}; treatment {continuous SABA ± ipratropium, systemic steroids, magnesium}\n- Acute hypoxemic respiratory failure due to asthma exacerbation; criteria {SpO₂ <90% on room air or increased O₂ requirement}; objective {SpO₂, oxygen flow/FiO₂, ABG PaO₂}; management {oxygen titration, bronchodilators, monitoring}\n- Impending hypercapnic respiratory failure due to fatigue from asthma exacerbation; criteria {rising PaCO₂, pH <7.35, altered mental status}; objective {ABG values, exam with diminished breath sounds}; escalation {ICU consult, airway plan/intubation readiness}\n- Suspected medication-related trigger; agent {nonselective beta-blocker/NSAID}; objective {timing of exposure and symptom onset}; management {discontinue offending agent, document contraindication}\n", "acute-hypoxemic-respiratory-failure.md": "---\nfilename: acute-hypoxemic-respiratory-failure.md\nid: acute-hypoxemic-respiratory-failure\ntitle: Acute hypoxemic respiratory failure\nslug: acute-hypoxemic-respiratory-failure\ntags: [pulmonology, hypoxemia, respiratory-failure, critical-care, inpatient, night-float]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Acute hypoxemic respiratory failure\n\n## Panic Card (3–6 bullets)\n- Assess ABCs, place on continuous pulse ox + telemetry, sit upright, and start supplemental O₂ to a target **SpO₂ 94–98%** (or **88–92%** if at risk for hypercapnic respiratory failure).\n- Escalate oxygen rapidly: nasal cannula → nonrebreather → **HFNC up to 60 L/min** with **FiO₂ titrated** to target SpO₂; call RT early.\n- If severe work of breathing, altered mentation, inability to protect airway, or refractory hypoxemia, prepare for intubation and ICU: **Confirm Before Proceed**: code status, difficult airway plan, hemodynamics, and vasopressor readiness.\n- Get immediate diagnostics while stabilizing: bedside lung ultrasound if available, STAT CXR, ABG/VBG + lactate, ECG, CBC/CMP, BNP/troponin as indicated; treat the likely cause (pneumonia, pulmonary edema, PE, aspiration).\n- If intubated or ARDS suspected: start lung-protective ventilation **Vt 4–8 mL/kg PBW** and keep **plateau pressure <30 cm H₂O**; consider early prone positioning in severe ARDS.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Acute hypoxemic respiratory failure is inadequate oxygenation (often **SpO₂ <90%** or **PaO₂ <60 mmHg**) from V/Q mismatch, shunt, diffusion impairment, or low inspired oxygen; at night, focus on immediate stabilization plus narrowing to a “can’t-miss” cause: pneumonia/aspiration, pulmonary edema, PE, mucus plugging/atelectasis, pneumothorax, or ARDS.\n- What must happen now: assign a target saturation and titrate oxygen to it; for most acutely ill adults target **SpO₂ 94–98%**, but if COPD/obesity hypoventilation/neuromuscular disease or other hypercapnia risk, target **SpO₂ 88–92%** pending blood gases to avoid oxygen-induced hypercapnia.\n- What must happen now: choose the least invasive device that achieves targets; if conventional oxygen fails (persistent **SpO₂ <90–92%**, tachypnea, escalating FiO₂ needs), move early to **HFNC** rather than “maxing out” low-flow devices while the patient tires.\n- Guideline Must Know: ERS 2022 suggests **HFNC over conventional oxygen therapy** for adults with hypoxaemic acute respiratory failure (conditional recommendation), making HFNC a default escalation step on the floor/stepdown when available.\n- Guideline Must Know: ERS 2022 also suggests **HFNC over noninvasive ventilation (NIV)** for hypoxaemic acute respiratory failure (conditional), reserving NIV primarily for hypercapnic failure, cardiogenic pulmonary edema, or selected post-op/high-risk extubation contexts.\n- Guideline Must Know: AARC 2022 recommends aiming **SpO₂ 94–98%** for most hospitalized and critically ill adults and **88–92%** for COPD; it also supports early initiation of high-flow oxygen to reduce escalation needs.\n- Guideline Must Know: BTS emergency oxygen guidance emphasizes oxygen as a prescribed therapy with a documented target range, and specifically endorses **94–98%** for most and **88–92%** for those at risk of hypercapnic respiratory failure.\n- What must happen now: assess trajectory and work of breathing (accessory muscles, diaphoresis, inability to speak full sentences, altered mentation). A patient who is “maintaining SpO₂” but exhausting is a high-risk airway—plan ICU transfer early rather than late crash intubation.\n- What must happen now: obtain ABG/VBG when clinical status is severe, when hypercapnia risk exists, or when SpO₂ does not match the picture; interpret in context of FiO₂ (e.g., worsening A–a gradient suggests shunt/VQ).\n- Guideline Must Know: If ARDS is present or strongly suspected and the patient is intubated, ATS/ESICM/SCCM 2017 recommends lung-protective ventilation with **Vt 4–8 mL/kg predicted body weight** and **plateau pressure <30 cm H₂O** (strong), and recommends prone positioning **>12 h/day** in severe ARDS (strong).\n- What must happen now: treat likely etiologies in parallel—diuresis for cardiogenic pulmonary edema, antibiotics for pneumonia/aspiration, bronchodilators and controlled O₂ for COPD overlap, anticoagulation when PE is likely and bleeding risk acceptable; avoid anchoring on a single diagnosis when oxygen needs are rapidly rising.\n- What can wait (but not until morning if unstable): CT pulmonary angiography, formal echocardiography, and advanced infectious workup can follow once oxygenation and hemodynamics are stabilized; however, a rapidly deteriorating patient with pleuritic pain, syncope, or RV strain signs needs urgent PE evaluation and ICU-level monitoring.\n- Pitfall: giving “too much oxygen” without a target in hypercapnia-prone patients can worsen CO₂ retention; if using higher FiO₂ temporarily for stabilization, re-titrate promptly back to **88–92%** and obtain blood gas assessment early.\n- Pitfall: delaying ICU consult until after intubation criteria are met; oxygen escalation is not linear—patients can fail suddenly from fatigue, aspiration, pneumothorax, or arrhythmia. Escalate when you see increasing RR, rising FiO₂ requirements, or worsening mental status even before absolute saturation thresholds.\n- Pitfall: under-recognizing ARDS; bilateral infiltrates plus hypoxemia after an inciting event (sepsis, aspiration, pancreatitis, transfusion) should prompt lung-protective strategy planning and avoidance of injurious ventilator settings once intubated.\n- Night-float consult framing: call ICU early with objective data (current device/flow, **FiO₂**, RR, ABG, mental status, hemodynamics) and a focused differential; call pulmonary/critical care when persistent high-flow needs or suspected ARDS; call cardiology for flash pulmonary edema with ischemia/arrhythmia; consider PERT/hematology for high-risk PE.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Persistent hypoxemia despite escalation: **SpO₂ <90%** on **HFNC FiO₂ ≥0.60** or on nonrebreather with ongoing distress.\n- Signs of impending ventilatory failure: **RR ≥35/min**, rising CO₂ with **pH <7.30**, severe accessory muscle use, or altered mental status/inability to protect airway.\n- Hemodynamic instability with respiratory failure: new **SBP <90 mmHg** or need for vasopressors, concern for sepsis/PE/cardiogenic shock.\n- Suspected severe ARDS needing advanced strategies (neuromuscular blockade, high PEEP, proning) or any need for intubation planning.\n- New pneumothorax suspicion (sudden deterioration, unilateral breath sounds) or escalating oxygen needs with unclear cause requiring urgent imaging/RT/ICU.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Oxygen therapy — {device} at {flow} with target SpO₂ {target-range} and wean/titrate per protocol\n- Order: High-flow nasal cannula — {flow-up-to-60-L-min} and {FiO₂} to target SpO₂ {target-range} with RT titration\n- Order: Chest X-ray portable — {STAT} for {acute hypoxemia/respiratory distress}\n- Order: Blood gas — {ABG-or-VBG} now on {current-FiO₂} and repeat in {60-min} if not improving\n- Order: Labs — {CBC}, {CMP}, {lactate}, {BNP}, {troponin} as indicated; add {blood-cultures-x2} if infection suspected\n- Order: Respiratory viral PCR — {panel} and {sputum-culture} if productive cough and pneumonia suspected\n\n## ABIM Style Question 1\n### Stem\nA 58-year-old man is admitted with pancreatitis and develops worsening dyspnea overnight. He is febrile and tachypneic. CXR shows new bilateral diffuse opacities. He is intubated for refractory hypoxemia. Which ventilator strategy is most appropriate to reduce ventilator-induced lung injury?\n\n### Options\nA. Tidal volume 10–12 mL/kg predicted body weight with permissive hyperoxia  \nB. Tidal volume 4–8 mL/kg predicted body weight and keep plateau pressure <30 cm H₂O  \nC. Routine high-frequency oscillatory ventilation in moderate ARDS  \nD. Tidal volume 8–10 mL/kg predicted body weight with minimal PEEP  \nE. Immediate prone positioning for 2–4 hours per day regardless of severity  \n\n### Correct answer\nB\n\n### Rationale\nLung-protective ventilation with **tidal volume 4–8 mL/kg predicted body weight** and limiting **plateau pressure to <30 cm H₂O** is strongly recommended for ARDS to reduce ventilator-induced lung injury. High-frequency oscillatory ventilation is not routinely recommended in moderate/severe ARDS, and prone positioning is recommended for severe ARDS but requires sufficient duration (typically **>12 h/day**) rather than brief sessions.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 70-year-old woman with severe COPD is admitted for pneumonia. Overnight she becomes more dyspneic and is placed on high-flow oxygen; her SpO₂ rises to 99%. Thirty minutes later she is somnolent. VBG shows pH 7.26 with elevated CO₂. What is the best immediate oxygenation strategy while further management is arranged?\n\n### Options\nA. Maintain SpO₂ 98–100% to maximize oxygen delivery  \nB. Stop oxygen completely because hyperoxia is harmful  \nC. Titrate oxygen to a target SpO₂ 88–92% and obtain/monitor blood gases  \nD. Switch to nonrebreather at 15 L/min to “blow off” CO₂  \nE. Delay oxygen changes until a CT chest is completed  \n\n### Correct answer\nC\n\n### Rationale\nIn patients at risk for hypercapnic respiratory failure, oxygen should be prescribed to a controlled target **SpO₂ 88–92%** pending blood gas results to avoid oxygen-induced hypercapnia and worsening acidosis. The pitfall is un-targeted high oxygen leading to CO₂ retention and depressed mental status; titration and gas monitoring are the decisive steps now.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What SpO₂ target range is recommended for most acutely ill adults on supplemental oxygen? A: **94–98%**.\n- Q: What SpO₂ target range is suggested for patients at risk of hypercapnic respiratory failure (e.g., COPD) pending blood gases? A: **88–92%**.\n- Q: In ARDS, what tidal volume range is recommended for lung-protective ventilation? A: **4–8 mL/kg predicted body weight**.\n- Q: In severe ARDS, what minimum daily duration of prone positioning is recommended? A: **>12 hours/day**.\n\n## Guidelines & Key References (3–5 bullets)\n- ERS clinical practice guidelines: high-flow nasal cannula in acute respiratory failure (2022) — https://publications.ersnet.org/content/erj:::59:::4:::2101574.full.pdf\n- ATS/ESICM/SCCM guideline: mechanical ventilation in adult patients with ARDS (2017) — https://www.thoracic.org/statements/resources/cc/ards-guidelines.pdf\n- British Thoracic Society guideline for oxygen use in adults in healthcare and emergency settings (2017) — https://bmjopenrespres.bmj.com/content/4/1/e000170.full.pdf\n- AARC clinical practice guideline: management of adult patients with oxygen in the acute care setting (2022) — https://www.aarc.org/wp-content/uploads/2022/10/cpg-clinical-mangement-adult-o2-acute-settings.pdf\n- Surviving Sepsis Campaign: international guidelines for management of sepsis and septic shock (2021) — https://www.sccm.org/clinical-resources/guidelines/guidelines/surviving-sepsis-guidelines-2021\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute hypoxemic respiratory failure due to {suspected-cause} with objective evidence {SpO₂-on-room-air}, {ABG-PaO₂}, {RR}, {CXR/CT-findings} requiring {device} at {flow} / {FiO₂} to maintain SpO₂ {target}\n- If hypercapnia risk: Acute on chronic respiratory failure (hypoxemic ± hypercapnic) due to {COPD-exacerbation/pneumonia} with {pH}, {PaCO₂/VBG-CO₂}, target SpO₂ {88–92%}, therapy {controlled-O₂/HFNC/NIV}\n- Suspected ARDS secondary to {inciting-insult} with {bilateral-infiltrates}, {PaO₂/FiO₂ if available}, escalation to {HFNC/intubation}; document lung-protective strategy intent if ventilated {Vt-ml-kg-PBW}, plateau {value}\n- Sepsis with acute hypoxemic respiratory failure due to {source} with organ dysfunction {lactate}, {vasopressor-requirement}, antimicrobials {agent} started {time}\n", "acute-hypercapnic-respiratory-failure.md": "---\nfilename: acute-hypercapnic-respiratory-failure.md\nid: acute-hypercapnic-respiratory-failure\ntitle: Acute hypercapnic respiratory failure\nslug: acute-hypercapnic-respiratory-failure\ntags: [pulmonology, respiratory-failure, hypercapnia, copd, noninvasive-ventilation, night-float]\nlevel: resident\nestimatedtimemin: 18\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Acute hypercapnic respiratory failure\n\n## Panic Card (3–6 bullets)\n- Airway/breathing first: sit upright, suction PRN, continuous pulse ox + cardiac monitor; get ABG/VBG now and reassess work of breathing every 5–10 min.\n- Controlled oxygen: titrate to **SpO₂ 88–92%** if COPD/CO₂ retainer suspected; avoid “blast O₂” unless peri-arrest.\n- Start bilevel NIV promptly if acidotic hypercapnia: **pH ≤7.35 with PaCO₂ >45 mmHg** (or clinical CO₂ narcosis) and no absolute contraindication; recheck gas in **~1 hour**.\n- Treat the reversible cause while supporting ventilation: bronchodilators + systemic steroid for COPD, diuresis for CPO, naloxone if opioid effect, antibiotics if infectious trigger.\n- Escalate early: if worsening mental status, rising PaCO₂ with falling pH, inability to tolerate NIV, or persistent hypoxemia despite support, call ICU for intubation readiness.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Acute hypercapnic respiratory failure (AHRF) is ventilatory failure with **elevated PaCO₂** and often **acidemia**; at night, assume a “three-bucket” differential: **COPD/asthma with fatigue**, **OHS/OSA or neuromuscular weakness**, and **CNS depressant/iatrogenic hypoventilation** (opioids, sedatives).\n- **Now:** stabilize and confirm physiology fast: ABG (or VBG for pH/CO₂ trend), bedside glucose, ECG, CXR; look for pneumonia, edema, pneumothorax, aspiration; examine for somnolence, asterixis, paradoxical breathing, silent chest.\n- **Now:** avoid oxygen-induced CO₂ retention and worsening V/Q mismatch in COPD/OHS by targeting **SpO₂ 88–92%**; if you must increase FiO₂ to prevent hypoxemia, plan early ventilatory support rather than prolonged high FiO₂ alone.\n- Guideline Must Know: For COPD exacerbation with AHRF causing respiratory acidosis, **bilevel NIV is recommended** when **pH ≤7.35** (typically with **PaCO₂ >45 mmHg**) to reduce intubation and mortality.\n- Guideline Must Know: NIV should be started in an appropriate monitored setting with trained staff and **early reassessment**; persistent acidotic hypercapnia **not improving after ~1 hour of optimal medical therapy** is a key trigger to initiate NIV in AECOPD pathways.\n- Guideline Must Know: There is **no absolute lower pH cutoff** that forbids a trial of NIV in AECOPD, but **lower pH increases failure risk** and requires close monitoring with rapid access to intubation.\n- Guideline Must Know: Practical NIV start (typical ward/ED approach): begin around **IPAP 10–15 cmH₂O** and **EPAP 4–5 cmH₂O**, then titrate IPAP upward over minutes to reduce dyspnea/RR and improve pH/PaCO₂; repeat ABG at **~1 hour** and after major setting changes.\n- Guideline Must Know: NIV success is usually signaled by improvement in **pH**, falling **PaCO₂**, lower RR, and improved dyspnea within the first **1–2 hours**; lack of early improvement predicts failure and should prompt ICU involvement.\n- Guideline Must Know: For AHRF due to cardiogenic pulmonary edema, **CPAP or bilevel NIV** is recommended as noninvasive support (pick based on ventilation vs oxygenation needs and local expertise).\n- **Confirm Before Proceed:** do not “snow” the patient to tolerate the mask; if agitation threatens NIV success, first fix mask fit, leaks, bronchodilation, and CO₂/oxygen targets; if sedation is considered, it should occur only with ICU-level monitoring due to aspiration and airway loss risk.\n- COPD-specific treatment in parallel: frequent short-acting bronchodilators, systemic glucocorticoid (e.g., **prednisone 40 mg daily for 5 days** if able to take PO), and antibiotics when bacterial features/high severity are present; reassess for alternative diagnoses (PE, CHF, pneumothorax).\n- Consider opioid/sedative effect when pinpoint pupils, bradypnea, and abrupt somnolence: give **naloxone in small titrated doses** (e.g., **0.04 mg IV**, repeat q2–3 min to adequate ventilation) to avoid precipitated withdrawal while restoring breathing; continue ventilatory support as needed.\n- If OHS/OSA suspected (obesity, loud snoring, daytime hypercapnia history), NIV often needs higher EPAP to overcome upper-airway obstruction; watch for coexisting CHF and aspiration risk.\n- **Can wait (once stable):** trend gases q4–6 h, de-escalate FiO₂, transition bronchodilators to MDI, plan daytime spirometry review and home NIV/OSA evaluation, and reconcile sedatives/opioids to prevent recurrence.\n- Pitfalls at night: missing pneumonia/aspiration behind “COPD” (get CXR, consider PCT/cultures per local practice), underrecognizing fatigue with a “normal” RR, and failing to recheck ABG after oxygen/NIV changes (CO₂ can climb silently).\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **pH <7.25** after initial optimization and/or no improvement in pH/PaCO₂ within **1–2 hours** of well-applied NIV.\n- Inability to protect airway: **GCS decline**, recurrent emesis/aspiration, copious secretions, or seizures.\n- Escalating ventilatory demand: RR persistently **>30/min**, severe accessory muscle use, “silent chest,” or impending arrest.\n- Hypoxemia requiring high support: inability to maintain **SpO₂ ≥88%** despite NIV/appropriate FiO₂ (or rapidly rising FiO₂ needs).\n- Hemodynamic instability or malignant arrhythmia concurrent with respiratory failure.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Arterial blood gas — {now} {repeat_in_60_min_after_niv_or_o2_change}\n- Order: Noninvasive ventilation (bilevel) — {mode_ST} {ipap_12_cmH2O} {epap_5_cmH2O} {fio2_titrate_to_spo2_88_92} {backup_rate_12_16} {continuous_spo2_and_telemetry}\n- Order: Chest x-ray portable — {stat} {indication_hypercapnic_respiratory_failure}\n- Order: Nebulized bronchodilators — {albuterol_2_5_mg_q20min_x3_then_q2_4h} {ipratropium_0_5_mg_q4_6h}\n- Order: Glucocorticoid — {prednisone_40_mg_po_daily_x5_days_or_methylprednisolone_if_no_po}\n- Order: Labs — {cbc} {cmp} {mg} {phos} {bnpp_if_edema} {troponin_if_ischemia_concern} {blood_cultures_if_fever} {sputum_culture_if_purulent}\n\n## ABIM Style Question 1\n### Stem\nA 67-year-old man with severe COPD is admitted for worsening dyspnea and increased sputum. He is somnolent but arousable, RR 28/min, HR 108/min, BP 146/82 mmHg. SpO₂ is 86% on room air and improves to 91% on 2 L/min nasal cannula. ABG shows pH 7.29, PaCO₂ 68 mmHg, PaO₂ 58 mmHg. He has no vomiting and can follow commands. What is the best next step to reduce mortality and need for intubation?\n### Options\nA. High-flow nasal cannula oxygen at 60 L/min with FiO₂ 0.60  \nB. Immediate endotracheal intubation and invasive mechanical ventilation  \nC. Bilevel noninvasive ventilation with close reassessment in 1 hour  \nD. Increase oxygen to a non-rebreather mask targeting SpO₂ 98–100%  \nE. Intravenous sodium bicarbonate infusion to correct acidemia  \n### Correct answer\nC\n### Rationale\nBilevel NIV is recommended for AECOPD with **acute hypercapnic respiratory acidosis (pH ≤7.35)** and reduces intubation and mortality when started promptly with close monitoring for early improvement. The patient has no contraindication to NIV and is not immediately crashing; escalating oxygen to very high saturation targets may worsen CO₂ retention and is not definitive ventilatory support.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 72-year-old woman with COPD presents with acute dyspnea and wheeze. RR 32/min, SpO₂ 90% on 2 L/min nasal cannula. ABG shows pH 7.18, PaCO₂ 82 mmHg. While preparing NIV, she becomes increasingly obtunded and has repeated emesis into the mask during a brief trial. What is the best next step?\n### Options\nA. Continue NIV and add a benzodiazepine to improve mask tolerance  \nB. Switch to CPAP only and reassess ABG in 2 hours  \nC. Administer high-flow oxygen to target SpO₂ 98–100%  \nD. Endotracheal intubation for airway protection and invasive ventilation  \nE. Administer intravenous sodium bicarbonate to raise the pH above 7.25  \n### Correct answer\nD\n### Rationale\nThis patient has a high-risk profile for NIV failure and now has an airway protection problem; repeated emesis and worsening obtundation are functional contraindications to NIV and indicate need for intubation. The pitfall is attempting to “push through” NIV despite aspiration risk and inability to protect the airway, which can be catastrophic.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What ABG pattern defines acute hypercapnic respiratory acidosis in AECOPD that supports NIV? A: pH **≤7.35** with **PaCO₂ >45 mmHg** in the appropriate clinical context.\n- Q: What oxygen saturation target is recommended in suspected COPD CO₂ retainers during an exacerbation? A: Titrate oxygen to **SpO₂ 88–92%**.\n- Q: When should you recheck an ABG after starting NIV for AHRF? A: Recheck at about **1 hour** and after major NIV or FiO₂ changes.\n- Q: Name one clinical feature that makes NIV unsafe due to airway risk. A: Inability to protect airway such as **recurrent vomiting/aspiration** or progressive obtundation.\n\n## Guidelines & Key References (3–5 bullets)\n- ERS/ATS Clinical Practice Guideline: Noninvasive ventilation for acute respiratory failure (2017) — https://www.thoracic.org/statements/resources/cc/niv-guidelines.pdf\n- BTS/ICS Guideline: Ventilatory management of acute hypercapnic respiratory failure in adults (2016) — https://thorax.bmj.com/content/71/Suppl_2/ii1.full.pdf\n- GOLD Global Strategy for COPD: 2025 Report (includes exacerbation management and controlled oxygen strategy) — https://goldcopd.org/2025-gold-report/\n- NICE Quality Standard QS10: Non-invasive ventilation for persistent acidotic hypercapnic ventilatory failure in AECOPD (updated 2023) — https://www.nice.org.uk/guidance/qs10/chapter/Quality-statement-7-Non-invasive-ventilation\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute hypercapnic respiratory failure — acute vs acute-on-chronic — ABG {pH} {PaCO2} {PaO2} — objective respiratory distress {RR} {accessory_muscle_use} — treatment {NIV_settings} {ABG_response_1h}\n- COPD exacerbation — suspected trigger {infection/bronchospasm/CHF/other} — severity {need_for_NIV} {acidemia} — objective evidence {wheeze} {CXR_findings} {sputum_character}\n- Acute encephalopathy due to hypercapnia — severity {somnolent/obtunded} — objective evidence {GCS} {ABG_hypercapnia} — response to {NIV_or_intubation}\n- Aspiration risk/event (if present) — acuity {suspected/confirmed} — objective evidence {emesis} {CXR_infiltrate} {O2_requirement} — treatment {airway_protection} {antibiotics_if_given}\n", "ards.md": "---\nfilename: ARDS.md\nid: ards\ntitle: ARDS\nslug: ards\ntags: [pulmonology, critical-care, mechanical-ventilation, hypoxemic-respiratory-failure, ards, night-float]\nlevel: resident\nestimatedtimemin: 12\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# ARDS\n\n## Panic Card (3–6 bullets)\n- Call ICU now and treat as impending respiratory failure if escalating O₂ needs, altered mental status, or work of breathing; prepare for airway and vasopressors with goal **MAP ≥65 mmHg** and continuous monitoring.\n- If intubated: lung-protect immediately with **VT 4–8 mL/kg predicted body weight (target 6)**, **plateau pressure ≤30 cm H₂O**, and accept permissive hypercapnia if **pH ≥7.20** (increase RR before VT).\n- Oxygenation targets: **SpO₂ 88–95%** (or **PaO₂ 55–80 mmHg**) while minimizing FiO₂ toxicity; increase PEEP and optimize ventilator synchrony before chasing 100% saturation.\n- If severe hypoxemia despite optimization (e.g., **PaO₂/FiO₂ <150** on **FiO₂ ≥0.60**): start prone pathway for **≥12–16 h/day**; deepen sedation and consider short course neuromuscular blockade for ventilator dyssynchrony.\n- Identify and treat the trigger now (sepsis/pneumonia/aspiration/pancreatitis/transfusion reaction) while avoiding fluid overload; start appropriate empiric antimicrobials when infection likely and obtain cultures first if feasible without delay.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- ARDS is acute, non-cardiogenic pulmonary edema with inflammatory lung injury; use Berlin criteria: onset within **1 week** of a known insult, bilateral opacities not fully explained by effusions/lobar collapse/nodules, respiratory failure not primarily cardiac/volume overload, and hypoxemia graded by **PaO₂/FiO₂** with **PEEP/CPAP ≥5 cm H₂O**.\n- What must happen now: determine whether the patient can maintain airway/ventilation; escalating oxygen requirement, rising CO₂ with fatigue, inability to protect airway, or worsening encephalopathy should trigger ICU-level airway planning rather than “one more” noninvasive trial.\n- What must happen now: aggressively search for and treat the cause (pneumonia/sepsis, aspiration, pancreatitis, trauma, transfusion-associated lung injury, drug reaction); pair source control and antibiotics with hemodynamic resuscitation while avoiding iatrogenic fluid overload that worsens oxygenation.\n- Guideline Must Know: Use lung-protective ventilation for all invasively ventilated ARDS: **VT 4–8 mL/kg predicted body weight** (target **6**) and limit inspiratory pressures with **plateau pressure ≤30 cm H₂O**; if plateau remains high, reduce VT toward **4 mL/kg** while monitoring pH and hemodynamics.\n- Guideline Must Know: Oxygenation goals should be “adequate, not perfect”; common ARDS protocols target **SpO₂ 88–95%** (or **PaO₂ 55–80 mmHg**) to reduce oxygen toxicity and ventilator intensity while maintaining acceptable tissue oxygen delivery.\n- Guideline Must Know: If pH drops with lung-protective VT, increase respiratory rate first (often up to **30–35/min** if safe) and optimize synchrony; accept permissive hypercapnia unless contraindicated, aiming for **pH ≥7.20** rather than normal PaCO₂.\n- Guideline Must Know: For moderate-to-severe ARDS, consider a higher-PEEP strategy rather than low PEEP, titrating to oxygenation and mechanics; reassess after each change using plateau pressure, driving pressure trend, oxygenation response, and hemodynamics.\n- Guideline Must Know: For severe ARDS, use prone positioning early and for prolonged sessions: typically when **PaO₂/FiO₂ <150** on **FiO₂ ≥0.60** (with PEEP applied), with a target of **≥12–16 h/day**; ensure lines/airway security and pressure injury prevention.\n- Guideline Must Know: Avoid routine high-frequency oscillatory ventilation in moderate-to-severe ARDS; it does not improve outcomes and can increase harm compared with standard lung-protective strategies.\n- Guideline Must Know: Recruitment maneuvers can transiently improve oxygenation but can precipitate hypotension and barotrauma; use cautiously, avoid in unstable shock, and reassess immediately for benefit vs harm rather than repeating reflexively.\n- Practical bedside mechanics: differentiate peak vs plateau pressure; rising peak with stable plateau suggests resistance (secretions, bronchospasm, tube kink), whereas rising plateau suggests worsened compliance (edema, atelectasis, pneumothorax, abdominal hypertension).\n- Ventilator dyssynchrony worsens lung injury and oxygenation; optimize analgesia-first sedation, adjust inspiratory flow/time, and consider brief neuromuscular blockade if severe dyssynchrony persists despite deep sedation and appropriate settings.\n- Fluids and hemodynamics: in sepsis-associated ARDS, resuscitate to perfusion goals early, then pursue conservative fluid strategy once shock resolves; consider diuresis if volume overloaded and perfusion adequate, but do not diurese through active shock.\n- Night-float pitfalls: mislabeling cardiogenic pulmonary edema as ARDS (get bedside echo, assess volume status, consider BNP and response to diuresis) and missing pneumothorax when oxygenation suddenly worsens (look for unilateral breath sounds, rising pressures, hypotension).\n- Night-float escalation cues: if oxygenation requires **FiO₂ ≥0.80**, PEEP escalating with poor response, or worsening acidosis despite RR optimization, call ICU attending early to coordinate prone/NMB/advanced ventilation and avoid prolonged unsafe “floor-level” rescue attempts.\n- Confirm Before Proceed: starting prone positioning, neuromuscular blockade, or unusually high airway pressures requires a team huddle to verify airway security, hemodynamic tolerance, contraindications (e.g., unstable spine, open abdomen, uncontrolled shock), and a plan for rapid de-proning if deterioration occurs.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Refractory hypoxemia: **PaO₂/FiO₂ <150** despite **FiO₂ ≥0.60** and PEEP optimization, or need for **FiO₂ ≥0.80** to keep **SpO₂ ≥88%**.\n- Ventilatory failure or unsafe mechanics: **pH <7.20** despite RR optimization and synchrony measures, or **plateau pressure >30 cm H₂O** despite VT reduction.\n- Hemodynamic instability: vasopressor requirement to maintain **MAP ≥65 mmHg**, rising lactate, new malignant arrhythmia, or shock with suspected sepsis/PE/MI.\n- Sudden decompensation: acute increase in airway pressures, unilateral breath sounds, hemoptysis, or abrupt hypotension suggesting pneumothorax, tube obstruction, or massive PE.\n- Need for prone/NMB/ECMO evaluation or complex differential (e.g., diffuse alveolar hemorrhage, acute eosinophilic pneumonia) requiring critical care/pulmonary consultation.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Mechanical ventilation (volume assist-control) — {VT mL/kg predicted body weight=6; RR=20–30; PEEP=start 8–12; FiO2=titrate to SpO2 88–95%; plateau goal ≤30}\n- Order: Arterial blood gas — {time=now and 30–60 min after vent changes; include lactate if shock suspected}\n- Order: Chest radiograph (portable) — {indication=acute hypoxemic respiratory failure; verify ETT/lines and evaluate pneumothorax/atelectasis}\n- Order: Infectious evaluation and empiric antimicrobials — {blood cultures x2 before antibiotics if feasible; respiratory culture; antibiotic regimen per suspected source and renal function}\n- Order: Analgesia/sedation protocol — {agent=fentanyl infusion and/or propofol infusion; sedation target=deep for ventilator synchrony if severe; daily reassessment when stable}\n- Order: DVT prophylaxis — {agent=heparin or enoxaparin; dose adjusted for renal function/bleeding risk}\n\n## ABIM Style Question 1\n### Stem\nA 62-year-old man is intubated for severe pneumonia and is admitted to the ICU. Chest radiograph shows diffuse bilateral opacities. Echocardiogram shows normal left ventricular systolic function without significant valvular disease. On the ventilator he is on volume assist-control with tidal volume 500 mL, rate 16/min, PEEP 8 cm H₂O, FiO₂ 0.70. His predicted body weight is 70 kg. An arterial blood gas shows pH 7.30, PaCO₂ 52 mmHg, PaO₂ 58 mmHg. Plateau pressure is 34 cm H₂O. Which of the following is the best next step in ventilator management?\n### Options\nA. Increase tidal volume to 10–12 mL/kg predicted body weight to normalize PaCO₂\nB. Decrease tidal volume to 6 mL/kg predicted body weight and target plateau pressure ≤30 cm H₂O\nC. Switch to high-frequency oscillatory ventilation to improve oxygenation\nD. Decrease PEEP to reduce barotrauma risk and maintain high FiO₂ for oxygenation\nE. Begin diuresis immediately and delay ventilator changes until after net negative fluid balance is achieved\n### Correct answer\nB\n### Rationale\nLung-protective ventilation with **VT 4–8 mL/kg predicted body weight (target 6)** and **plateau pressure ≤30 cm H₂O** improves outcomes in ARDS and should be instituted immediately, even if mild hypercapnia results. Permissive hypercapnia is acceptable if pH remains adequate, and oxygenation should be supported with appropriate PEEP/FiO₂ adjustments rather than higher tidal volumes or HFOV.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 45-year-old woman with influenza pneumonia is intubated for acute hypoxemic respiratory failure. She meets criteria for ARDS and is ventilated with volume assist-control at VT 6 mL/kg predicted body weight, RR 26/min, PEEP 10 cm H₂O, FiO₂ 0.70. She also has severe diabetic ketoacidosis with pH 7.05 and serum bicarbonate 8 mmol/L. Plateau pressure is 28 cm H₂O. Oxygenation is acceptable at SpO₂ 90%. Which ventilator adjustment is most appropriate now?\n### Options\nA. Increase tidal volume to 10 mL/kg predicted body weight to rapidly correct acidosis\nB. Increase respiratory rate while maintaining tidal volume 6 mL/kg predicted body weight and plateau pressure ≤30 cm H₂O\nC. Decrease respiratory rate to reduce auto-PEEP risk and tolerate severe acidemia overnight\nD. Switch to pressure control and increase inspiratory pressure to maximize minute ventilation regardless of plateau pressure\nE. Reduce PEEP to 5 cm H₂O to lower intrathoracic pressure and improve venous return\n### Correct answer\nB\n### Rationale\nThe pitfall is letting severe metabolic acidosis push you to abandon lung-protective ventilation; instead, preserve **VT 6 mL/kg predicted body weight** and **plateau ≤30 cm H₂O** and increase minute ventilation primarily by raising respiratory rate while watching for auto-PEEP. This balances ARDS lung protection with the urgent need to mitigate life-threatening acidemia without causing volutrauma.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What PaO₂/FiO₂ thresholds define mild, moderate, and severe ARDS (with PEEP/CPAP ≥5 cm H₂O)? A: Mild **200–300**, moderate **100–200**, severe **≤100**.\n- Q: What is the usual plateau pressure target in ARDS lung-protective ventilation? A: **≤30 cm H₂O**.\n- Q: When should prone positioning be strongly considered in ARDS? A: Typically when **PaO₂/FiO₂ <150** despite **FiO₂ ≥0.60** with PEEP applied.\n- Q: What oxygenation range is commonly targeted to avoid over-oxygenation in ARDS protocols? A: **SpO₂ 88–95%** or **PaO₂ 55–80 mmHg**.\n\n## Guidelines & Key References (3–5 bullets)\n- ATS/ESICM/SCCM Clinical Practice Guideline: Mechanical Ventilation in Adult Patients with ARDS (2017): https://www.thoracic.org/statements/resources/cc/ards-guidelines.pdf\n- ARDS Definition Task Force: Acute Respiratory Distress Syndrome: The Berlin Definition (2012): https://jamanetwork.com/journals/jama/fullarticle/1160659\n- Surviving Sepsis Campaign: International Guidelines for Management of Sepsis and Septic Shock (2021): https://www.idsociety.org/practice-guideline/surviving-sepsis-campaign-adult-guidelines-2021/\n- ARDSNet (ARMA) Trial: Lower Tidal Volume Ventilation in ALI/ARDS (2000): https://www.critcon.org/wp-content/uploads/2017/12/ARDS-NET-ARMA-Study_NEJM2000.pdf\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute hypoxemic respiratory failure due to ARDS — {severity=mild/moderate/severe by PaO2/FiO2; support=HFNC/NIV/IMV; evidence=SpO2, ABG, FiO2, PEEP}\n- ARDS due to {cause: pneumonia/aspiration/sepsis/pancreatitis/transfusion} — {onset date/time; imaging=bilateral opacities; exclusion of cardiogenic edema=echo/clinical}\n- Ventilator dependence with lung-protective strategy — {VT mL/kg PBW; plateau cm H2O; PEEP/FiO2; proning yes/no with hours; neuromuscular blockade yes/no}\n- Shock if present — {type=septic/other; MAP; lactate; vasopressor={agent dose}; organ dysfunction=AKI/AMS}\n", "mechanical-ventilation.md": "---\nfilename: mechanical-ventilation.md\nid: mechanical-ventilation\ntitle: Mechanical ventilation\nslug: mechanical-ventilation\ntags: [critical-care, pulmonology, inpatient, mechanical-ventilation, respiratory-failure, night-float]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Mechanical ventilation\n\n## Panic Card (3–6 bullets)\n- If crashing: ensure airway/ETT position, 100% O₂, hand-ventilate if needed, check bilateral breath sounds, and connect to capnography; treat immediately reversible causes (ETT obstruction/kink, disconnection, pneumothorax, severe bronchospasm).\n- For severe hypoxemia: increase FiO₂ to **1.0**, titrate PEEP up in small steps while monitoring BP, aim **SpO₂ 92–96%** (or **88–92%** if chronic hypercapnia risk), and obtain ABG.\n- For high peak pressure/poor ventilation: suction, assess for biting/bronchospasm/secretions; reduce VT if needed; ensure adequate sedation/analgesia; consider longer expiratory time if obstructive physiology.\n- For hypotension after vent changes: suspect reduced venous return from high intrathoracic pressure; decrease PEEP/mean airway pressure, assess volume status, and evaluate for tension pneumothorax.\n- Confirm Before Proceed: recruitment maneuvers, large PEEP escalations, or neuromuscular blockade in shock/possible pneumothorax—recheck hemodynamics, exclude barotrauma, and ensure adequate sedation/analgesia.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Mechanical ventilation goals overnight: stabilize gas exchange, minimize ventilator-induced lung injury, and avoid iatrogenic complications (hypotension, barotrauma, delirium) while diagnosing the driver (ARDS, cardiogenic edema, COPD/asthma, neuromuscular failure, CNS event).\n- Separate problems: oxygenation failure (low PaO₂/SpO₂) is mainly PEEP/FiO₂/recruitment strategy; ventilation failure (high PaCO₂/low pH) is mainly minute ventilation (RR/VT) and dead space—treat the physiology rather than “chasing numbers.”\n- Guideline Must Know: For ARDS, use lung-protective ventilation with **VT 4–8 mL/kg predicted body weight** (target ~**6 mL/kg PBW**) and keep **plateau pressure <30 cm H₂O**; accept permissive hypercapnia if pH tolerable while ensuring adequate perfusion.\n- Guideline Must Know: In **severe ARDS**, prone positioning for **>12 h/day** improves outcomes—call ICU early if PaO₂/FiO₂ suggests severe hypoxemia despite optimized PEEP/FiO₂.\n- Guideline Must Know: For moderate–severe ARDS, consider higher PEEP strategies (patient-specific) and avoid routine HFOV; watch for hypotension/barotrauma when increasing mean airway pressure.\n- Guideline Must Know: If sepsis-related ARDS, Surviving Sepsis emphasizes low tidal volume strategy (around **6 mL/kg PBW**) and **plateau pressure ≤30 cm H₂O**, with early escalation for refractory hypoxemia.\n- Guideline Must Know: Prevent VAP/VAE by minimizing sedation, elevating head-of-bed **30–45°**, early mobilization when feasible, oral care with toothbrushing (avoid routine chlorhexidine), and avoiding unnecessary circuit changes; pair this with an active ventilator liberation process.\n- Guideline Must Know: Liberation readiness is often missed; use a standardized daily assessment and, when criteria met, perform an SBT (with or without low pressure support), and do not “preemptively” increase FiO₂ during SBTs.\n- What must happen now in a newly ventilated patient: confirm ETT depth and bilateral ventilation, place continuous capnography, obtain ABG within 30–60 min after major changes, and get a chest radiograph to verify tube position and evaluate pneumothorax/atelectasis/edema.\n- Oxygenation titration (adult inpatient): use the lowest FiO₂ that maintains target saturation; if FiO₂ >0.60 is needed, prioritize PEEP optimization and troubleshooting shunt causes (atelectasis, pneumonia, edema) rather than indefinitely increasing FiO₂.\n- Ventilation/acidosis management: increase RR first if pH low (watch for air trapping); if VT increase is considered, do so cautiously and prioritize lung-protective limits; accept permissive hypercapnia when necessary unless contraindications (intracranial hypertension, severe pulmonary hypertension, life-threatening arrhythmias).\n- Obstructive physiology (COPD/asthma) overnight pitfall: high peak pressure with relatively normal plateau suggests airflow resistance; treat bronchospasm/secretions, reduce RR/VT to lengthen expiratory time, tolerate higher PaCO₂ (“permissive hypercapnia”), and avoid stacking breaths that causes auto-PEEP and hypotension.\n- Peak vs plateau pressure interpretation: high peak with normal plateau = resistance issue (kink, secretions, bronchospasm); high plateau = compliance issue (ARDS, edema, pneumothorax, abdominal hypertension); this guides whether to suction/bronchodilate or reduce VT/PEEP and evaluate for barotrauma.\n- Patient–ventilator dyssynchrony: “double triggering” or breath stacking can silently increase delivered VT; consider adjusting flow/trigger, switching mode, treating pain/anxiety, and ensuring ventilator alarms are actionable rather than silenced.\n- Hemodynamic effects: increases in PEEP/mean airway pressure reduce venous return and may worsen shock; if MAP falls after a vent change, reassess volume status, consider reducing PEEP, and evaluate for tension pneumothorax—do not reflexively escalate pressors without troubleshooting.\n- What can wait until daylight if stable: fine-tuning ventilator mode preferences, formal weaning protocol optimization, long-term tracheostomy planning, and definitive etiologic imaging if oxygenation/ventilation are stable and ICU is already engaged.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Refractory hypoxemia: need **FiO₂ ≥0.80** and/or **PEEP ≥12–15 cm H₂O** to maintain **SpO₂ ≥90%**, or rapidly rising oxygen requirement despite troubleshooting.\n- Unsafe ventilatory pressures: **plateau pressure ≥30 cm H₂O** (or inability to measure reliably) despite VT reduction, or new barotrauma concern (sudden high pressures, subcutaneous emphysema, suspected pneumothorax).\n- Severe acidemia/ventilatory failure: **pH <7.20** with rising PaCO₂ despite reasonable adjustments, especially with altered mental status or arrhythmia.\n- Hemodynamic instability temporally linked to ventilation: new or worsening shock after PEEP escalation, or suspected auto-PEEP with hypotension in obstructive disease.\n- Extubation complexity: high-risk airway, repeated SBT failures, or concern for post-extubation failure requiring prophylactic noninvasive support planning (ICU/RT involvement).\n\n## Orders to Place Now (3–6 bullets)\n- Order: Mechanical ventilation (initial settings) — {mode=volume-assist-control, tidal-volume-ml-per-kg-PBW=6, rr=16-22, peep=5-10, fio2=0.40-1.0, goal-spo2=92-96-or-88-92-if-chronic-hypercapnia}\n- Order: Arterial blood gas — {time=30-60-min-after-initiation-or-major-change, include-lactate-if-shock}\n- Order: Chest radiograph (portable) — {indication=confirm-ett-position-and-evaluate-lung-process-or-barotrauma}\n- Order: Sedation/analgesia protocol — {analgesia-first=yes, sedation-target=light-if-safe, rass-goal=-2-to-0, daily-sat-sbt=if-eligible}\n- Order: Ventilator alarms and monitoring — {high-pressure-limit, low-exhaled-tidal-volume-alarm, apnea-alarm, continuous-etco2=yes, continuous-pulse-ox=yes}\n- Order: VAP prevention bundle — {head-of-bed=30-45-deg, oral-care=toothbrushing, peptic-ulcer-prophylaxis=if-risk, dvt-prophylaxis=if-no-contraindication, early-mobility=as-able}\n\n## ABIM Style Question 1\n### Stem\nA 62-year-old man is intubated for pneumonia and develops ARDS. On volume assist-control ventilation, FiO₂ is 0.70 and PEEP is 10 cm H₂O. His height is 175 cm, and predicted body weight is 70 kg. ABG shows PaO₂ 58 mmHg, PaCO₂ 52 mmHg, pH 7.31. Peak inspiratory pressure is 40 cm H₂O and plateau pressure is 33 cm H₂O. Which ventilator adjustment is most appropriate to reduce ventilator-induced lung injury while maintaining adequate support?\n### Options\nA. Increase tidal volume to 10 mL/kg predicted body weight to improve oxygenation\nB. Decrease tidal volume to 6 mL/kg predicted body weight and target plateau pressure <30 cm H₂O\nC. Switch to high-frequency oscillatory ventilation routinely for moderate ARDS\nD. Decrease PEEP to 5 cm H₂O to reduce plateau pressure\nE. Increase FiO₂ to 1.0 and keep tidal volume unchanged as long as pH is acceptable\n### Correct answer\nB\n### Rationale\nLung-protective ventilation in ARDS targets **VT 4–8 mL/kg PBW** (commonly **6 mL/kg**) and **plateau pressure <30 cm H₂O** to reduce ventilator-induced lung injury. Decreasing VT is the priority response to an elevated plateau pressure; routine HFOV is not recommended, and lowering PEEP may worsen oxygenation without addressing the core injury mechanism.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 70-year-old man with severe COPD is intubated for hypercapnic respiratory failure. Shortly after increasing the respiratory rate from 14 to 22 breaths/min to “blow off CO₂,” his blood pressure drops to 78/44 mmHg and the ventilator alarms for high peak pressure. Peak inspiratory pressure is 55 cm H₂O, plateau pressure is 26 cm H₂O, and the flow waveform does not return to baseline before the next breath. Which is the best next ventilator adjustment?\n### Options\nA. Increase PEEP to 15 cm H₂O to improve oxygenation\nB. Increase tidal volume to improve minute ventilation\nC. Decrease respiratory rate and increase expiratory time (e.g., lower RR, adjust I:E) to reduce auto-PEEP\nD. Perform an aggressive recruitment maneuver immediately\nE. Switch to prone positioning as the first step\n### Correct answer\nC\n### Rationale\nThis is the pitfall of dynamic hyperinflation with **auto-PEEP** from insufficient expiratory time: hypotension plus high peak pressure with normal plateau and incomplete exhalation indicates air trapping. The correct sequence is to reduce minute ventilation demand and lengthen expiratory time (lower RR/VT, increase inspiratory flow) while treating bronchospasm/secretions; raising external PEEP or recruitment can worsen hyperinflation and shock. What changed the decision here?\n\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What tidal volume range is recommended for adult ARDS using predicted body weight? A: **4–8 mL/kg PBW** (commonly targeting **6 mL/kg PBW**).\n- Q: What is the usual plateau pressure ceiling target in ARDS lung-protective ventilation? A: Keep **plateau pressure <30 cm H₂O**.\n- Q: In severe ARDS, how long per day should prone positioning be applied to improve outcomes? A: **>12 hours/day**.\n- Q: For ventilator liberation, is rapid shallow breathing index required to decide readiness for an SBT per the 2024 AARC guideline? A: No—routine RSBI calculation is not needed to determine readiness for SBT.\n\n## Guidelines & Key References (3–5 bullets)\n- ATS/ESICM/SCCM Clinical Practice Guideline: Mechanical Ventilation in Adult Patients with ARDS (2017) - https://www.thoracic.org/statements/resources/cc/ards-guidelines.pdf\n- Surviving Sepsis Campaign: International Guidelines for Management of Sepsis and Septic Shock (2021) - https://link.springer.com/article/10.1007/s00134-021-06506-y\n- AARC Clinical Practice Guideline: Spontaneous Breathing Trials for Liberation From Adult Mechanical Ventilation (2024) - https://www.aarc.org/wp-content/uploads/2023/11/CPG2024SpontaneousBreathingTrial.pdf\n- SHEA/IDSA/APIC Practice Recommendation: Strategies to Prevent VAP/VAE/NV-HAP in Acute-Care Hospitals (2022 Update) - https://stacks.cdc.gov/view/cdc/150381/cdc_150381_DS1.pdf\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute hypoxemic respiratory failure requiring invasive mechanical ventilation due to {etiology}, with objective evidence {spo2/paO2/fiO2, abg, imaging} and current support {mode, fio2, peep}\n- ARDS, {severity-if-known}, due to {cause} with objective criteria {bilateral-opacities, timing, paO2/fiO2}, and lung-protective strategy {vt-ml-per-kg-pbw, plateau-pressure}\n- Acute hypercapnic respiratory failure due to {copd-exacerbation/neuromuscular/other} with objective evidence {paco2, ph}, and ventilator strategy {rr, vt, ie-ratio, bronchodilators/suctioning}\n- Shock or hemodynamic instability temporally associated with mechanical ventilation changes, due to {auto-peep/high-peep/barotrauma/other}, with objective evidence {map, pressors, echo/clinical}, and interventions {vent-adjustments, fluids, vasopressors}\n- Suspected ventilator-associated event/pneumonia if applicable: {diagnosis}, {timing-on-vent}, objective evidence {new-infiltrate, fever, wbc, secretions, fio2/peep-escalation}, and treatment {cultures, antibiotics, suctioning}\n", "hospital-acquired-and-ventilator-associated-pneumonia.md": "---\nfilename: hospital-acquired-and-ventilator-associated-pneumonia.md\nid: hospital-acquired-and-ventilator-associated-pneumonia\ntitle: Hospital-acquired and ventilator-associated pneumonia\nslug: hospital-acquired-and-ventilator-associated-pneumonia\ntags: [pulmonary, infectious-disease, inpatient, hap, vap, antibiotics, stewardship, icu, night-float]\nlevel: resident\nestimatedtimemin: 20\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Hospital-acquired and ventilator-associated pneumonia\n\n## Panic Card (3–6 bullets)\n\n- Stabilize ABCs: titrate oxygen/vent to **SpO₂ ≥92%** (or **88–92%** if chronic hypercapnia suspected), obtain ABG if worsening work of breathing or ventilator dyssynchrony.\n- Treat as sepsis when unstable: give **30 mL/kg balanced crystalloid** for hypotension/lactate elevation unless clear fluid overload; start norepinephrine to **MAP ≥65 mmHg** if hypotension persists.\n- Get cultures before antibiotics if it will not delay therapy: **blood cultures x2** and **ET aspirate/sputum culture**; start empiric antibiotics within **≤1 hour** if septic shock.\n- Start empiric coverage based on MDR risk: include **Pseudomonas + other gram-negatives**; add **MRSA** coverage if risk factors or severe illness; avoid delays for imaging.\n- Vent/ICU safety checks: raise HOB **30–45°**, suction/airway toileting, review sedation and readiness-to-wean; check for alternative causes (mucus plug, pneumothorax, pulmonary edema, PE).\n- Confirm Before Proceed: if considering irreversible steps (e.g., emergent intubation, paralytics, ICU transfer, broad-spectrum escalation to last-line agents), confirm allergy history, prior cultures, and objective severity markers.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n\n- Hospital-acquired pneumonia (HAP) is pneumonia developing **≥48 h after admission** that was not incubating on arrival; ventilator-associated pneumonia (VAP) develops **≥48 h after endotracheal intubation**—both demand rapid risk-stratified empiric therapy plus prompt de-escalation.\n- Guideline Must Know: Use **clinical criteria** (new/worsening infiltrate plus fever/leukocytosis/purulent secretions or worsening oxygenation) to decide treatment; do not rely on CPIS or biomarkers to start antibiotics, and do not withhold therapy in an unstable patient while “waiting for procalcitonin.”\n- Guideline Must Know: Obtain **noninvasive respiratory sampling** (ET aspirate for VAP; sputum if obtainable for HAP) with Gram stain/culture; add **blood cultures x2** in severe disease; prioritize sampling **before** antibiotics only if it does not meaningfully delay therapy.\n- Guideline Must Know: Empiric therapy should cover **S. aureus and gram-negative bacilli including Pseudomonas**; base choices on patient-specific MDR risks and your ICU/unit antibiogram rather than “one-size-fits-all.”\n- Risk factors that push you toward broader initial coverage at night: prior IV antibiotics within **90 days**, known colonization with MRSA or resistant gram-negatives, prolonged hospitalization, mechanical ventilation, septic shock at presentation, structural lung disease (bronchiectasis), immunosuppression, or high local resistance rates.\n- Guideline Must Know: Add **MRSA coverage** (vancomycin or linezolid) if MRSA risk factors are present or if the patient is in **septic shock** or requires mechanical ventilation; otherwise, omit MRSA agents to reduce nephrotoxicity and C. difficile risk.\n- Practical empiric backbone (most common): an antipseudomonal beta-lactam such as **cefepime, piperacillin-tazobactam, meropenem, or imipenem-cilastatin**; choose based on local susceptibilities, recent cultures, and allergy profile, and dose aggressively with renal adjustment and extended infusion where appropriate.\n- Guideline Must Know: Use **two antipseudomonal agents from different classes** only when the risk of resistant gram-negatives is high or the patient is in **septic shock**; typical pairing is beta-lactam plus **levofloxacin/ciprofloxacin** or an **aminoglycoside** (avoid aminoglycosides in severe CKD/ESRD when alternatives exist).\n- If aspiration is suspected in HAP/VAP, routine “anaerobic double coverage” is not automatic; prioritize standard HAP/VAP regimens, and only add anaerobic-directed therapy when there is **lung abscess, empyema, or necrotizing infection**.\n- Guideline Must Know: Treat most patients for **7 days** if they show clinical improvement (defervescence, improving oxygenation, downtrending WBC, hemodynamic stability); extend only for clearly defined complications (empyema, abscess, necrotizing pneumonia) or slow response after reassessing the diagnosis.\n- De-escalation is a night-float superpower: within **48–72 h**, narrow to the most targeted agent(s) once cultures and clinical trajectory are known; if cultures are negative and the patient is improving, stop redundant agents and avoid “just in case” continuation.\n- Do not treat ventilator-associated tracheobronchitis as VAP by default: increased secretions alone without a new infiltrate should prompt airway clearance, ventilator optimization, and reassessment rather than reflex broad-spectrum antibiotics.\n- Always reassess “is this pneumonia?” at 2–6 hours: consider atelectasis, pulmonary edema, ARDS, PE, aspiration pneumonitis, drug fever, or line infection; mismatched findings (no infiltrate, low inflammatory signs, stable oxygenation) should trigger diagnostic pivot rather than antibiotic escalation.\n- Supportive care that changes outcomes overnight: optimize ventilation (lung-protective strategy if ARDS suspected), minimize sedation, daily spontaneous awakening/breathing trials when safe, elevate HOB **30–45°**, oral care, early mobilization when feasible, and strict suction/aspiration precautions.\n- Pitfalls: undertreating shock (delayed antibiotics/pressors), overtreating colonization (positive tracheal culture without clinical disease), missing empyema (persistent fever, loculated effusion), and forgetting drug toxicity (vancomycin nephrotoxicity, linezolid cytopenias/serotonin syndrome risk, fluoroquinolone QT/tendon risk).\n- When to call early overnight: ICU for escalating oxygen/vent requirements or vasopressors; ID for MDR history/CRE concerns or treatment failure; pulmonary/critical care for bronchoscopy needs, complex ventilator issues, or suspected empyema requiring drainage.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n\n- New or worsening respiratory failure: need for **FiO₂ ≥60%**, **PEEP ≥10 cm H₂O**, rapid escalation from baseline support, or impending/intubation requirement.\n- Hemodynamic instability: **MAP <65 mmHg** after fluids, rising lactate, or any vasopressor requirement for suspected pneumonia-associated shock.\n- Altered mental status with hypoxemia/hypercapnia, or inability to protect airway.\n- Concern for complicated infection: pleural effusion needing urgent drainage, cavitation/necrosis on imaging, or persistent bacteremia.\n- Suspected or known MDR pathogen requiring advanced agents (e.g., prior CRE/CRPA) or failure to improve within **48–72 h** on appropriate therapy.\n\n## Orders to Place Now (3–6 bullets)\n\n- Order: Blood cultures — {site1 peripheral, site2 peripheral, before antibiotics if feasible}\n- Order: Respiratory culture (ET aspirate or sputum) with Gram stain — {ventilated yes/no, collection method, timing now}\n- Order: MRSA nares PCR — {if available, to support early de-escalation of MRSA therapy}\n- Order: CBC with differential, CMP, lactate — {repeat lactate in 2–4 h if elevated or shock suspected}\n- Order: Chest imaging — {portable CXR now; consider CT chest if unclear diagnosis or suspected complication}\n- Order: Empiric antibiotics — {beta-lactam choice based on antibiogram/allergy; add MRSA agent if risk; add second antipseudomonal if high MDR risk or shock; renal function/weight-based dosing}\n\n## ABIM Style Question 1\n\n### Stem\n\nA 67-year-old man is mechanically ventilated after emergency surgery. On ventilator day 4 he develops a new right lower lobe infiltrate, temperature 38.7°C, WBC 16,000/µL, purulent secretions, and increasing oxygen requirements. He received piperacillin-tazobactam for 5 days during the past month for cholangitis. Blood pressure is 86/48 mmHg despite 2 L crystalloid; lactate is 4.1 mmol/L. Which empiric regimen is most appropriate now?\n\n### Options\n\nA. Ceftriaxone\nB. Cefepime plus levofloxacin plus vancomycin\nC. Ampicillin-sulbactam\nD. Azithromycin plus ceftriaxone\nE. Vancomycin alone\n\n### Correct answer\n\nB\n\n### Rationale\n\nHe has VAP with **septic shock** and recent IV antibiotics, which increases risk for resistant gram-negatives and MRSA; empiric therapy should include **MRSA coverage plus two antipseudomonal agents from different classes**. A third-generation cephalosporin or ampicillin-sulbactam is inadequate for Pseudomonas risk, and vancomycin alone does not cover gram-negative bacilli.\n\n## Second ABIM Style Case (Pitfall Variant)\n\n### Stem\n\nA 72-year-old woman develops suspected HAP on hospital day 6 with new infiltrate, fever, and increased oxygen needs. She is hemodynamically stable. She has end-stage kidney disease on hemodialysis and reports an anaphylactic reaction to cefazolin during a prior surgery. Local antibiogram shows substantial Pseudomonas prevalence on the unit. Which empiric regimen is the safest appropriate choice?\n\n### Options\n\nA. Piperacillin-tazobactam plus tobramycin\nB. Cefepime\nC. Aztreonam plus levofloxacin plus linezolid\nD. Meropenem\nE. Vancomycin plus ceftriaxone\n\n### Correct answer\n\nC\n\n### Rationale\n\nThe pitfall is **severe beta-lactam allergy** plus **ESRD**, making aminoglycosides high-toxicity and many beta-lactams unsafe without careful evaluation; aztreonam provides gram-negative coverage in severe beta-lactam allergy, and adding a second antipseudomonal plus MRSA coverage can be appropriate when local ecology and patient risk support it. The decisive issue is the **anaphylactic cephalosporin reaction**, which changes the empiric backbone choice and steers away from nephrotoxic aminoglycosides in ESRD.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n\n- Q: What is the defining timing for HAP versus VAP? A: HAP occurs **≥48 hours after hospital admission** without prior intubation; VAP occurs **≥48 hours after endotracheal intubation**.\n- Q: What is the typical recommended antibiotic duration for uncomplicated HAP/VAP that improves? A: **7 days** is recommended when the patient shows clinical response and no complications are present.\n- Q: When should you empirically add MRSA coverage in suspected HAP/VAP? A: Add when there are MRSA risk factors or when illness is severe such as **septic shock** or need for mechanical ventilation.\n- Q: When is double antipseudomonal therapy indicated? A: When MDR gram-negative risk is high or the patient has **septic shock**, use two agents from different classes initially.\n\n## Guidelines & Key References (3–5 bullets)\n\n- ATS/IDSA Clinical Practice Guideline: Management of Adults With Hospital-acquired and Ventilator-associated Pneumonia (2016) https://www.idsociety.org/practice-guideline/hap_vap/\n- ATS PDF: HAP/VAP Guidelines (2016) https://www.thoracic.org/statements/resources/tb-opi/hap-vap-guidelines-2016.pdf\n- ERS/ESICM/ESCMID/ALAT International Guidelines for HAP/VAP (2017) https://publications.ersnet.org/content/erj/50/3/1700582\n- SHEA/IDSA/APIC: Strategies to Prevent VAP/VAE/NV-HAP in Acute-Care Hospitals (2022 Update) https://shea-online.org/guidance/strategies-to-prevent-ventilator-associated-pneumonia-ventilator-associated-events-and-nonventilator-hospital-acquired-pneumonia-in-acute-care-hospitals-2022-update/\n- CDC: Management and Prevention Guidelines (Pneumonia) https://www.cdc.gov/pneumonia/hcp/management-prevention-guidelines/index.html\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n\n- Hospital-acquired pneumonia (HAP) or ventilator-associated pneumonia (VAP) — {acuity: suspected/confirmed} — {etiology: bacterial vs aspiration vs other} — {severity: sepsis/septic shock/acute hypoxemic respiratory failure} — {evidence: timing ≥48 h, new infiltrate, fever/WBC, purulent secretions, rising FiO₂/PEEP} — {treatment: cultures obtained, empiric antibiotics started, oxygen/vent changes}\n- Sepsis due to HAP/VAP — {organ dysfunction: lactate, MAP, creatinine, mentation, oxygenation} — {evidence: vitals, labs} — {treatment: fluids, antibiotics, cultures, vasopressors if used}\n- Septic shock due to HAP/VAP — {vasopressor requirement to maintain **MAP ≥65 mmHg**} — {lactate level} — {fluid resuscitation given} — {ICU involvement}\n- Acute hypoxemic respiratory failure — {oxygen device/vent settings: FiO₂, PEEP, flow} — {ABG/SpO₂} — {work of breathing} — {need for escalation/intubation}\n", "pulmonary-embolism.md": "---\nfilename: pulmonary-embolism.md\nid: pulmonary-embolism\ntitle: Pulmonary embolism\nslug: pulmonary-embolism\ntags: [pulmonary, venous-thromboembolism, anticoagulation, inpatient, night-float]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Pulmonary Embolism\n\n## Panic Card (3–6 bullets)\n- Airway/oxygen now: target **SpO₂ ≥92%** (or **88–92%** if chronic hypercapnia); escalate to HFNC/NIV; prepare intubation if impending fatigue or altered mentation.\n- If shock suspected: treat as high-risk PE until proven otherwise—2 large-bore IV, bedside echo for RV strain, start norepinephrine to **MAP ≥65 mmHg**, avoid large fluid boluses (try **250–500 mL** only if clearly preload responsive).\n- Anticoagulate promptly unless active major bleeding: start **unfractionated heparin infusion** if unstable/needs procedures or severe renal dysfunction; otherwise consider therapeutic anticoagulation per protocol.\n- Confirm Before Proceed: if persistent hypotension or arrest from suspected PE, activate ICU/PERT/cardiology now and evaluate for **systemic alteplase 100 mg IV over 2 h** (or catheter-directed therapy) after contraindication screen.\n- If arrest or peri-arrest: start ACLS; consider PE-directed lysis during CPR when high clinical suspicion and no absolute contraindications; call for ECMO-capable support if available.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- PE is an acute obstruction of pulmonary arterial flow causing V/Q mismatch, hypoxemia, and RV pressure overload; night-float danger is missing **high-risk (massive)** PE where hypotension reflects RV failure and rapidly deteriorates.\n- Risk stratify immediately: **high-risk PE = hemodynamic instability** (e.g., **SBP <90 mmHg** or need for vasopressors) and requires ICU-level care; intermediate-risk uses RV dysfunction + biomarkers to predict decompensation.\n- Guideline Must Know: For suspected PE without shock, use a validated clinical probability tool (e.g., Wells/Geneva), then D-dimer to rule out in low/intermediate probability; do not jump straight to CT in very low probability patients.\n- Guideline Must Know: Use **age-adjusted D-dimer** for patients >50 years (cutoff ≈ **age × 10 μg/L FEU**) to reduce unnecessary imaging when pretest probability is not high.\n- Guideline Must Know: **CT pulmonary angiography (CTPA)** is first-line imaging for most nonpregnant adults when PE is likely or D-dimer positive; if contrast contraindicated or rapid expert availability, consider V/Q scanning.\n- Guideline Must Know: In pregnancy, imaging strategy should minimize radiation while remaining definitive; many guidelines support tailored algorithms and low-dose protocols, with modality selection depending on local expertise and speed.\n- Guideline Must Know: RV dysfunction criteria matter: echo or CTPA showing **RV/LV ratio ≥1.0** supports RV strain; add troponin/BNP to classify intermediate-high risk and anticipate deterioration.\n- Guideline Must Know: Anticoagulation is the foundation for most PE; for hospitalized patients started on parenteral therapy, guidelines generally favor **LMWH over UFH** in stable patients due to predictable effect and lower complication burden, but UFH is preferred when rapid reversal/procedures are anticipated.\n- What must happen now: start therapeutic anticoagulation unless contraindicated, obtain baseline CBC/INR/aPTT/creatinine, assess bleeding risk, and order CTPA urgently (or bedside echo if unstable) while monitoring vitals/telemetry closely.\n- What can wait: thrombophilia testing is not an inpatient “night” priority and often should be deferred; focus instead on provoking factors, cancer screening history, and arranging follow-up for duration decisions.\n- High-risk (massive) PE: prioritize vasopressors, oxygenation/ventilation, and definitive reperfusion therapy (systemic thrombolysis, catheter-directed therapy, or surgical embolectomy) depending on contraindications and local capability; escalate early—waiting for “morning rounds” is unsafe.\n- Intermediate-high risk PE: anticoagulate, monitor in stepdown/ICU if concerning trajectory, trend lactate/troponin, and watch for decompensation; routine thrombolysis is not for everyone because bleeding risk can outweigh benefit—consult early if worsening.\n- Pitfall: hypoxemia severity can mislead—some large PEs have modest O₂ needs, while small PEs can look dramatic with comorbid COPD/CHF; rely on hemodynamics, RV strain, biomarkers, and trajectory rather than oxygen alone.\n- Anticoagulant selection pitfalls: avoid DOACs in some high-risk contexts (e.g., immediately unstable needing procedures or severe renal dysfunction); prefer UFH infusion when you need rapid on/off control overnight.\n- IVC filters: consider only if there is an acute VTE with an absolute contraindication to anticoagulation or recurrent PE despite adequate anticoagulation; do not place “just in case.”\n- Duration basics to tee up for daytime team: provoked PE often needs **≥3 months** anticoagulation; unprovoked or recurrent events often warrant extended/indefinite therapy depending on bleeding risk—document the presumed provoking factor clearly.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **SBP <90 mmHg**, new vasopressor requirement, syncope with persistent hypotension, or rising lactate despite support (high-risk PE physiology).\n- Evidence of RV failure with clinical worsening: **RV/LV ≥1.0** plus rising troponin/BNP, escalating O₂/ventilatory support, or new malignant arrhythmia.\n- Major bleeding risk dilemma or need for urgent procedure while anticoagulated (consider UFH strategy, reversal planning, specialty input).\n- Consider consult/activation for reperfusion: persistent hypoxemia/hemodynamic compromise despite anticoagulation, or any deterioration on intermediate-high risk pathway.\n\n## Orders to Place Now (3–6 bullets)\n- Order: CT pulmonary angiography (STAT) — {contrast allergy status}, {latest creatinine/eGFR}, {pregnancy status}\n- Order: Unfractionated heparin infusion (weight-based) — {weight kg}, {baseline aPTT/anti-Xa}, {bleeding risk/contraindications}\n- Order: Troponin (high-sensitivity) — {time 0}, {repeat time 3–6 h if needed}\n- Order: BNP or NT-proBNP — {single value now}\n- Order: Transthoracic echocardiogram (STAT if unstable) — {concern for RV strain/shock}\n- Order: CBC, CMP, PT/INR, aPTT, type and screen — {draw time now}\n\n## ABIM Style Question 1\n### Stem\nA 62-year-old man is admitted for acute dyspnea and pleuritic chest pain. Vitals: T 36.8°C, HR 118/min, BP 124/78 mmHg, RR 26/min, SpO₂ 91% on 2 L/min nasal cannula. CTPA shows bilateral segmental pulmonary emboli. Troponin is mildly elevated and bedside echo shows RV dilation with RV/LV ratio 1.1. He has no active bleeding and no recent surgery. Which is the best next step in management tonight?\n\n### Options\nA. Start systemic thrombolysis with alteplase 100 mg IV over 2 hours\nB. Start therapeutic anticoagulation and admit to a monitored setting with close observation for decompensation\nC. Place an inferior vena cava filter and defer anticoagulation\nD. Give 2 L of isotonic crystalloid bolus and reassess in 2 hours\nE. Discharge home on a direct oral anticoagulant because he is hemodynamically stable\n\n### Correct answer\nB\n\n### Rationale\nThis patient has **intermediate-high risk PE** (RV dysfunction plus positive biomarker) without hypotension; recommended initial therapy is **therapeutic anticoagulation** with close monitoring for deterioration rather than routine thrombolysis due to bleeding risk. Systemic thrombolysis is generally reserved for **hemodynamic compromise** or rescue therapy if he deteriorates.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 70-year-old woman with stage 5 chronic kidney disease (eGFR 12 mL/min/1.73 m²) presents with sudden dyspnea and tachycardia. Vitals: HR 112/min, BP 118/70 mmHg, RR

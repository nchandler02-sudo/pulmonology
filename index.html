 24/min, SpO₂ 90% on 4 L/min. CTPA confirms acute PE without saddle clot. She is not hypotensive and has no active bleeding. The admitting team plans to start rivaroxaban tonight. What is the best anticoagulation approach now?\n\n### Options\nA. Start rivaroxaban 15 mg orally twice daily\nB. Start apixaban 10 mg orally twice daily\nC. Start enoxaparin 1 mg/kg subcutaneously every 12 hours\nD. Start unfractionated heparin infusion with aPTT or anti-Xa monitoring\nE. Withhold anticoagulation and observe because she is hemodynamically stable\n\n### Correct answer\nD\n\n### Rationale\nSevere CKD is a common pitfall: in advanced renal failure, **UFH infusion** is preferred for initial management because it is not renally cleared and can be rapidly adjusted or reversed, whereas many DOAC/LMWH regimens have dosing and accumulation concerns at very low eGFR. Name the pitfall: **renal drug accumulation leading to bleeding** if renally cleared agents are used without appropriate evidence-based dosing.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What hemodynamic finding defines high-risk (massive) PE in most guidelines? A: **Persistent SBP <90 mmHg** or need for vasopressors/shock attributable to PE.\n- Q: What imaging/echo metric commonly supports RV dysfunction in acute PE? A: **RV/LV diameter ratio ≥1.0** on echo or CTPA.\n- Q: In adults >50 years with low/intermediate pretest probability, how is age-adjusted D-dimer commonly applied? A: Use cutoff ≈ **age × 10 μg/L FEU** to rule out PE when appropriate.\n- Q: What is the most common minimum duration of anticoagulation for a provoked PE? A: **At least 3 months** in most patients if bleeding risk is acceptable.\n\n## Guidelines & Key References (3–5 bullets)\n- 2019 ESC/ERS Guidelines for diagnosis and management of acute PE — https://www.escardio.org/guidelines/clinical-practice-guidelines/all-esc-practice-guidelines/acute-pulmonary-embolism-diagnosis-and-management-of/\n- 2021 CHEST Guideline (2nd update): Antithrombotic therapy for VTE disease — https://journal.chestnet.org/article/S0012-3692(21)01506-3/fulltext\n- 2020 ASH Guidelines: Treatment of DVT and PE — https://ashpublications.org/bloodadvances/article/4/19/4693/463998/American-Society-of-Hematology-2020-guidelines-for\n- ACC 2024 PE guideline comparison (summary of major society alignment) — https://www.acc.org/latest-in-cardiology/ten-points-to-remember/2024/10/07/15/41/international-clinical-practice\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute pulmonary embolism — {provoked vs unprovoked} — {segmental/lobar/main} — objective: {CTPA result/date}, {D-dimer if used}, {risk category low/intermediate/high}\n- Hemodynamic status — {SBP/MAP values} — {vasopressor use yes/no and agent/dose} — objective: {lactate}, {shock index}, {urine output}\n- Right ventricular strain/failure — {RV/LV ratio} — {troponin/BNP elevated yes/no with values} — objective: {echo/CT findings}, {ECG findings}\n- Acute hypoxemic respiratory failure due to PE — {SpO₂/ABG} — {oxygen device and flow} — objective: {SpO₂ on room air}, {work of breathing}, {CXR if obtained}\n- Anticoagulation treatment and safety — {agent/dose/start time} — {bleeding risk/contraindications assessed} — objective: {Hgb/platelets/INR/aPTT}, {renal function}\n", "pleural-effusion.md": "---\nfilename: pleural-effusion.md\nid: pleural-effusion\ntitle: Pleural effusion\nslug: pleural-effusion\ntags: [pulmonology, pleural-effusion, inpatient, night-float, procedures]\nlevel: resident\nestimatedtimemin: 20\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n# Pleural effusion\n\n## Panic Card (3–6 bullets)\n- If respiratory distress: sit upright, apply oxygen to target **SpO₂ ≥92%** (or **88–92%** if chronic hypercapnia risk), continuous pulse ox, and get ABG/VBG if worsening work of breathing.\n- Bedside thoracic ultrasound now: confirm effusion, look for septations/loculations, and assess for large-volume compression; avoid blind taps and mark safest pocket.\n- If hemodynamic compromise with a massive effusion (suspected “tension hydrothorax”): call ICU and perform urgent ultrasound-guided therapeutic drainage in controlled aliquots while monitoring BP/SpO₂.\n- If fever/sepsis with effusion: start broad-spectrum antibiotics after cultures, obtain urgent diagnostic thoracentesis, and escalate for drainage if complicated pleural infection suspected.\n- Confirm Before Proceed: for large-volume drainage, stop if chest pain/cough or instability; generally avoid removing more than **1.0–1.5 L** at once without manometry/close monitoring to reduce re-expansion injury risk.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Night shift framing: your two priorities are (1) identify the patient who is decompensating from a large/complicated effusion and needs urgent drainage/escalation and (2) avoid low-yield or unsafe taps in predictable transudates while still not missing infection, malignancy, hemothorax, or PE.\n- What must happen now: assess airway/breathing/circulation, oxygen requirement trend, and work of breathing; obtain bedside ultrasound early because it detects small effusions, characterizes complexity, and improves procedural safety compared with landmark-only approaches.\n- Guideline Must Know: Do diagnostic thoracentesis for new unilateral effusions, any effusion with fever/pleuritic pain, suspected malignancy, atypical features, or failure to improve with targeted therapy (e.g., diuresis for suspected heart failure) rather than “watching overnight” when the cause is unclear.\n- Guideline Must Know: Ultrasound guidance is recommended for pleural procedures to reduce complications (notably pneumothorax) and to select the safest site; avoid bedside “blind” taps, especially with small/loculated effusions.\n- Initial differentiation: if classic systemic transudate picture (bilateral effusions with decompensated heart failure/cirrhosis/renal failure) and patient is improving, you can often treat the cause first; if unilateral, large, or symptomatic out of proportion, prioritize diagnostic sampling.\n- Guideline Must Know: Pleural fluid studies that should be “default” for undifferentiated effusion: cell count with differential, protein and LDH (paired with serum for Light’s criteria), Gram stain/culture (send in sterile container and blood-culture bottles), and cytology when malignancy is possible.\n- Light’s criteria bedside use: an exudate is likely if any of the following are met: pleural/serum protein ratio **>0.5**, pleural/serum LDH ratio **>0.6**, or pleural LDH **>2/3** the serum upper limit; remember this classifies fluid, it does not name the etiology.\n- Pitfall: after aggressive diuresis for heart failure, a true transudate can be misclassified as an exudate by Light’s criteria (“pseudoexudate”); if the clinical picture strongly favors heart failure, use adjuncts (e.g., serum–pleural albumin gradient **>1.2 g/dL** or clinical response) rather than launching an exhaustive malignancy/TB workup overnight.\n- Guideline Must Know: Suspected pleural infection requires rapid risk stratification with pleural fluid chemistry; a pleural pH **<7.20** predicts complicated course and should prompt tube drainage rather than antibiotics alone (especially if loculated or clinically septic).\n- Guideline Must Know: Additional infection “drain me” signals include frank pus, positive Gram stain/culture, glucose **<2.2 mmol/L (40 mg/dL)**, or pleural LDH **>1000 IU/L**; don’t delay consult for “repeat imaging in the morning” if these are present.\n- Malignancy considerations: dyspnea relief is appropriate with therapeutic thoracentesis, but plan for recurrence; send cytology (yield improves with adequate volume) and look for “trapped/nonexpandable lung” after drainage, which changes definitive management.\n- Guideline Must Know: For known or suspected malignant pleural effusion, do not drain asymptomatic patients; for symptomatic effusions, initial large-volume thoracentesis can guide next steps, and recurrent symptomatic effusions are typically managed with indwelling pleural catheter and/or pleurodesis based on lung expandability and patient goals.\n- Hemothorax/chylothorax “must not miss”: sudden effusion after trauma/procedure or dropping hemoglobin suggests hemothorax (urgent imaging, type and screen, and surgical consultation); milky fluid with triglycerides suggests chylothorax (call pulmonology/thoracic surgery and evaluate for malignancy/lymphatic injury).\n- What can wait until daytime if stable: extensive autoimmune/TB testing, CT chest with contrast for malignancy staging, and definitive pleural interventions (IPC/pleurodesis) when the patient is oxygen-stable and not septic.\n- When to call ICU/consult: worsening oxygen needs, suspected complicated parapneumonic effusion/empyema, persistent hypotension or rising lactate, large effusion with mediastinal shift, suspected hemothorax, or failure to re-expand lung after drainage (possible trapped lung/bronchial obstruction).\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Escalating respiratory support: need for **HFNC**, **noninvasive ventilation**, or **FiO₂ ≥0.60** to maintain **SpO₂ target**, especially with large/loculated effusion on ultrasound.\n- Pleural infection markers: pleural pH **<7.20**, frank pus, positive Gram stain/culture, or loculated effusion with sepsis physiology (e.g., **lactate ≥2 mmol/L** or persistent hypotension despite fluids).\n- Hemodynamic compromise or suspected tension physiology: hypotension, tachycardia, or mediastinal shift with large effusion requiring urgent controlled drainage and close monitoring.\n- Suspected hemothorax: acute effusion with falling hemoglobin, recent trauma/procedure, or pleural fluid grossly bloody requiring urgent thoracic surgery input.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Chest X-ray (portable) — {indication: dyspnea/effusion evaluation}\n- Order: Thoracic ultrasound (pleural) — {side: right/left/bilateral; purpose: characterize effusion and mark tap site}\n- Order: Thoracentesis, diagnostic with ultrasound guidance — {side; patient position; max volume: 1000–1500 mL; hold parameters: chest pain/cough/hypotension}\n- Order: Pleural fluid studies — {cell count + differential; protein; LDH; pH on heparinized syringe; glucose; Gram stain + culture; cytology}\n- Order: Serum labs paired for Light’s criteria — {CMP; CBC; serum total protein; serum LDH}\n- Order: Blood cultures — {set count: 2} and Antibiotics, empiric — {regimen based on CAP vs hospital-acquired risk; renal function}\n\n## ABIM Style Question 1\n### Stem\nA 67-year-old man is admitted with fever, cough, and right-sided pleuritic chest pain. He is on 4 L/min nasal cannula with SpO₂ 92%. Chest imaging shows a moderate right pleural effusion. Ultrasound-guided thoracentesis yields cloudy fluid with pH 7.12, glucose 35 mg/dL, and LDH 1800 IU/L; Gram stain is pending. After the tap, he remains tachypneic but hemodynamically stable.\n### Options\nA. Observe and continue antibiotics only  \nB. Start diuresis for suspected heart failure exacerbation  \nC. Place tube thoracostomy for pleural drainage  \nD. Schedule outpatient repeat thoracentesis in 1 week  \nE. Initiate systemic corticosteroids for pleurisy\n### Correct answer\nC\n### Rationale\nA pleural pH **<7.20** with very low glucose and high LDH predicts a complicated parapneumonic effusion that requires prompt drainage in addition to antibiotics. Observation alone risks ongoing sepsis and loculation; diuresis and steroids do not address infected pleural space physiology.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 72-year-old woman with known heart failure is admitted for volume overload and receives high-dose intravenous loop diuretics. On night float she develops mild dyspnea; chest imaging shows a moderate bilateral pleural effusion, right greater than left. Diagnostic thoracentesis is performed because the right effusion is larger; pleural fluid protein/serum protein ratio is 0.52 and pleural LDH/serum LDH ratio is 0.62 (meeting exudative criteria). She is afebrile and improving clinically with diuresis.\n### Options\nA. Start empiric broad-spectrum antibiotics for pleural infection  \nB. Order urgent pleuroscopy for suspected malignancy  \nC. Interpret the fluid as diuretic-associated “pseudoexudate” and reassess with clinical response and albumin gradient  \nD. Begin therapeutic anticoagulation for presumed pulmonary embolism  \nE. Place a chest tube because Light’s criteria indicate an exudate\n### Correct answer\nC\n### Rationale\nAggressive diuresis can concentrate pleural fluid, causing a transudative heart-failure effusion to satisfy Light’s criteria (“pseudoexudate”); the pitfall is over-calling infection or malignancy when the trajectory and bilateral pattern favor heart failure. Adjunct assessment (e.g., serum–pleural albumin gradient) and response to diuresis help avoid unnecessary invasive escalation.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What pleural fluid pH cutoff in suspected pleural infection strongly supports the need for tube drainage? A: **pH <7.20**.\n- Q: Name the three components of Light’s criteria. A: Pleural/serum protein ratio **>0.5**, pleural/serum LDH ratio **>0.6**, or pleural LDH **>2/3** the serum upper limit.\n- Q: What pleural fluid glucose level suggests complicated pleural infection? A: **<2.2 mmol/L (40 mg/dL)**.\n- Q: In malignant pleural effusion, should asymptomatic patients undergo routine drainage? A: No; guidelines recommend no drainage for asymptomatic malignant effusions.\n\n## Guidelines & Key References (3–5 bullets)\n- British Thoracic Society (BTS) Guideline for Pleural Disease, 2023:\n- BTS Guideline for Pleural Disease (full supplement in Thorax), 2023:\n- American Association for Thoracic Surgery (AATS) Empyema Consensus Guidelines, 2017:\n- ATS/STS/STR Clinical Practice Guideline: Management of Malignant Pleural Effusions, 2018:\n- American College of Radiology (ACR) Appropriateness Criteria: Workup of Pleural Effusion or Pleural Disease, 2024:\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute hypoxemic respiratory failure due to {large pleural effusion} with {SpO₂/FiO₂ or oxygen device}, {RR}, {ABG/VBG if available}, and {response to oxygen/drainage}\n- {Pleural effusion} with acuity {acute/subacute/chronic}, suspected etiology {heart failure/parapneumonic/malignant/PE/other}, laterality {right/left/bilateral}, and objective imaging {CXR/CT/US findings}\n- {Complicated parapneumonic effusion/empyema} with sepsis evidence {T, WBC, lactate, hypotension}, pleural fluid criteria {pH, glucose, LDH, culture}, and treatment {antibiotics, drainage plan}\n- {Malignant pleural effusion} suspected/confirmed with objective evidence {cytology/imaging}, symptom severity {dyspnea}, and management plan {therapeutic tap, consult, definitive strategy}\n- Procedure note severity support: ultrasound guidance used, volume removed {mL}, complications {none/pneumothorax}, and post-procedure status {SpO₂, pain, CXR if obtained}\n", "pneumothorax.md": "---\nfilename: Pneumothorax.md\nid: pneumothorax\ntitle: Pneumothorax\nslug: pneumothorax\ntags: [pulmonology, emergency, inpatient, night-float]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n#\n## Panic Card (3–6 bullets)\n- Assess airway/breathing/circulation; give **supplemental O₂ to target SpO₂ ≥92%** (88–92% if chronic CO₂ retention).\n- If **suspected tension pneumothorax** (hypotension, severe hypoxia, tracheal deviation, PEA): **immediate needle decompression**—do **not** wait for imaging.\n- For unstable patients: prepare for **chest tube thoracostomy** with continuous monitoring and analgesia.\n- Obtain **stat portable CXR** if stable; bedside ultrasound can rapidly confirm absent lung sliding.\n- Hold positive-pressure ventilation if possible until decompressed; if required, use lowest effective pressures.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Pneumothorax is air in the pleural space causing partial or complete lung collapse; night float risk is **missing tension physiology** or **delaying definitive drainage** in unstable patients.\n- Classify quickly: **primary spontaneous**, **secondary spontaneous** (underlying lung disease), **traumatic/iatrogenic**, and **tension**; management hinges on **stability, size, and symptoms**.\n- **What must happen now:** determine hemodynamic stability, oxygenation, and need for immediate decompression; obtain focused history for COPD, cystic lung disease, recent procedures, or mechanical ventilation.\n- **What can wait:** CT chest for unclear cases or recurrent disease planning—**never delay treatment** of instability for advanced imaging.\n- Guideline Must Know: **Tension pneumothorax is a clinical diagnosis**—per ATLS/BTS, treat immediately with decompression without imaging when shock or severe hypoxia is present.\n- Guideline Must Know: **Secondary spontaneous pneumothorax** (COPD, ILD) warrants **lower thresholds for intervention** due to limited reserve; observation alone is rarely appropriate.\n- Guideline Must Know: For **stable primary spontaneous pneumothorax**, small size and minimal symptoms may be managed with **oxygen and observation**, with repeat imaging in 6–24 h per BTS/ACCP guidance.\n- Guideline Must Know: **Needle aspiration** may be attempted in select stable primary cases, but **chest tube** is preferred for secondary, large, or symptomatic pneumothorax.\n- Guideline Must Know: **Positive-pressure ventilation increases risk of tension**; intubated patients with sudden hypoxia/hypotension require **immediate decompression**.\n- Guideline Must Know: **Ultrasound** findings (absent lung sliding, lung point) can rapidly confirm pneumothorax and guide urgent decisions when CXR is delayed.\n- Size assessment varies by guideline; practically, **symptoms and stability trump size**—do not anchor on measurements when the patient is dyspneic or unstable.\n- Analgesia is essential; inadequate pain control worsens splinting and hypoventilation—use multimodal analgesia while avoiding respiratory depression.\n- Pitfall: assuming normal vitals exclude danger—**elderly or COPD patients may decompensate quickly** with modest pneumothorax.\n- Call ICU early for **tension physiology, escalating oxygen needs, mechanical ventilation, or vasopressor requirement**.\n- Consult pulmonology or surgery for **persistent air leak >48–72 h, recurrent pneumothorax, bilateral disease, or failure of lung re-expansion**.\n- Red flags: **sudden chest pain with hypotension**, **rapidly rising oxygen requirement**, **subcutaneous emphysema**, or **cardiac arrest**—treat as tension until proven otherwise.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Hypotension, altered mental status, or **SpO₂ <90% despite high-flow O₂**.\n- Requirement for **needle decompression or chest tube** for instability.\n- **Mechanical ventilation** with suspected or confirmed pneumothorax.\n- **Persistent air leak** or failure of lung re-expansion on follow-up imaging.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Oxygen therapy — {delivery device, target SpO₂}\n- Order: Portable chest X-ray — {stat}\n- Order: Chest tube thoracostomy — {side, tube size, suction −20 cmH₂O vs water seal}\n- Order: Analgesia — {agent, dose, frequency}\n- Order: Continuous pulse oximetry — {monitoring duration}\n\n## ABIM Style Question 1\n### Stem\nA 24-year-old man with no past medical history presents with sudden right-sided pleuritic chest pain and mild dyspnea. Vitals are stable; SpO₂ is 95% on room air. CXR shows a small right apical pneumothorax. What is the best next step?\n### Options\nA. Immediate chest tube thoracostomy  \nB. High-flow oxygen and observation  \nC. CT chest with contrast  \nD. Emergent needle decompression  \nE. Intubation with positive-pressure ventilation  \n### Correct answer\nB\n### Rationale\nStable primary spontaneous pneumothorax with minimal symptoms can be managed conservatively with oxygen and observation per BTS/ACCP guidance. Invasive drainage is reserved for larger or symptomatic cases. CT and decompression are unnecessary in this stable presentation.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 68-year-old woman with severe COPD develops acute dyspnea after central line placement. SpO₂ is 88% on 6 L nasal cannula, BP 92/58 mmHg. CXR shows a moderate pneumothorax. What is the best next step?\n### Options\nA. Observation with repeat CXR in 6 hours  \nB. Needle aspiration only  \nC. Chest tube thoracostomy  \nD. Discharge with outpatient follow-up  \nE. CT chest to assess size  \n### Correct answer\nC\n### Rationale\nSecondary pneumothorax in COPD with hypoxia and hypotension requires chest tube drainage due to limited pulmonary reserve and risk of deterioration. The pitfall is underestimating severity based on size alone; symptoms and instability drive management. What changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What clinical finding mandates immediate treatment without imaging? A: Hemodynamic instability suggesting tension pneumothorax.\n- Q: Why is positive-pressure ventilation dangerous in pneumothorax? A: It can rapidly convert a simple pneumothorax into tension physiology.\n- Q: When is observation reasonable? A: Stable primary spontaneous pneumothorax with minimal symptoms.\n- Q: What bedside tool can rapidly confirm pneumothorax? A: Point-of-care ultrasound showing absent lung sliding.\n\n## Guidelines & Key References (3–5 bullets)\n- British Thoracic Society Pleural Disease Guideline, 2010 — https://www.brit-thoracic.org.uk\n- American College of Chest Physicians Consensus Statement on Spontaneous Pneumothorax, 2001 — https://journal.chestnet.org\n- ATLS 10th Edition, 2018 — https://www.facs.org/quality-programs/trauma/education/atls\n- American Thoracic Society Clinical Statements — https://www.thoracic.org\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute pneumothorax — type (primary vs secondary) and laterality\n- Severity — tension physiology present/absent; oxygen requirement\n- Etiology — spontaneous vs iatrogenic vs traumatic\n- Objective evidence — vitals, SpO₂, CXR/ultrasound findings\n- Treatment — oxygen, needle decompression, chest tube, monitoring\n", "obstructive-sleep-apnea.md": "---\nfilename: obstructive-sleep-apnea.md\nid: obstructive-sleep-apnea\ntitle: Obstructive Sleep Apnea\nslug: obstructive-sleep-apnea\ntags: [pulmonary, sleep-medicine, inpatient, night-float, perioperative, respiratory-failure]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Obstructive Sleep Apnea\n\n## Panic Card (3–6 bullets)\n- Sit upright, perform jaw thrust/chin lift, apply oral/nasal airway if tolerated; remove obstructing mask/secretions and suction as needed.\n- Start oxygen to maintain **SpO₂ ≥90%** (or **88–92%** if COPD/OHS risk) while you fix the airway and assess ventilation; add continuous pulse oximetry now.\n- If recurrent apneas/obstruction: apply patient’s home **CPAP** immediately; if unavailable, start **CPAP {8–12 cmH₂O}** and titrate to stop obstructive events.\n- If somnolent, bradypneic, or shallow breathing: suspect hypoventilation/opioids; stop sedatives/opioids, obtain **ABG/VBG**, and give **naloxone {0.04 mg IV} q2–3 min** to RR/alertness (avoid full withdrawal) if opioid effect likely.\n- Escalate early if any of: need **CPAP/BiPAP**, rising CO₂/acidotic pH, inability to protect airway, or persistent desaturation despite interventions.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Night shift “OSA problem” is usually not the diagnosis itself but decompensation from **supine positioning**, **opioids/sedatives**, postop upper-airway edema, or coexisting **obesity hypoventilation syndrome (OHS)** causing **hypercapnia** and recurrent desaturation with sleep.\n- Separate quickly: airway obstruction vs hypoventilation vs new pulmonary process; OSA causes **intermittent** desats and snoring/obstruction with improvement when aroused/upright, while pneumonia/PE/CHF often cause **sustained** hypoxemia not tied to sleep stage/position.\n- What must happen now: ensure airway patency, stop respiratory depressants, verify ventilation; check for **bradypnea**, shallow breaths, and rising somnolence (hypercapnia can present as “sleepiness”).\n- Confirm Before Proceed: do not “treat numbers” with escalating oxygen alone if OHS/hypercapnia is plausible (BMI high, chronic HCO₃⁻ elevation, morning headaches, daytime somnolence); prioritize assessing ventilation (VBG/ABG) and using PAP support.\n- Guideline Must Know: Patients with known/suspected OSA are at increased risk of postoperative respiratory depression from **opioids and sedatives**; use opioid-sparing strategies, closer monitoring, and consider CPAP perioperatively when severe.\n- Guideline Must Know: For adults with OSA, **PAP (CPAP/APAP)** is recommended over no therapy, and CPAP/APAP are acceptable ongoing modalities; in the hospital, re-initiate home PAP promptly when safe and feasible.\n- Guideline Must Know: If postoperative/sedated OSA patient requires analgesia, prefer multimodal/non-opioid options and avoid “stacking” sedatives (benzodiazepines, gabapentinoids, antihistamines) that synergize with opioids to worsen hypoventilation.\n- Guideline Must Know: Continuous ventilation monitoring (capnography when available) and continuous oximetry are recommended/encouraged in higher-risk sedated/OSA patients, especially with systemic opioids.\n- Guideline Must Know: In obese patients with sleep-disordered breathing, **serum HCO₃⁻ <27 mmol/L** makes OHS unlikely in low–moderate suspicion; if suspicion is high or HCO₃⁻ is elevated, obtain **ABG** to confirm awake hypercapnia (**PaCO₂ ≥45 mmHg**).\n- Guideline Must Know: Hospitalized patients with hypercapnic respiratory failure and suspected OHS often need **noninvasive ventilation** (NIV) rather than oxygen alone; transition planning should ensure ongoing ventilatory support until definitive outpatient titration.\n- Practical PAP selection at night: use **CPAP** for primarily obstructive events (snoring, witnessed obstruction, desats tied to sleep, minimal hypercapnia); use **BiPAP/NIV** if **hypercapnia**, acidemia, or persistent hypoventilation despite CPAP (especially OHS overlap).\n- Titration targets: titrate CPAP to eliminate obstructive events and maintain **SpO₂ ≥90%** with the lowest FiO₂ needed; if OHS/COPD overlap suspected, target **SpO₂ 88–92%** until ventilation is confirmed and avoid excessive oxygen that can worsen CO₂ retention.\n- What can wait (but should be queued): outpatient sleep evaluation/referral and definitive diagnostic testing (polysomnography or home sleep apnea testing) once medically stable; do not start “long-term CPAP prescriptions” inpatient without objective diagnosis unless it is continuation of prior therapy.\n- Common pitfalls: labeling nocturnal desaturation as “OSA” without excluding atelectasis, aspiration, PE, CHF, or pneumonia; forgetting that **opioid-induced ventilatory impairment** can mimic OSA; missing OHS when chronic **HCO₃⁻ is elevated** and the patient is persistently sleepy.\n- When to call for help: respiratory therapy early for mask fit/pressures; ICU/critical care if ventilatory failure evolves; anesthesia/rapid response if airway patency or airway protection becomes uncertain in the setting of sedation/opioids.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Persistent hypoxemia requiring **>6 L/min nasal cannula**, **Venturi ≥40%**, or any need for **HFNC/CPAP/BiPAP** to maintain **SpO₂ goal**.\n- **ABG/VBG** showing **pH <7.30** or rising CO₂ with worsening mental status, or inability to stay awake/maintain airway despite stimulation.\n- Recurrent apneas with **bradycardia, hypotension, arrhythmia**, or repeated rapid-response events overnight.\n- Suspected opioid/sedative toxicity requiring repeated naloxone dosing or infusion, or concern for aspiration/airway compromise needing airway team.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Continuous pulse oximetry — {SpO2_goal%, notify_if_SpO2_below%, oxygen_delivery_device}\n- Order: Respiratory therapy: CPAP initiation/titration — {start_pressure_cmH2O, titrate_by_cmH2O, max_pressure_cmH2O, mask_type}\n- Order: Blood gas — {ABG_or_VBG, indication_hypercapnia_vs_hypoxemia, time_now}\n- Order: Hold respiratory depressants and adjust analgesia — {hold_med_list, alternative_analgesia_plan, bowel_regimen_if_opioids}\n- Order: Naloxone PRN for opioid-induced respiratory depression — {route_IV, dose_start_0.04mg, repeat_interval_min, target_RR_and_mental_status}\n- Order: Chest X-ray and ECG — {indication_new_desaturation, timing_stat_vs_routine}\n\n## ABIM Style Question 1\n### Stem\nA 58-year-old man with known obstructive sleep apnea (uses CPAP at home) is postoperative day 1 after colectomy. Overnight he has loud snoring, witnessed apneas, and intermittent desaturations to 82% while asleep that improve when awakened and sitting up. He received IV hydromorphone 1 hour ago and is now somnolent but arousable with a respiratory rate of 10/min. On 4 L/min nasal cannula his SpO₂ is 90% while awake.\n### Options\nA. Increase oxygen to a nonrebreather mask at 15 L/min and reassess in 1 hour  \nB. Apply CPAP and reduce/hold opioids while assessing ventilation with a blood gas  \nC. Start empiric antibiotics for hospital-acquired pneumonia  \nD. Give furosemide 40 mg IV for presumed pulmonary edema  \nE. Schedule outpatient polysomnography and make no overnight changes\n### Correct answer\nB\n### Rationale\nThe pattern (sleep-associated obstruction with improvement when awakened) plus recent opioid exposure supports OSA exacerbation with possible hypoventilation; immediate management is airway support with CPAP, minimizing respiratory depressants, and evaluating ventilation (ABG/VBG). Perioperative OSA guidance emphasizes increased sensitivity to opioids/sedatives and the need for enhanced monitoring and use of CPAP when appropriate.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 46-year-old woman with BMI 52 kg/m² is admitted for cellulitis. Overnight she becomes increasingly sleepy and has sustained oxygen saturations of 86–88% on room air while lying supine. On 6 L/min nasal cannula, SpO₂ rises to 96%, but she is more somnolent with a respiratory rate of 8/min. A venous blood gas shows pH 7.28 and PCO₂ 72 mmHg.\n### Options\nA. Continue high-flow oxygen and recheck blood gas in the morning  \nB. Start CPAP only and avoid any further evaluation  \nC. Start noninvasive ventilation (BiPAP) and target SpO₂ 88–92% while treating hypercapnia  \nD. Administer sodium bicarbonate infusion to correct acidosis  \nE. Give flumazenil empirically for presumed benzodiazepine intoxication\n### Correct answer\nC\n### Rationale\nThis is the OHS/hypercapnia pitfall: oxygen can worsen CO₂ retention and mental status; she needs ventilatory support with NIV and controlled oxygen targets while addressing the cause of hypoventilation. ATS guidance supports ABG-based confirmation of awake hypercapnia and use of PAP/NIV strategies in OHS, especially during episodes of hypercapnic respiratory failure.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What clinical pattern most supports OSA-related nocturnal desaturation on the wards? A: Intermittent desaturation with snoring/witnessed obstruction that improves rapidly with arousal and upright positioning.\n- Q: When should you obtain an ABG/VBG in a suspected inpatient OSA/OHS event? A: When there is somnolence, bradypnea, sustained hypoxemia, or concern for hypercapnia/hypoventilation.\n- Q: What bicarbonate threshold helps exclude OHS in low–moderate suspicion? A: Serum bicarbonate <27 mmol/L.\n- Q: Which PAP mode is preferred for primarily obstructive events without hypercapnia? A: CPAP.\n\n## Guidelines & Key References (3–5 bullets)\n- American Academy of Sleep Medicine (AASM) Clinical Practice Guideline: PAP therapy for adult OSA (2019) — https://aasm.org/clinical-guideline-pap-therapy/\n- Patil SP, et al. Treatment of Adult OSA with Positive Airway Pressure: AASM Clinical Practice Guideline (2019) — https://link.springer.com/article/10.5664/jcsm.7640\n- American Society of Anesthesiologists (ASA) Practice Guidelines for the Perioperative Management of Patients with OSA (2014) — https://www.asahq.org/~/media/sites/asahq/files/public/resources/standards-guidelines/practice-guidelines-for-the-perioperative-management-of-patients-with-obstructive-sleep-apnea.pdf\n- American Thoracic Society (ATS) Clinical Practice Guideline: Evaluation and Management of Obesity Hypoventilation Syndrome (2019) — https://www.atsjournals.org/doi/full/10.1164/rccm.201905-1071ST\n- Society of Anesthesia and Sleep Medicine (SASM) Guideline on Preoperative Screening and Assessment of Adult Patients with OSA (2016) — https://dash.harvard.edu/bitstreams/7312037d-f437-6bd4-e053-0100007fdf3b/download\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute hypoxic respiratory failure due to {upper-airway obstruction/OSA exacerbation} — severity: {SpO2_nadir%, O2_device_and_flow} — evidence: {witnessed_apneas/snoring, positional_component} — treatment: {CPAP_settings, monitoring}\n- Acute hypercapnic respiratory failure due to {OHS with OSA overlap} — severity: {pH, PaCO2/PCO2} — evidence: {BMI, HCO3, ABG/VBG} — treatment: {BiPAP_settings, target_SpO2, ICU_consult_if_any}\n- Toxic/metabolic encephalopathy due to {hypercapnia/opioid effect} — evidence: {RR, CO2, mental_status} — treatment: {naloxone_dosing, holding_sedatives, NIV}\n- Postoperative respiratory depression in patient with {known/suspected OSA} — risk factor: {opioids/sedatives} — evidence: {episodes, monitoring_findings} — interventions: {opioid_sparing_plan, CPAP_use, escalation_steps}\n", "idiopathic-pulmonary-fibrosis.md": "---\nfilename: idiopathic-pulmonary-fibrosis.md\nid: idiopathic-pulmonary-fibrosis\ntitle: Idiopathic Pulmonary Fibrosis\nslug: idiopathic-pulmonary-fibrosis\ntags: [pulmonology, interstitial-lung-disease, hypoxemic-respiratory-failure, night-float, critical-care]\nlevel: resident\nestimatedtimemin: 20\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Idiopathic Pulmonary Fibrosis\n\n## Panic Card (3–6 bullets)\n- Airway/breathing first: sit upright, continuous pulse ox, target **SpO₂ 88–92%**, escalate O₂ rapidly (NC → NRB → **HFNC**).\n- If work of breathing, altered mentation, or refractory hypoxemia: call ICU early; consider **NIV trial** only if cooperative and not tiring; anticipate difficult rescue intubation.\n- Rule out immediately reversible killers: STAT **CXR** (pneumothorax), **ECG/troponin**, bedside lung/cardiac ultrasound if available, consider **CTPA** if PE risk or unexplained tachycardia.\n- Treat likely triggers while you evaluate: start empiric CAP/HAP antibiotics if febrile or infiltrate; give cautious IV diuresis if clear volume overload; avoid large fluid boluses unless in shock.\n- Confirm Before Proceed: If considering intubation/mechanical ventilation, confirm **goals of care** now (IPF intubation outcomes are poor), and involve ICU/pulm early.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- IPF is a chronic, progressive fibrosing ILD defined by a **UIP pattern on HRCT or biopsy** plus exclusion of secondary causes; diagnosis is ideally via multidisciplinary discussion because mimics (CTD-ILD, hypersensitivity pneumonitis, drug toxicity) change management.\n- Night-float framing: the common emergency is acute hypoxemic respiratory failure in a patient with limited pulmonary reserve—your job is to identify **pneumothorax, infection, PE, heart failure/volume overload, aspiration, medication toxicity**, and only then label “acute exacerbation.”\n- Now: stabilize oxygenation/ventilation and minimize iatrogenic injury—use HFNC early; if NIV used, keep settings gentle (lowest effective PEEP/pressure) because stiff fibrotic lungs are prone to **barotrauma** and NIV failure.\n- Now: get rapid imaging and labs that change disposition: CXR for **pneumothorax** or new consolidation; ABG/VBG for ventilation and lactate; CBC/CMP; BNP and troponin when cardiogenic edema/ischemia is plausible.\n- Now: if fever, purulent sputum, focal consolidation, or high aspiration risk, treat for pneumonia while awaiting cultures—IPF patients decompensate fast and infections are common triggers of acute worsening.\n- Now: volume management is high yield—many IPF patients have cor pulmonale/diastolic dysfunction; if JVP high, edema, or B-lines with plethoric IVC, give **furosemide 40–80 mg IV** (or home dose IV equivalent) and reassess urine output and oxygen needs.\n- Guideline Must Know: The ATS/ERS/JRS/ALAT **2018 diagnosis guideline** defines HRCT categories (**UIP, probable UIP, indeterminate, alternate**) and supports diagnosis without surgical biopsy when HRCT is **UIP** in the right clinical context; do not push for invasive biopsy overnight.\n- Guideline Must Know: The ATS/ERS/JRS/ALAT **2022 update** emphasizes that **probable UIP** can support IPF diagnosis in the appropriate clinical setting after multidisciplinary discussion, potentially avoiding tissue confirmation; capture prior HRCT reports and ILD clinic notes for the morning team.\n- Guideline Must Know: The **2016 international working group** definition of AE-IPF is an **acute (typically <1 month) respiratory deterioration** with new widespread alveolar abnormality on imaging, and it requires exclusion of **cardiac failure/fluid overload**; document your negative/positive data clearly.\n- Guideline Must Know: The ATS/ERS/JRS/ALAT **2015 treatment guideline update** recommends antifibrotics (nintedanib/pirfenidone) for chronic disease management and discourages ineffective/harmful regimens (e.g., prednisone–azathioprine–N-acetylcysteine); do not start immunosuppressive “ILD cocktails” overnight.\n- Guideline Must Know: The ATS/ERS/JRS/ALAT **2022 update** made conditional recommendations **against antacid medication** and **against antireflux surgery** solely to improve respiratory outcomes in IPF; do not add a PPI “for IPF” unless another indication exists.\n- Guideline Must Know: There is no universally endorsed, high-certainty regimen for AE-IPF; many centers use high-dose glucocorticoids despite limited evidence—treat this as a high-mortality syndrome and prioritize ICU triage, trigger search, and goals-of-care.\n- Can wait (but don’t forget): continue home antifibrotic if already taking and LFTs/tolerability allow; do not newly initiate antifibrotics during an unstable decompensation without pulmonary input.\n- Pitfalls: giving aggressive IV fluids for “AKI” can worsen oxygenation; missing **pneumothorax** (especially after NIV) can be fatal; intubation in IPF has poor outcomes—do not escalate to invasive ventilation without explicit goals-of-care discussion when feasible.\n- Consults to line up: pulmonary/ILD (diagnostic context, steroid decision), ICU (early), cardiology if shock/ischemia, and palliative care if severe baseline disease or recurrent admissions.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Need for **HFNC FiO₂ ≥0.60** or persistent **SpO₂ <88%** despite NRB/HFNC escalation, or rising CO₂/respiratory fatigue.\n- Hemodynamic instability (MAP **<65 mmHg** after limited fluid challenge or need for vasopressors) or new malignant arrhythmia/ischemia.\n- New or enlarging **pneumothorax**, or escalating ventilatory pressures/clinical concern for barotrauma.\n- Rapid progression of infiltrates/new bilateral GGOs with severe dyspnea suggesting AE-IPF, especially if requiring NIV or considering intubation.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Oxygen therapy — {device: NC/NRB/HFNC}, {flow or FiO₂ target to keep SpO₂ 88–92%}\n- Order: Chest X-ray portable — {indication: acute hypoxemia in IPF; rule out pneumothorax/pneumonia}\n- Order: Labs — {CBC, CMP, BNP, troponin}, {ABG or VBG}, {lactate}, {procalcitonin if used locally}\n- Order: Micro/ID — {blood cultures x2}, {sputum culture}, {respiratory viral PCR}, {urinary antigens as indicated}\n- Order: Medications — {empiric antibiotics: ceftriaxone + azithromycin OR piperacillin-tazobactam + azithromycin}, {diuretic: furosemide IV}, {DVT prophylaxis unless contraindicated}\n\n## ABIM Style Question 1\n### Stem\nA 72-year-old man with known idiopathic pulmonary fibrosis presents with 2 days of worsening dyspnea. He is afebrile, BP 128/74 mmHg, HR 106/min, RR 28/min, SpO₂ 84% on 6 L/min nasal cannula. CXR shows no pneumothorax and no focal consolidation. BNP is normal. CT chest shows new bilateral ground-glass opacities superimposed on a background of honeycombing. Which is the most appropriate next step?\n### Options\nA. Start high-dose IV methylprednisolone immediately without further evaluation\nB. Give 2 liters of isotonic saline for possible prerenal azotemia\nC. Obtain blood cultures and start empiric antibiotics while evaluating for triggers\nD. Start amiodarone for presumed atrial tachyarrhythmia-related dyspnea\nE. Discontinue all oxygen to avoid oxygen toxicity\n### Correct answer\nC\n### Rationale\nAcute respiratory worsening in IPF requires urgent stabilization plus evaluation for reversible triggers such as infection, PE, and fluid overload; empiric antibiotics are reasonable when infection cannot be excluded and patients are high risk. The AE-IPF framework requires excluding cardiac failure/fluid overload and other identifiable causes before labeling an idiopathic exacerbation, so therapy should not skip the trigger search.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 68-year-old woman with IPF on home oxygen (2 L/min) is admitted overnight for dyspnea and hypoxemia. She is on bilevel NIV with SpO₂ 90%. Sudden pleuritic chest pain occurs and SpO₂ falls to 78% with increased work of breathing. Exam shows unilateral decreased breath sounds on the right. What is the best next step?\n### Options\nA. Increase PEEP and inspiratory pressure to improve oxygenation\nB. Give IV methylprednisolone 1,000 mg for presumed acute exacerbation\nC. Order a portable chest x-ray immediately and prepare for needle decompression if unstable\nD. Start therapeutic heparin for presumed pulmonary embolism\nE. Administer large-volume IV fluids for possible sepsis\n### Correct answer\nC\n### Rationale\nIPF patients on positive-pressure ventilation are at high risk for pneumothorax/barotrauma; sudden pleuritic pain with unilateral breath-sound loss is a red flag requiring immediate imaging and readiness for emergent decompression. The pitfall is mislabeling abrupt deterioration as AE-IPF and escalating ventilator pressures, which can worsen a tension pneumothorax.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What imaging pattern is required to diagnose IPF in the right clinical context without biopsy? A: HRCT showing a **UIP pattern** can be sufficient when secondary causes are excluded.\n- Q: How long is the typical time window for acute exacerbation of IPF symptom worsening? A: Acute worsening is typically **within 1 month**.\n- Q: What alternative causes must be excluded before calling an event AE-IPF? A: **Cardiac failure/fluid overload** and other identifiable causes of acute lung injury should be excluded.\n- Q: What oxygen saturation target is reasonable during acute decompensation on the floor? A: A pragmatic target is **SpO₂ 88–92%** while escalating support and avoiding respiratory fatigue.\n\n## Guidelines & Key References (3–5 bullets)\n- ATS/ERS/JRS/ALAT Clinical Practice Guideline: Idiopathic Pulmonary Fibrosis (Update) and Progressive Pulmonary Fibrosis in Adults, 2022 — https://www.atsjournals.org/doi/pdf/10.1164/rccm.202202-0399ST\n- ATS/ERS/JRS/ALAT Clinical Practice Guideline: Diagnosis of Idiopathic Pulmonary Fibrosis (Full-length), 2018 — https://www.thoracic.org/statements/resources/interstitial-lung-disease/diagnosis-IPF-full-length.pdf\n- ATS/ERS/JRS/ALAT Clinical Practice Guideline: Treatment of Idiopathic Pulmonary Fibrosis (Update of 2011 guideline), 2015 — https://www.thoracic.org/statements/resources/interstitial-lung-disease/IPF-Full-length.pdf\n- Collard HR et al. Acute Exacerbation of Idiopathic Pulmonary Fibrosis: International Working Group Report, 2016 — https://www.atsjournals.org/doi/pdf/10.1164/rccm.201604-0801CI\n- NICE Clinical Guideline CG163: Idiopathic pulmonary fibrosis in adults: diagnosis and management, 2013 (updated 2017; reviewed 2024) — https://www.nice.org.uk/guidance/cg163\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute hypoxemic respiratory failure due to {suspected pneumonia vs AE-IPF vs pneumothorax} — {SpO₂/ABG}, {O₂ device/FiO₂}, {RR/work of breathing}\n- Idiopathic pulmonary fibrosis with {baseline severity: home O₂ L/min, prior FVC/DLCO if known} — {HRCT UIP/probable UIP}, {need for HFNC/NIV}\n- {Pneumothorax} due to {barotrauma/spontaneous} — {CXR/CT findings}, {hemodynamics}, {intervention: chest tube}\n- Suspected acute exacerbation of IPF — {new bilateral GGO on CT}, {symptom onset <1 month}, {exclusion: BNP/echo/volume status, cultures/viral testing}\n", "sarcoidosis.md": "---\nfilename: sarcoidosis.md\nid: sarcoidosis\ntitle: Sarcoidosis\nslug: sarcoidosis\ntags: [pulmonology, granulomatous-disease, inpatient, night-float, hypercalcemia]\nlevel: resident\nestimatedtimemin: 12\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Sarcoidosis\n\n## Panic Card (3–6 bullets)\n- Assess ABCs and trajectory: mental status, work of breathing, **SpO₂ target ≥92%** (or patient-specific), escalate O₂ (nasal cannula → HFNC → NIV → intubation) if rising requirement or fatigue.\n- Rapidly rule out “can’t miss” mimics in sarcoid patient with dyspnea/fever: **CXR now**, consider **PE**, bacterial pneumonia, pneumothorax, heart failure; treat instability while evaluating.\n- If syncope/presyncope, palpitations, or bradycardia: **ECG now**; if **high-grade AV block** or unstable bradycardia, apply pads and start **transcutaneous pacing** while arranging **temporary pacing**.\n- If symptomatic or severe hypercalcemia suspected (confusion, polyuria, AKI): check **ionized Ca**; start **0.9% saline 250–500 mL bolus** then **100–200 mL/h** (adjust for HF/CKD) and place on telemetry.\n- Confirm Before Proceed: start high-dose glucocorticoids for presumed sarcoid flare only after you have a plan to exclude/cover active infection (cultures/imaging ± empiric antibiotics) and to screen for TB risk when relevant.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Sarcoidosis is a multisystem granulomatous disease; night-float danger is assuming “flare” when the decompensation is infection/PE/HF, and missing organ-threatening involvement (cardiac, neuro, severe hypercalcemia, pulmonary hypertension).\n- Now: for acute hypoxemia, treat as undifferentiated respiratory failure first (O₂ escalation, bronchodilators if wheeze, CXR, ABG/VBG if worsening, cultures if febrile); Can wait: confirm sarcoid activity (PFT trends, outpatient biopsy history) once stabilized.\n- Guideline Must Know: Diagnosis is a 3-part construct: compatible syndrome + non-necrotizing granulomas + exclusion of alternative granulomatous disease; inpatient work-up should avoid anchoring and actively exclude infection, malignancy, and TB/fungal disease when risk factors exist (ATS 2020).\n- Guideline Must Know: Baseline labs to screen for occult organ involvement include **serum calcium**, **creatinine**, **alkaline phosphatase**, and **CBC**; do not miss calcium abnormalities because calcitriol-mediated hypercalcemia can cause AKI, delirium, and arrhythmias (ATS 2020).\n- Hypercalcemia mechanism in sarcoid is often granuloma-driven **↑1,25-(OH)₂ vitamin D**; clues: suppressed PTH, relatively normal/low 25-OH vitamin D, nephrolithiasis/AKI, and shortened QT.\n- Now: if **corrected Ca ≥3.5 mmol/L (≥14 mg/dL)** or neuro/renal/cardiac symptoms, start isotonic fluids (if tolerated), stop thiazides/vitamin D/calcium, and place telemetry; Can wait: definitive cause confirmation once stable.\n- Guideline Must Know: For calcitriol-mediated hypercalcemia from granulomatous disease, glucocorticoids reduce calcitriol production; typical inpatient start is **prednisone 20–40 mg PO daily** (or equivalent) when hypercalcemia is symptomatic/significant and infection is not the driver (ERS 2021; endocrine emergency guidance supports urgent correction thresholds).\n- If severe hypercalcemia and symptomatic, add temporizing therapy: **calcitonin 4 units/kg SC/IM q12h** (may increase to **8 units/kg q6–12h**) while waiting for slower measures; consider antiresorptives if malignancy is in differential, but recognize they do not address calcitriol overproduction.\n- Pulmonary sarcoid flares are a diagnosis of exclusion in the hospital: fever, leukocytosis, and new infiltrates should trigger antibiotics and cultures until infection is reasonably excluded, especially in those on steroids/biologics.\n- Guideline Must Know: Systemic glucocorticoids are first-line for symptomatic pulmonary sarcoidosis and many organ-threatening manifestations; use the lowest effective dose and plan steroid-sparing follow-up (methotrexate/azathioprine/infliximab depending on organ) per treatment guidance (ERS 2021).\n- Cardiac sarcoidosis red flags on nights: **new AV block**, ventricular arrhythmias, unexplained syncope, cardiomyopathy, or recurrent “idiopathic” VT; treat rhythm instability first, then pursue advanced imaging and multidisciplinary management.\n- Guideline Must Know: High-grade conduction disease in suspected cardiac sarcoidosis warrants urgent pacing strategy (temporary if unstable) and evaluation for ICD/pacemaker candidacy; diagnosis/management frameworks emphasize CMR and FDG-PET to assess inflammation and guide immunosuppression in symptomatic disease (AHA scientific statement 2024; HRS consensus 2014).\n- Neuro involvement can present as acute meningitis-like symptoms, seizures, cranial neuropathies, or myelopathy; if focal deficits or cord symptoms, treat as a neurologic emergency: MRI brain/spine with contrast and urgent neurology consult; avoid delaying decompression/CSF diversion when hydrocephalus is suspected.\n- Sarcoid-associated pulmonary hypertension can decompensate with hypoxemia and RV failure; night priorities are oxygenation, diuresis if congested, and early ICU/pulmonary consult rather than empiric pulmonary vasodilators without confirmation.\n- Pitfalls: giving diuretics early for hypercalcemia without adequate hydration; escalating steroids in a febrile immunosuppressed patient without cultures/antibiotics; missing **complete heart block** on “fatigue” complaints; and attributing all dyspnea to sarcoid when PE/HF are common in real life.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **SpO₂ <90%** despite **FiO₂ ≥0.60** (HFNC/NIV), rising PaCO₂ with fatigue, or need for intubation.\n- **High-grade AV block**, sustained VT/VF, syncope with malignant ectopy, or hemodynamic instability requiring pacing/pressors.\n- **Corrected Ca ≥3.5 mmol/L (≥14 mg/dL)** with delirium, arrhythmia, pancreatitis, or AKI/oliguria despite initial therapy.\n- New focal neurologic deficit, seizure, meningitis-like presentation, or suspected cord compression/hydrocephalus.\n- Shock, rapidly rising lactate, or concern for opportunistic infection in an immunosuppressed sarcoid patient.\n\n## Orders to Place Now (3–6 bullets)\n- Order: CBC with differential, CMP, magnesium, phosphate, ionized calcium — {stat}\n- Order: 12-lead ECG and continuous telemetry — {now}\n- Order: Chest x-ray portable — {stat}\n- Order: 0.9% sodium chloride IV — {bolus_ml} mL then {rate_ml_hr} mL/h (adjust for HF/CKD)\n- Order: Blood cultures x2, sputum culture, procalcitonin; start empiric antibiotics per suspected source — {fever_yes_no}, {antibiotic_choice}\n- Order: Prednisone PO or methylprednisolone IV — {dose_mg}, {route}, {start_after_infection_plan_yes_no}\n\n## ABIM Style Question 1\n### Stem\nA 42-year-old woman with known pulmonary sarcoidosis is admitted overnight for confusion and weakness. Vitals: T 37.1°C, HR 102, BP 118/70, SpO₂ 96% on room air. Labs: corrected calcium **14.6 mg/dL (3.65 mmol/L)**, creatinine 1.9 mg/dL (baseline 0.9), phosphate low, PTH suppressed. She is not taking thiazides, calcium supplements, or vitamin D. After a 1 L normal saline bolus, she remains confused. Which is the best next therapy to address the underlying mechanism most consistent with her presentation?\n\n### Options\nA. IV furosemide 40 mg now  \nB. IM calcitonin 4 units/kg every 12 hours  \nC. IV zoledronic acid 4 mg once  \nD. Prednisone 40 mg by mouth daily  \nE. Cinacalcet 30 mg by mouth twice daily  \n\n### Correct answer\nD\n\n### Rationale\nGranulomatous disease commonly causes hypercalcemia via increased extrarenal calcitriol production; **glucocorticoids** reduce calcitriol generation and are the most mechanism-directed therapy after initial supportive care. Calcitonin can temporize symptoms but does not address the driver, and bisphosphonates are primarily mechanism-directed for malignancy-related osteoclast activation. Diuretics without adequate hydration can worsen volume depletion and AKI.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 58-year-old man with biopsy-proven sarcoidosis and end-stage kidney disease on hemodialysis (anuric) presents overnight with lethargy and nausea. ECG shows a shortened QT interval. Corrected calcium is **15.2 mg/dL (3.80 mmol/L)** with suppressed PTH. He is mildly dyspneic at baseline and has elevated JVP. Which is the best immediate management approach?\n\n### Options\nA. Aggressive 0.9% saline infusion at 250 mL/h overnight  \nB. IV pamidronate 90 mg once  \nC. IM calcitonin 4 units/kg every 12 hours and arrange urgent hemodialysis  \nD. Start prednisone 40 mg daily and reassess calcium in 24 hours without other intervention  \nE. IV furosemide 80 mg now to promote calciuresis  \n\n### Correct answer\nC\n\n### Rationale\nThis patient has **severe symptomatic hypercalcemia** with a key pitfall: **anuric ESRD and volume overload**, which limits saline-driven calciuresis and makes dialysis the fastest definitive removal strategy. Calcitonin provides rapid temporary lowering while arranging urgent dialysis; glucocorticoids may treat calcitriol-mediated hypercalcemia but is not sufficient as the sole immediate intervention in severe symptomatic cases. What changed the decision here?\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What three criteria support a sarcoidosis diagnosis? A: Compatible clinical picture, non-necrotizing granulomas on tissue, and exclusion of alternative granulomatous causes.\n- Q: Which vitamin D metabolite is often elevated in sarcoidosis-related hypercalcemia? A: 1,25-dihydroxyvitamin D.\n- Q: Name two cardiac “red flag” presentations that should raise concern for cardiac sarcoidosis. A: High-grade atrioventricular block and sustained ventricular tachycardia.\n- Q: What is a typical initial prednisone dose range for symptomatic sarcoidosis treatment in many scenarios? A: Prednisone **20–40 mg daily** (dose varies by organ severity and urgency).\n\n## Guidelines & Key References (3–5 bullets)\n- American Thoracic Society (ATS) Clinical Practice Guideline: Diagnosis and Detection of Sarcoidosis (2020): https://www.atsjournals.org/doi/pdf/10.1164/rccm.202002-0251ST\n- European Respiratory Society (ERS) Clinical Practice Guidelines: Treatment of Sarcoidosis (2021): https://doi.org/10.1183/13993003.04079-2020\n- American Heart Association Scientific Statement: Diagnosis and Management of Cardiac Sarcoidosis (2024): https://www.ahajournals.org/doi/pdf/10.1161/CIR.0000000000001240?download=true\n- Heart Rhythm Society (HRS) Expert Consensus: Arrhythmias Associated With Cardiac Sarcoidosis (2014): https://www.hrsonline.org/wp-content/uploads/2025/02/2014-Arrhythmias-Associated-with-Cardiac-Sarcoidosis.pdf\n- Society for Endocrinology Emergency Guidance: Emergency Management of Acute Hypercalcaemia in Adults (2016): https://www.endocrinology.org/media/4277/emergency-guidance_acute-hypercalcaemia-in-adults.pdf\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute hypoxemic respiratory failure due to suspected pulmonary sarcoidosis flare vs pneumonia — severity {SpO2}, {FiO2/O2_device}, {RR/ABG}; objective {CXR/CT}; treatment {HFNC/NIV}, {antibiotics}, {steroids}\n- Symptomatic severe hypercalcemia due to granulomatous disease (sarcoidosis) — acuity {acute/subacute}; severity **{corrected_Ca}** with organ dysfunction {AKI/delirium/arrhythmia}; evidence {PTH_suppressed, QT_short}; treatment {IV_fluids_if_tolerated, calcitonin, steroids, dialysis_if_ESRD}\n- Cardiac sarcoidosis suspected with conduction disease — diagnosis {high-grade_AV_block}; objective {ECG_findings, HR, syncope}; severity {hemodynamic_instability}; intervention {transcutaneous/temporary_pacing}, consult {cardiology/EP}\n- Neurosarcoidosis suspected — acuity {new_deficit/seizure/AMS}; evidence {MRI_findings/LP_results}; severity {airway_risk/ICP_concern}; treatment {antiepileptics, ICU_monitoring, high-dose_steroids_after_infection_plan}\n", "tuberculosis.md": "---\nfilename: tuberculosis.md\nid: tuberculosis\ntitle: Tuberculosis\nslug: tuberculosis\ntags: [infectious-disease, pulmonary, airborne, isolation, night-float]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Tuberculosis\n\n## Panic Card (3–6 bullets)\n- Place patient in airborne infection isolation room (negative pressure if available); staff use fit-tested **N95/FFP2 or PAPR**; put **surgical mask on patient** for any transport.\n- If unstable: ABCs, continuous monitoring, IV access; target **SpO₂ ≥92%** (or individualized if chronic hypercapnia) and treat shock with **MAP ≥65 mmHg** while maintaining airborne precautions.\n- If massive hemoptysis or respiratory distress: call ICU now; position bleeding side down if known, prepare for airway protection and interventional radiology/bronchoscopy support (aerosol-generating—keep airborne precautions).\n- Send urgent diagnostics without delaying isolation: collect **3 sputum specimens** (preferably **8–24 h apart**, with at least one early morning if feasible) for AFB smear/culture and NAAT; add baseline labs before RIPE.\n- If high suspicion of TB meningitis/pericarditis/miliary TB: start empiric anti-TB therapy promptly and consult ID/TB expert and relevant specialty (neuro/cards) overnight.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Night-float priority is transmission prevention + rapid rule-in/out: pulmonary/laryngeal TB is the major contagious form; initiate airborne precautions immediately for compatible symptoms (subacute cough, weight loss, night sweats, hemoptysis) plus CXR/CT findings (upper lobe infiltrates/cavitation) or epidemiologic risk.\n- Guideline Must Know: In health care settings, TB infection control relies first on administrative controls (rapid triage/isolation), then environmental controls (AII/negative pressure), then respiratory protection (N95/PAPR for staff; surgical mask for patient during transport).\n- Guideline Must Know: For suspected pulmonary TB, obtain microbiology with sputum AFB smear/culture plus rapid molecular testing (NAAT) to speed diagnosis and detect resistance patterns (e.g., rifampin resistance) where available; do not wait for all results to begin isolation.\n- Guideline Must Know: Standard treatment for drug-susceptible pulmonary TB has historically been **2 months HRZE** then **4 months HR** (total **6 months**) under TB program oversight, with weight-based dosing and **pyridoxine (vitamin B6) 25–50 mg/day** with isoniazid.\n- Guideline Must Know: Updated ATS/CDC/ERS/IDSA guidance supports a **4-month regimen** for eligible people ≥12 years with drug-susceptible pulmonary TB: **2 months HPZM** (isoniazid + rifapentine + pyrazinamide + moxifloxacin) then **2 months HPM**, which can reduce duration when criteria are met and drug interactions/QT risk are addressed.\n- Guideline Must Know: Rifamycin drug–drug interactions are common and clinically important (e.g., reduced efficacy of many anticoagulants, antiretrovirals, transplant immunosuppressants, and hormonal contraception); flag interaction risk overnight and involve pharmacy/ID/TB program early.\n- Guideline Must Know: Do not start latent TB infection treatment until active TB disease is excluded (symptoms/imaging/microbiology), because monotherapy can select resistance.\n- What must happen now: airborne isolation, notify infection prevention and the local/state TB program per policy, and identify high-risk staff exposures (aerosol-generating procedures, unprotected contact) for occupational health follow-up.\n- What must happen now: diagnostic bundle—sputum induction if needed (airborne precautions), AFB smear/culture, NAAT; baseline CXR; HIV test; CMP (AST/ALT/bili/alk phos), CBC, creatinine; pregnancy test when relevant; baseline visual acuity/color testing if ethambutol planned and patient can cooperate.\n- What can wait (but queue tonight): risk stratify for drug-resistant TB (prior TB treatment, known exposure to MDR/RR-TB, origin/residence in high-burden settings) and arrange early ID/TB expert involvement; initial inpatient regimen decisions should be coordinated with TB program whenever possible.\n- Empiric inpatient therapy when active TB is likely (especially if AFB smear/NAAT positive or critically ill): start weight-based RIPE while awaiting susceptibilities unless resistance suspected—typical adult daily doses: isoniazid **5 mg/kg (max 300 mg)**, rifampin **10 mg/kg (max 600 mg)**, pyrazinamide **20–25 mg/kg (max 2,000 mg)**, ethambutol **15–20 mg/kg (max 1,600 mg)** plus **pyridoxine 25–50 mg/day**; adjust for renal/hepatic disease and drug interactions.\n- Pitfalls that burn night float: giving a fluoroquinolone “for pneumonia” can transiently improve TB symptoms and complicate diagnosis/resistance evaluation; if TB is on the differential, discuss antibiotic choice with ID and prioritize mycobacterial testing.\n- Confirm Before Proceed: discontinue airborne isolation or “clear” a patient for routine ward placement only after meeting your institution/TB program criteria (often requiring clinical improvement plus microbiologic criteria); do not stop precautions solely because a single smear is negative.\n- Extrapulmonary emergencies to recognize: TB meningitis (headache, fever, cranial neuropathies, altered mental status), pericarditis with tamponade physiology, spinal TB with neurologic deficits, and miliary TB with hypoxemia/shock—these require urgent specialty consults and often adjunctive steroids per expert guidance.\n- When to call ICU/consults early: worsening oxygen needs, large-volume hemoptysis, severe sepsis, inability to safely obtain sputum (need bronchoscopy/intubation), or concern for MDR/RR-TB where early regimen changes are time-sensitive.\n- Disposition and public health: most active TB cases require coordinated discharge planning (DOT/vDOT, housing/transport safety, contact investigation); flag barriers overnight to case management and the TB program.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Any need for ventilatory support (HFNC/NRB escalation, NIV, intubation) or rapidly increasing oxygen requirement.\n- Hemodynamic instability: persistent hypotension despite fluids or need for vasopressors to maintain **MAP ≥65 mmHg**.\n- Massive hemoptysis (e.g., **≥150 mL/24 h** or airway-threatening bleeding) or respiratory acidosis/altered mental status from respiratory failure.\n- Suspected TB meningitis/pericardial tamponade/spinal cord compression, or suspicion for MDR/RR-TB needing urgent expert-guided regimen change.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Airborne isolation — {negative-pressure room if available}, {N95/PAPR for staff}, {patient surgical mask for transport}\n- Order: Sputum AFB smear + mycobacterial culture x3 — {collection times 8–24 h apart}, {induced sputum if needed}\n- Order: Mycobacterium tuberculosis NAAT — {sputum specimen}, {add rifampin resistance detection if available}\n- Order: Baseline labs prior to anti-TB therapy — {CBC}, {CMP with AST/ALT/bilirubin/alk phos}, {creatinine/eGFR}, {HIV Ag/Ab}, {pregnancy test if applicable}\n- Order: TB treatment consult/notification — {infectious diseases consult}, {infection prevention}, {local/state TB program contact}\n\n## ABIM Style Question 1\n\n### Stem\nA 54-year-old man is admitted overnight with 6 weeks of cough, fevers, night sweats, and 10-lb weight loss. Chest radiograph shows right upper-lobe cavitary disease. He is saturating 95% on room air and is hemodynamically stable. Which of the following is the most appropriate immediate next step?\n\n### Options\nA. Start isoniazid monotherapy and arrange outpatient follow-up  \nB. Place the patient on airborne precautions and obtain sputum for AFB smear/culture and NAAT  \nC. Discontinue isolation if the first sputum AFB smear is negative  \nD. Give azithromycin and ceftriaxone for community-acquired pneumonia and reassess in 48 hours  \nE. Order a tuberculin skin test and defer further testing until the result returns\n\n### Correct answer\nB\n\n### Rationale\nSuspected contagious pulmonary TB requires immediate airborne precautions and prompt microbiologic evaluation with sputum AFB smear/culture and rapid molecular testing (NAAT).\nNeither TST nor IGRA is sufficient to evaluate active TB disease, and negative early smears do not reliably exclude infectious TB or justify stopping isolation.\n\n## Second ABIM Style Case (Pitfall Variant)\n\n### Stem\nA 63-year-old man with end-stage kidney disease on hemodialysis is diagnosed with drug-susceptible pulmonary tuberculosis based on positive sputum NAAT. The night team plans to start standard therapy. Which approach best addresses a key pitfall for this patient?\n\n### Options\nA. Give full-dose daily pyrazinamide and ethambutol without adjustment because dialysis clears both drugs  \nB. Avoid pyridoxine because it reduces the efficacy of isoniazid  \nC. Adjust renally cleared agents and coordinate dosing after dialysis while continuing isoniazid and a rifamycin as appropriate  \nD. Use isoniazid monotherapy until culture susceptibilities return to minimize toxicity  \nE. Delay treatment initiation until the next outpatient dialysis session to allow DOT\n\n### Correct answer\nC\n\n### Rationale\nPyrazinamide and ethambutol require renal dosing consideration in severe CKD/ESRD, and therapy should be coordinated with the TB program/ID (often including post-dialysis scheduling) rather than given as unadjusted daily full doses.\nThe pitfall is assuming “standard dosing fits all” in ESRD—renal dysfunction increases toxicity risk, while delaying or under-treating increases transmission and resistance risk.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What must be excluded before starting latent TB infection treatment? A: Active TB disease must be excluded with symptom assessment and appropriate diagnostic evaluation because monotherapy can select resistance.\n- Q: What vitamin is routinely co-prescribed with isoniazid for adults to reduce neuropathy risk? A: Pyridoxine (vitamin B6) **25–50 mg daily** is commonly given with isoniazid.\n- Q: What type of precautions are required for suspected infectious pulmonary TB in the hospital? A: Airborne precautions with an airborne infection isolation room when available and N95/PAPR for staff.\n- Q: Name one key system-level action to reduce transmission that should happen the first night. A: Rapid triage/isolation and notification of infection prevention/TB program to coordinate evaluation and exposure management.\n\n## Guidelines & Key References (3–5 bullets)\n- ATS/CDC/ERS/IDSA: Updates on the Treatment of Drug-Susceptible and Drug-Resistant Tuberculosis (published Dec 2024; highlighted by CDC 2025) — https://www.idsociety.org/practice-guideline/treatment-of-drug-susceptible-tb/treatment-of-drug-resistant-and-drug-susceptible-tb-2025-update/\n- CDC: Treatment for Drug-Susceptible Tuberculosis Disease (updated 2025) — https://www.cdc.gov/tb/hcp/treatment/tuberculosis-disease.html\n- CDC/NTCA: Guidelines for the Treatment of Latent Tuberculosis Infection (MMWR 2020) — https://www.cdc.gov/mmwr/volumes/69/rr/rr6901a1.htm\n- CDC: Tuberculosis Infection Control (health care settings; links to 2005 transmission-prevention guideline) — https://www.cdc.gov/tb-healthcare-settings/hcp/infection-control/index.html\n- WHO: Consolidated guidelines on TB, Module 3 Diagnosis—Rapid diagnostics for TB detection, 3rd ed (2024) — https://www.who.int/publications/i/item/9789240089488\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Active pulmonary tuberculosis — {suspected vs confirmed} — {evidence: symptoms, imaging findings, NAAT/AFB results} — {airborne isolation initiated}\n- Acute hypoxemic respiratory failure — {present/absent} — {severity: O₂ device/flow, SpO₂/ABG} — {cause: suspected TB vs other} — {monitoring/escalation plan}\n- Sepsis due to suspected pulmonary tuberculosis — {organ dysfunction criteria if present} — {lactate, MAP/pressor need, cultures/NAAT sent} — {antimicrobials/anti-TB plan}\n- Hemoptysis — {volume estimate/24 h} — {hemodynamic/airway impact} — {imaging/consults: ICU/IR/pulm} — {airway precautions}\n", "bronchiectasis.md": "---\nfilename: bronchiectasis.md\nid: bronchiectasis\ntitle: Bronchiectasis\nslug: bronchiectasis\ntags: [pulmonology, inpatient, respiratory-failure, infection, night-float]\nlevel: resident\nestimatedtimemin: 12\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Bronchiectasis\n\n## Panic Card (3–6 bullets)\n- Airway/breathing: apply oxygen to **SpO₂ ≥92%** (or individualized if chronic hypercapnia suspected), place on continuous pulse oximetry, and escalate to **HFNC/NIV** for increased work of breathing or persistent hypoxemia.\n- Sepsis screen: if **T ≥38.3°C**, **SBP <90/MAP <65**, lactate elevated, or new delirium, start sepsis bundle (blood cultures, lactate, fluids as appropriate) and give **IV antibiotics within 1 hour** if septic shock suspected.\n- Treat suspected exacerbation now: obtain sputum for Gram stain/culture (and consider AFB if indicated) before antibiotics when feasible, then start empiric coverage tailored to prior cultures (especially **Pseudomonas** history).\n- Airway clearance immediately: bronchodilator trial then airway clearance (chest physiotherapy/PEP/oscillatory device) and adequate hydration; avoid suppressing cough unless life-threatening.\n- Hemoptysis: if **>150 mL/24 h**, airway compromise, or hemodynamic instability, protect airway, hold anticoagulants/antiplatelets when safe, activate ICU/IR for urgent CTA/bronchial artery embolization pathway.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Bronchiectasis is a chronic syndrome of cough/sputum with CT-confirmed permanent airway dilation; at night, the high-risk problems are hypoxemic/hypercapnic respiratory failure, sepsis from infectious exacerbation, and hemoptysis—prior microbiology (especially **Pseudomonas aeruginosa**) should drive immediate choices.\n- Separate “now vs can wait”: now = stabilize oxygenation/ventilation, assess for sepsis, send cultures, start appropriately broad antibiotics, and start airway clearance; can wait = full etiologic workup, long-term prevention plan, and outpatient physiotherapy optimization once the patient is safe.\n- Guideline Must Know: teach and implement airway clearance techniques for most patients with clinically significant bronchiectasis; during exacerbations, intensify clearance (bronchodilator before ACTs if bronchospasm) because secretion retention worsens ventilation-perfusion mismatch and infection burden.\n- Guideline Must Know: do not routinely use inhaled corticosteroids for bronchiectasis unless there is another indication (asthma/COPD with eosinophilia); avoid reflexively adding steroids overnight “for inflammation” without a clear co-diagnosis.\n- Guideline Must Know: assess exacerbation risk and severity—patients at high risk (e.g., **≥2 exacerbations/year** or severe exacerbation history) are candidates for long-term prevention strategies (macrolide and/or inhaled antibiotics) once stabilized; overnight, document frequency/severity to tee up appropriate follow-up.\n- Guideline Must Know: long-term macrolides are strongly recommended for patients at high exacerbation risk despite standard care; for inpatients, the “must do now” is to check baseline QT risk/med list, obtain ECG if starting/continuing macrolide, and avoid dangerous combinations.\n- Guideline Must Know: long-term inhaled antibiotics are strongly recommended for high-risk patients with chronic **Pseudomonas** infection despite standard care; in the hospital, this matters because prior chronic Pseudomonas should push empiric systemic therapy toward antipseudomonal agents during exacerbation.\n- Guideline Must Know: use eradication attempts in select situations (notably new isolation of **Pseudomonas** in some protocols), but overnight priorities are correct culture collection, reviewing prior sensitivities, and avoiding under-treatment when the patient is unstable or has prior resistant organisms.\n- Infectious exacerbation treatment is pathogen- and severity-driven: mild/moderate = oral antibiotics tailored to prior sputum when safe; severe/systemic toxicity/hypoxemia = **IV antibiotics**, consider dual coverage if high resistance risk, and reassess at **48–72 h** with culture results and clinical response.\n- Always consider mimics/overlap at night: pneumonia, pulmonary embolism, CHF, COPD/asthma flare; obtain CXR and ABG/VBG if rising CO₂ suspected, and do not anchor on “baseline bronchiectasis” when there is new focal consolidation, pleuritic pain, or unexplained tachycardia.\n- Hemoptysis approach: quantify volume/time, check Hgb/platelets/coags, type and screen if significant; stabilize airway first, reverse coagulopathy only when benefits outweigh thrombosis risk, and prioritize CTA chest when bleeding is ongoing or recurrent to guide IR intervention.\n- Night-float pitfall: missing nontuberculous mycobacteria (NTM) in nodular/bronchiectatic disease—if chronic weight loss, night sweats, cavitation, or recurrent “culture-negative” exacerbations, send **AFB smear/culture** (multiple sputums if possible) and avoid starting chronic macrolide monotherapy without ruling out NTM.\n- Etiology clues you can capture overnight (for daytime follow-up): immune deficiency (recurrent infections), ABPA (asthma, eosinophilia, elevated IgE), aspiration/GERD, autoimmune disease, and severe sinus disease; documenting these prompts targeted testing recommended in major bronchiectasis guidance.\n- Call ICU early when respiratory mechanics deteriorate: escalating O₂ needs, fatigue, rising CO₂/acidosis, or inability to clear secretions; consider noninvasive ventilation for hypercapnic failure, but plan for intubation if mental status worsens or airway protection is compromised.\n- Disposition/consults: pulmonology for severe/recurrent exacerbations, chronic Pseudomonas/NTM concern, or significant hemoptysis; infectious diseases for multidrug-resistant organisms or NTM treatment planning; interventional radiology emergently for massive/recurrent hemoptysis with imaging target.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Need for **HFNC**, **NIV**, or impending intubation (rising CO₂ with acidemia, worsening mental status, or refractory hypoxemia despite escalating support).\n- Hemoptysis with airway compromise or **massive bleeding** (e.g., **>150 mL/24 h** or rapid ongoing bleeding), hemodynamic instability, or Hgb drop with continued bleeding.\n- Sepsis physiology: **MAP <65 mmHg** after initial resuscitation, lactate rising, or persistent organ dysfunction (oliguria, altered mental status) attributable to infection.\n- High-risk microbiology/therapy complexity: prior **Pseudomonas** with resistance, suspicion for NTM, or failure of empiric antibiotics at **48–72 h** (consider pulmonology/ID).\n- Inability to clear secretions with escalating work of breathing or recurrent aspiration events requiring airway protection assessment.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Oxygen therapy — {delivery_device}, titrate to {spo2_target}; continuous pulse oximetry — {on_unit_monitoring}\n- Order: Labs — {cbc}, {cmp}, {crp_or_procalcitonin_if_used}, {lactate_if_sepsis}, {abg_or_vbg_if_hypercapnia_suspected}\n- Order: Microbiology — Sputum Gram stain/culture — {sputum_collection_method}; Blood cultures x2 — {prior_to_antibiotics_if_possible}; Consider AFB smear/culture — {ntm_risk_yes_no}\n- Order: Imaging — Chest X-ray — {portable_yes_no}; CTA chest — {if_significant_hemoptysis_or_unclear_source}\n- Order: Respiratory therapy — Airway clearance session — {technique_device}; bronchodilator trial — {albuterol_dose} prior to clearance if wheeze/bronchospasm\n\n## ABIM Style Question 1\n### Stem\nA 67-year-old man with known bronchiectasis is admitted overnight for worsening cough, increased purulent sputum, and dyspnea. He is febrile to 38.6°C, HR 112, BP 118/66, RR 26, and SpO₂ 88% on room air (improves to 94% on 3 L nasal cannula). He has had two hospitalizations in the past year for bronchiectasis exacerbations and previously grew Pseudomonas aeruginosa in sputum. Chest X-ray shows no new focal consolidation. Which is the most appropriate empiric antibiotic approach tonight?\n### Options\nA. Oral amoxicillin-clavulanate\nB. Oral azithromycin monotherapy\nC. IV ceftriaxone plus azithromycin\nD. IV antipseudomonal beta-lactam (e.g., piperacillin-tazobactam)\nE. Withhold antibiotics until sputum culture results return\n### Correct answer\nD\n### Rationale\nPrior isolation of **Pseudomonas aeruginosa** is a key driver of empiric therapy choice in bronchiectasis exacerbations; severe symptoms requiring hospitalization warrant antipseudomonal coverage while cultures are pending.\nMacrolide monotherapy is not appropriate for acute inpatient exacerbations and risks resistance; delaying antibiotics in a sick hospitalized patient is not recommended.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 72-year-old woman with bronchiectasis and recurrent exacerbations is admitted for increased sputum and hypoxemia. She is started on azithromycin and cefepime. Her telemetry shows frequent PVCs, and an ECG reveals QTc 520 ms. Potassium is 3.2 mmol/L and magnesium is 1.5 mg/dL. She is otherwise hemodynamically stable. Which is the best next step?\n### Options\nA. Continue azithromycin and recheck ECG in the morning\nB. Stop azithromycin, aggressively replete potassium and magnesium, and use a non-macrolide alternative guided by prior cultures\nC. Add fluconazole to prevent fungal overgrowth during antibiotics\nD. Start chronic azithromycin daily for 12 months because she has frequent exacerbations\nE. Switch to inhaled corticosteroid therapy to reduce airway inflammation\n### Correct answer\nB\n### Rationale\nThe pitfall is **QT prolongation with macrolides** in a patient with electrolyte abnormalities; QTc **>500 ms** plus hypokalemia/hypomagnesemia increases torsades risk, so st

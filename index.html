op the offending agent and correct electrolytes while selecting alternative coverage based on prior microbiology.\nLong-term macrolide prevention is guideline-supported only after stabilization and safety screening, not in the setting of dangerous QT prolongation.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What chronic pathogen history most strongly shifts empiric inpatient antibiotics toward antipseudomonal coverage in bronchiectasis exacerbation? A: Prior or chronic isolation of Pseudomonas aeruginosa in sputum/airway cultures.\n- Q: What is the first-line nonpharmacologic intervention recommended for most bronchiectasis patients to reduce symptoms/exacerbations? A: Instruction and use of airway clearance techniques (respiratory physiotherapy-taught).\n- Q: What is a key reason to avoid chronic macrolide monotherapy without further evaluation in suspected NTM-associated nodular/bronchiectatic disease? A: It can promote macrolide resistance in NTM and compromise future treatment efficacy.\n- Q: Name one objective situation that warrants urgent escalation for hemoptysis in bronchiectasis. A: Massive or ongoing hemoptysis with airway compromise or hemodynamic instability.\n\n## Guidelines & Key References (3–5 bullets)\n- European Respiratory Society clinical practice guideline for management of adult bronchiectasis (2025): https://publications.ersnet.org/content/erj/66/6/2501126\n- British Thoracic Society Guideline for bronchiectasis in adults (2019): https://thorax.bmj.com/content/74/Suppl_1/1.full.pdf\n- ATS/ERS/ESCMID/IDSA guideline on treatment of nontuberculous mycobacterial pulmonary disease (2020): https://www.idsociety.org/practice-guideline/nontuberculous-mycobacterial-ntm-diseases/\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute hypoxemic respiratory failure — {acuity}; cause {bronchiectasis_exacerbation_vs_pneumonia_vs_other}; severity {spo2_on_ra}, {o2_device_flow}; objective {rr}, {abg_vbg_if_done}; treatment {oxygen_hfnc_niv}\n- Sepsis due to pulmonary source — {suspected_pathogen_if_known}; organ dysfunction {lactate}, {ams}, {aki}; objective {temp}, {hr}, {bp_map}; treatment {iv_antibiotics}, {fluids}, {pressors_if_any}\n- Bronchiectasis acute exacerbation — triggers {infection}, {aspiration}, {nonadherence}; objective {increased_sputum_volume_purulence}, {fever}, {wbc}; microbiology {prior_pseudomonas_yes_no}; treatment {antibiotic_name_route}, {airway_clearance}\n- Hemoptysis — acuity {active_vs_resolved}; estimated volume {ml_per_24h}; cause {bronchiectasis_vs_other}; objective {hgb_trend}, {coags}, {imaging}; actions {anticoag_held_yes_no}, {cta_ir_consult}\n", "chronic-cough.md": "---\nfilename: chronic-cough.md\nid: chronic-cough\ntitle: Chronic cough\nslug: chronic-cough\ntags: [pulmonology, inpatient, night-float, diagnostic-approach, cough]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Chronic cough\n\n## Panic Card (3–6 bullets)\n- Assess ABCs and vitals now; if **SpO₂ <90%** (or **<88%** in known chronic hypercapnia) start oxygen and escalate respiratory support to target **SpO₂ 88–92%** (COPD risk) or **≥92%** otherwise.\n- If hemoptysis present: quantify, place on continuous pulse oximetry, keep **NPO**, position bleeding side down if suspected, obtain STAT CXR, and call ICU/pulmonology for **airway planning**.\n- If stridor, voice change, drooling, or rapidly progressive dyspnea: treat as impending airway obstruction; call ICU/ENT/anesthesia and prepare for **early airway control**.\n- If chest pain, syncope, or new hypoxemia: evaluate for PE/ACS; obtain ECG and consider urgent CT pulmonary angiography if unstable pattern.\n- Avoid sedating antitussives if altered mental status, hypercapnia risk, or aspiration risk; prioritize treating the cause over suppressing cough.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- First, define the problem: chronic cough is **>8 weeks**; in the hospital it often presents as an “old” symptom plus a “new trigger” (fluid overload, infection, medication change, aspiration, oxygen/neb irritation) that worsens overnight.\n- What must happen now: screen for red flags that change disposition tonight: **hemoptysis**, **SpO₂ <90%**, **RR ≥30**, **new confusion**, **hypotension**, **stridor**, **unilateral leg swelling**, **pleuritic chest pain**, **fever with neutropenia**, or **rapid progression**; these merit urgent imaging, escalation, and often consults.\n- What must happen now: get a focused history you can act on at 02:00: onset and duration, dry vs productive, hemoptysis volume, triggers (lying flat, meals, talking), wheeze, heartburn/regurgitation, post-nasal drip, smoking/vaping, ACE inhibitor use, immunosuppression, TB risk, and aspiration risk (sedatives, dysphagia, recent vomiting).\n- What must happen now: do targeted exam and bedside tests that change management: lung sounds (wheeze vs crackles), volume status, oropharynx/nasal drainage, signs of DVT, and review current meds (ACE inhibitor, beta-blocker bronchospasm, amiodarone toxicity, opioids causing hypoventilation/aspiration).\n- Guideline Must Know: Chronic cough algorithms emphasize ruling out common etiologies first (upper airway cough syndrome, asthma/cough-variant asthma, nonasthmatic eosinophilic bronchitis, GERD) while identifying dangerous causes; obtain **CXR** early when chronic cough is newly evaluated, when symptoms change, or when red flags are present.\n- Guideline Must Know: If the patient is taking an ACE inhibitor, stop it as a diagnostic/therapeutic trial; ACE inhibitor cough can persist but typically improves within **1–4 weeks** after discontinuation, so do not “stack” multiple new therapies the same night unless unstable.\n- Guideline Must Know: In suspected asthma/cough-variant asthma, avoid SABA-only strategy; if bronchospasm is present, use inhaled bronchodilator and ensure anti-inflammatory therapy planning (inpatient start or outpatient follow-up), and reassess for triggers (viral illness, beta-blockers, NSAIDs in susceptible patients).\n- Guideline Must Know: For suspected nonasthmatic eosinophilic bronchitis (chronic cough, **normal spirometry**, no classic wheeze, eosinophilia/sputum eosinophils), an inhaled corticosteroid trial is reasonable; the pitfall is dismissing the cough because spirometry is normal.\n- Guideline Must Know: For suspected reflux-related cough, do not reflexively start indefinite PPI therapy without features of reflux or without a plan; use a time-limited trial and address nocturnal reflux mechanics (head-of-bed elevation, avoid late meals) while arranging outpatient testing if persistent.\n- Guideline Must Know: Unexplained chronic cough after guideline-based evaluation should prompt structured assessment and targeted trials rather than “everything at once”; consider referral for cough suppression therapy and neuromodulators only after common causes are addressed and red flags excluded.\n- Night-float practical triage: if cough is worsening overnight with new oxygen need, fever, or purulence, prioritize pneumonia/aspiration workup (CXR, cultures if severe, start antibiotics when indicated) and evaluate for CHF if orthopnea, crackles, edema, or rising BNP/weight.\n- Night-float practical triage: in COPD/OSA/obesity hypoventilation risk, avoid over-oxygenation and avoid sedating antitussives; monitor CO₂ retention risk (consider VBG/ABG if somnolent, headache, asterixis, or rising bicarbonate).\n- Pitfalls: nebulized beta-agonists can cause tachycardia and anxiety that patients interpret as “worsening breathing”; anchor on objective data (work of breathing, **SpO₂**, wheeze response) before escalating to unnecessary CT imaging.\n- Pitfalls: hemoptysis is often miscalled “blood-streaked sputum”; quantify volume and look for anticoagulation/antiplatelet exposure; consider bronchiectasis, malignancy, TB, PE, and diffuse alveolar hemorrhage when imaging or labs suggest it.\n- When to call consultants: pulmonology for recurrent or unexplained hemoptysis, suspected endobronchial lesion, need for bronchoscopy planning, or persistent hypoxemia; ENT if upper-airway symptoms/stridor; GI if severe refractory reflux symptoms with aspiration concern; cardiology if cough appears tied to decompensated HF or new ACE inhibitor intolerance affecting HF regimen.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **SpO₂ <90%** on **≥6 L/min** nasal cannula (or need for HFNC/NIV), or escalating oxygen requirement over hours.\n- Hemoptysis with any of: **hemodynamic instability**, **increasing volume**, **respiratory distress**, abnormal CXR suggesting focal bleed, or inability to protect airway.\n- Stridor, rapidly progressive dyspnea, or suspected upper-airway obstruction (voice change, drooling, accessory muscle use).\n- Hypercapnic concern with mental status change or severe work of breathing (consider ABG/VBG and NIV/ICU evaluation).\n- High-risk host with pulmonary symptoms (neutropenia, transplant, high-dose steroids) requiring urgent imaging/antimicrobials.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Chest X-ray portable — {indication: new/worsening cough, hypoxemia, hemoptysis, fever, aspiration concern}\n- Order: Continuous pulse oximetry — {target-spo2: 88–92% if COPD/hypercapnia risk; otherwise ≥92%}\n- Order: Respiratory viral PCR panel — {if: fever, coryza, new infiltrate, outbreak setting}\n- Order: CBC with differential and basic metabolic panel — {if: infection concern, hemoptysis, eosinophilia assessment, renal dosing}\n- Order: Albuterol-ipratropium nebulizer q4h PRN — {for: wheeze/bronchospasm; hold if: severe tachyarrhythmia}\n- Order: Pantoprazole — {dose: 40 mg PO daily; trial-duration: 2–4 weeks; only if: reflux symptoms or high suspicion}\n\n## ABIM Style Question 1\n### Stem\nA 62-year-old man is hospitalized for acute decompensated heart failure. During overnight cross-cover he reports a dry cough that has persisted for 3 months and is worse at night, interrupting sleep. He denies fever, sputum, wheeze, and heartburn. Vital signs are stable and oxygen saturation is 95% on room air. Chest radiograph shows cardiomegaly without infiltrate or effusion. Medications include lisinopril started 4 months ago, carvedilol, and furosemide. Which is the best next step to address his cough?\n### Options\nA. Start pantoprazole and continue lisinopril\nB. Start inhaled fluticasone and continue lisinopril\nC. Discontinue lisinopril and switch to an angiotensin receptor blocker\nD. Order CT chest with contrast to evaluate for malignancy\nE. Start gabapentin for unexplained chronic cough\n### Correct answer\nC\n### Rationale\nACE inhibitor–associated cough is a common cause of chronic dry cough and should be addressed early by stopping the ACE inhibitor; improvement often occurs within **1–4 weeks**. A stepwise chronic cough approach prioritizes removing offending medications and ruling out common etiologies before neuromodulators or advanced imaging when CXR and exam are reassuring.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 45-year-old woman is admitted for pyelonephritis and is otherwise stable overnight. She reports an 11-week history of persistent nonproductive cough that began before admission. She denies heartburn and post-nasal drip. She has no wheeze, and her oxygen saturation is 97% on room air. Chest radiograph is normal. Spirometry performed last month was normal without bronchodilator reversibility. Labs tonight show eosinophils 0.7 × 10⁹/L (8%). Which is the most appropriate next step to treat the cough?\n### Options\nA. Start codeine-guaifenesin at bedtime\nB. Start inhaled corticosteroid therapy\nC. Start azithromycin for atypical pneumonia\nD. Start proton pump inhibitor therapy for 8 weeks\nE. Reassure the patient; no treatment is indicated\n### Correct answer\nB\n### Rationale\nNonasthmatic eosinophilic bronchitis causes chronic cough with **normal spirometry** and eosinophilic airway inflammation and typically responds to inhaled corticosteroids. The pitfall is assuming normal spirometry excludes steroid-responsive airway disease; the decisive clue is **eosinophilia** with a normal CXR and absent reflux/UACS features.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What duration defines chronic cough in adults? A: Cough lasting **>8 weeks**.\n- Q: Name three common etiologies to prioritize in chronic cough after excluding red flags. A: Upper airway cough syndrome, asthma/cough-variant asthma, and gastroesophageal reflux disease.\n- Q: How long can ACE inhibitor–associated cough take to improve after stopping the drug? A: Often improves within **1–4 weeks**, but may take longer in some patients.\n- Q: What is a key immediate safety step when hemoptysis is reported? A: Quantify bleeding, assess oxygenation, obtain urgent chest imaging, and plan for airway protection if worsening.\n- Q: In a patient with COPD risk, what oxygen saturation range is typically targeted to reduce hypercapnia risk? A: **SpO₂ 88–92%**.\n\n## Guidelines & Key References (3–5 bullets)\n- CHEST Guideline and Expert Panel Report: Treatment of Unexplained Chronic Cough (2016) - https://journal.chestnet.org/article/S0012-3692(15)00038-0/fulltext\n- European Respiratory Society: ERS guidelines on the diagnosis and treatment of chronic cough in adults and children (2020; DOI 2019 task force) - https://publications.ersnet.org/content/erj/55/1/1901136\n- Global Initiative for Asthma (GINA): Global Strategy for Asthma Management and Prevention (2025 update) - https://ginasthma.org/2025-gina-strategy-report/\n- American College of Gastroenterology: ACG Clinical Guideline for the Diagnosis and Management of GERD (2022) - https://gi.org/guidelines/\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Chronic cough, duration **{weeks}**, character **{dry/productive}**, associated red flags **{hemoptysis/hypoxemia/fever/weight-loss}**, objective evidence **{SpO₂, RR, CXR result}**\n- Hemoptysis **{present/absent}**; if present: estimated volume **{mL}**, hemodynamics **{BP/HR}**, oxygen requirement **{L/min}**, imaging **{CXR/CT}**, and interventions **{ICU consult, NPO, airway plan}**\n- Suspected etiology **{ace-inhibitor related/asthma phenotype/gerd/aspiration/infection/volume overload}** with supporting findings **{med timeline, eosinophils, wheeze, reflux symptoms, exam}**\n- Respiratory status tonight: oxygen delivery **{RA/NC/HFNC/NIV}**, target **{SpO₂}**, trajectory **{stable/worsening}**, monitoring **{continuous pulse ox, ABG/VBG if indicated}**\n- Treatment plan and response: therapies started/held **{bronchodilator, ICS trial, PPI trial, stop ACEi}**, response **{symptoms/vitals}**, and follow-up plan **{pulm/ENT/GI outpatient or inpatient consult}**\n", "hypersensitivity-pneumonitis.md": "---\nfilename: hypersensitivity-pneumonitis.md\nid: hypersensitivity-pneumonitis\ntitle: Hypersensitivity pneumonitis\nslug: hypersensitivity-pneumonitis\ntags: [pulmonology, ild, hypoxemia, inpatient, night-float]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Hypersensitivity pneumonitis\n\n## Panic Card (3–6 bullets)\n- Put on monitor, sit upright, titrate oxygen to **SpO₂ ≥92%** (or **88–92%** if chronic hypercapnia risk), and reassess work of breathing every **5–10 min**.\n- Escalate early: if **SpO₂ <90% on ≥6 L/min nasal cannula** or **RR ≥30/min**, move to **HFNC**; consider **NIV** if cooperative and hemodynamically stable; prepare for intubation if tiring or altered. \n- Treat as “cannot-miss” alternatives while you stabilize: obtain CXR and ABG/VBG; consider PE, cardiogenic pulmonary edema, pneumonia/sepsis, diffuse alveolar hemorrhage, and ARDS in parallel.\n- Remove ongoing exposure now (highest-yield “treatment”): move patient away from suspected source (birds/feathers, humidifier/hot tub, moldy environment, contaminated CPAP), and stop nebulized irritants.\n- Confirm Before Proceed: if starting systemic glucocorticoids for presumed HP, first assess for uncontrolled infection (fever, shock, purulent sputum, rising lactate, high procalcitonin, positive cultures) and cover empirically if uncertain.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Hypersensitivity pneumonitis (HP) is an immune-mediated inflammatory and/or fibrotic interstitial lung disease triggered by inhaled antigens; on nights it most often presents as acute hypoxemic respiratory failure with diffuse ground-glass opacities and is commonly mis-labeled as “atypical pneumonia” or “pulmonary edema.”\n- Night-float priority is separating “needs ICU now” from “diagnosis can be refined later”: stabilize oxygenation/ventilation, rule out immediately reversible mimics, and stop exposure; definitive phenotype and confirmatory testing can be completed with daytime pulmonary/radiology/pathology support.\n- Guideline Must Know: ATS/JRS/ALAT (2020) recommends a structured approach for adults with newly detected ILD where HP is possible: **high-quality exposure history** plus **HRCT** assessment, then selected testing to raise diagnostic confidence.\n- Guideline Must Know: ATS/JRS/ALAT (2020) emphasizes classifying HP as **nonfibrotic vs fibrotic** based on radiologic/histopathologic fibrosis, because fibrosis is the major prognostic divider and changes the diagnostic pathway.\n- Guideline Must Know: Exposure identification is essential but imperfect; even with thorough history, the culprit antigen may remain unidentified in a substantial proportion of otherwise typical HP, so “no exposure found” does not exclude HP.\n- Guideline Must Know: For suspected **nonfibrotic HP**, ATS/JRS/ALAT (2020) recommends obtaining **bronchoalveolar lavage (BAL) fluid for lymphocyte cellular analysis** to support diagnosis when feasible.\n- Guideline Must Know: For suspected **fibrotic HP**, ATS/JRS/ALAT (2020) suggests BAL lymphocyte analysis and suggests **transbronchial cryobiopsy** in selected cases; **surgical lung biopsy** is reserved when other testing fails to yield a diagnosis.\n- What must happen now (bedside): if hypoxemic, target **SpO₂ ≥92%** (or **88–92%** if chronic hypercapnia risk), use **HFNC** when conventional oxygen fails, and trend RR, mental status, and ABG for impending fatigue; intubate early rather than late in rapidly progressive diffuse lung injury.\n- What must happen now (diagnostic safety): because HP overlaps with infection and PE, obtain CBC, CMP, ABG/VBG, CRP, procalcitonin (trend), blood cultures if febrile, respiratory viral testing, and consider CTA chest if PE risk; start empiric antibiotics if sepsis cannot be excluded and de-escalate when objective data support HP.\n- Exposure “micro-history” that changes your overnight plan: birds/feathers/down bedding, hot tub/humidifier/evaporative coolers, mold/water damage, farming/grain/compost, wood dust, metalworking fluids, and new occupational or hobby aerosol exposures; ask about recent cleaning, renovations, or damp environments within **hours–days** of symptom onset.\n- Imaging pearls: HRCT patterns that raise suspicion include diffuse or upper/mid-lung ground-glass, mosaic attenuation/air-trapping (especially on expiratory images), and centrilobular nodules; fibrosis (traction bronchiectasis, reticulation, honeycombing) suggests fibrotic HP and worse prognosis.\n- Treatment tonight is primarily supportive plus exposure cessation; systemic glucocorticoids can speed symptom improvement in severe acute presentations but should be used cautiously when infection remains plausible, and longer courses increase hyperglycemia, delirium, and infection risk in inpatients.\n- Practical steroid approach when severe and infection reasonably covered/excluded: **methylprednisolone 0.5–1 mg/kg/day IV** (or **prednisone 0.5–1 mg/kg/day PO**) then reassess oxygen needs and inflammatory markers daily; avoid prolonged high-dose tapers without pulmonary follow-up and an exposure-control plan.\n- Pitfalls on nights: (1) anchoring on “pneumonia” despite negative microbiology and clear exposure story, (2) giving diuretics for “pulmonary edema” without supportive exam/echo data, (3) delaying ICU escalation until exhaustion, and (4) starting high-dose steroids in an undifferentiated febrile infiltrate without empiric coverage.\n- When to call pulmonary early (even overnight): unclear diagnosis with diffuse ILD pattern, rapid progression or suspected fibrotic HP, need for BAL, or high oxygen requirements; multidisciplinary discussion is central to ATS/JRS/ALAT diagnostic confidence and can prevent unnecessary invasive testing.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **HFNC ≥40 L/min with FiO₂ ≥0.60** or **SpO₂ <90%** despite escalation, or rapidly rising oxygen requirement over **1–2 hours**.\n- **RR ≥30/min** with fatigue, use of accessory muscles, new hypercapnia on ABG/VBG, or altered mental status.\n- Hemodynamic instability: **MAP <65 mmHg** after initial resuscitation or need for vasopressors, or lactate rising with suspected sepsis.\n- Imaging/clinical red flags: diffuse bilateral opacities with severe hypoxemia consistent with evolving ARDS, hemoptysis/anemia suggesting diffuse alveolar hemorrhage, or high suspicion for PE requiring advanced support.\n- Need for urgent bronchoscopy/BAL in an unstable patient or concern for alternative diagnoses needing specialty input (pulmonary/ICU, infectious diseases, cardiology).\n\n## Orders to Place Now (3–6 bullets)\n- Order: Oxygen therapy protocol — target SpO₂ {target_range}, delivery device {nasal_cannula|simple_mask|hfcn|niv}, escalation threshold {spo2_threshold_or_flow}\n- Order: Chest imaging — {portable_cxr_now} and {hrct_chest_without_contrast_when_stable}, consider {cta_chest_pe_protocol_if_indicated}\n- Order: Respiratory failure labs — {abg_or_vbg_now}, {cbc}, {cmp}, {crp}, {procalcitonin}, {lactate_if_sepsis_concern}\n- Order: Infectious evaluation — {blood_cultures_x2_if_fever_or_shock}, {respiratory_viral_pcr}, {sputum_culture_if_productive}, {urine_antigens_if_pneumonia_workup}\n- Order: Consults — Pulmonology consult — {suspected_hp_with_ild_pattern}, ICU consult — {worsening_hypoxemia_or_work_of_breathing}\n\n## ABIM Style Question 1\n### Stem\nA 56-year-old man is admitted overnight for progressive dyspnea and nonproductive cough. He is febrile to 38.1°C, RR 28/min, and requires 4 L/min oxygen to maintain SpO₂ 93%. CXR shows bilateral interstitial opacities. CT chest demonstrates diffuse ground-glass opacities with mosaic attenuation and air-trapping. He reports cleaning a bird coop two days ago. Blood cultures are pending; respiratory viral PCR is negative; procalcitonin is low. Which diagnostic step most increases diagnostic confidence for hypersensitivity pneumonitis in this setting?\n### Options\nA. Serum total IgE level\nB. Bronchoscopy with bronchoalveolar lavage for lymphocyte cellular analysis\nC. Immediate surgical lung biopsy\nD. Transthoracic echocardiography to assess left ventricular function\nE. Start high-dose intravenous methylprednisolone without further testing\n### Correct answer\nB\n### Rationale\nATS/JRS/ALAT (2020) recommends obtaining BAL fluid for lymphocyte cellular analysis in patients with suspected nonfibrotic HP to support the diagnosis while using the least invasive approach. Surgical lung biopsy is reserved for cases where other diagnostic testing has not yielded a diagnosis, and empiric steroids should not precede a basic exclusion of infection when the patient is febrile.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 63-year-old woman with rheumatoid arthritis on methotrexate presents overnight with acute hypoxemia, diffuse ground-glass opacities, and new oxygen requirement of 10 L/min. Her family mentions a new home humidifier and water damage in the basement. She is febrile to 38.8°C, hypotensive with MAP 60 mmHg, and lactate is 3.8 mmol/L. You suspect hypersensitivity pneumonitis but infection is also possible. What is the best next step?\n### Options\nA. Start intravenous methylprednisolone 1 mg/kg immediately and withhold antibiotics\nB. Initiate broad-spectrum empiric antibiotics and stabilize in ICU-level care while pursuing HP workup and exposure cessation\nC. Discharge with prednisone taper and outpatient pulmonary follow-up because antigen avoidance is definitive\nD. Obtain serum IgG precipitin testing and wait for results before any treatment\nE. Begin diuresis with intravenous furosemide for presumed cardiogenic pulmonary edema\n### Correct answer\nB\n### Rationale\nShock physiology (MAP 60 mmHg, lactate 3.8 mmol/L) makes sepsis a cannot-miss diagnosis, so empiric antibiotics and ICU-level stabilization are indicated while exposure cessation and diagnostic evaluation proceed. The pitfall is anchoring on HP and giving high-dose steroids in an undifferentiated septic presentation, which can worsen outcomes if infection is present.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What two phenotypes does the ATS/JRS/ALAT guideline use to categorize hypersensitivity pneumonitis? A: Nonfibrotic HP and fibrotic HP, based on the presence of radiologic and/or histopathologic fibrosis.\n- Q: What diagnostic procedure is recommended to support suspected nonfibrotic HP when feasible? A: Bronchoalveolar lavage with lymphocyte cellular analysis.\n- Q: What is the most effective “treatment” step that should occur immediately when HP is suspected? A: Complete removal from the suspected antigen exposure (exposure cessation).\n- Q: When should surgical lung biopsy be considered in the ATS/JRS/ALAT diagnostic approach? A: When other diagnostic testing has not yielded a diagnosis and multidisciplinary discussion still cannot establish confidence.\n\n## Guidelines & Key References (3–5 bullets)\n- ATS/JRS/ALAT Clinical Practice Guideline: Diagnosis of Hypersensitivity Pneumonitis in Adults (2020) — https://www.atsjournals.org/doi/pdf/10.1164/rccm.202005-2032ST\n- ATS Guideline Implementation Tools: Diagnosis of Hypersensitivity Pneumonitis (2020) — https://www.thoracic.org/statements/guideline-implementation-tools/diagnosis-of-hypersensitivity-pneumonitis.php\n- Merck Manual Professional: Hypersensitivity Pneumonitis (reviewed 2025) — https://www.merckmanuals.com/professional/pulmonary-disorders/interstitial-lung-diseases/hypersensitivity-pneumonitis\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute hypoxemic respiratory failure due to suspected hypersensitivity pneumonitis: severity {spo2, o2_device, fiO2_or_flow}, ABG {pH, PaO2, PaCO2}, imaging {ct_findings}, escalation {hfcn|niv|icu_consult}\n- Hypersensitivity pneumonitis phenotype: {nonfibrotic_vs_fibrotic} based on imaging {fibrosis_features_present_or_absent}; suspected antigen/exposure {bird|mold|humidifier|other} with timing {hours_days}\n- Sepsis vs noninfectious ILD flare considered: infection indicators {fever, map, lactate, wbc, procalcitonin}, cultures {sent}, antibiotics {agent, start_time}, rationale for continuing/de-escalating {criteria}\n- Systemic glucocorticoid decision: indication {severe_hypoxemia|progression}, dose {drug_mg_per_kg}, risk assessment {infection_exclusion_or_coverage}, monitoring plan {glucose, delirium, oxygen_trend}\n", "pneumoconioses-occupational-lung-disease.md": "---\nfilename: pneumoconioses-occupational-lung-disease.md\nid: pneumoconioses-occupational-lung-disease\ntitle: Pneumoconioses / Occupational Lung Disease\nslug: pneumoconioses-occupational-lung-disease\ntags: [pulmonology, occupational-medicine, interstitial-lung-disease, inpatient, night-float]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Pneumoconioses / Occupational Lung Disease\n\n## Panic Card (3–6 bullets)\n- Airway/oxygen: apply O₂ and target **SpO₂ ≥92%** (or **88–92%** if known chronic CO₂ retention); escalate rapidly to HFNC/NIV/intubation for **increasing work of breathing, altered mental status, or refractory hypoxemia**.\n- If hemoptysis: protect airway; position bleeding lung down; stop anticoagulants/antiplatelets when safe; prepare for urgent bronchoscopy/IR if **respiratory compromise or hemodynamic instability**.\n- If fever, weight loss, night sweats, cavitation, or silica exposure: place **airborne isolation now** and send TB testing before moving to open units.\n- If pleuritic pain or sudden dyspnea: evaluate for **pneumothorax** and treat immediately if tension physiology (do not wait for CT).\n- If shock: treat per sepsis/shock principles with **MAP ≥65 mmHg**, early lactate, cautious fluids, and vasopressors as needed; don’t assume “baseline” pulmonary hypertension explains new hypotension.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Pneumoconioses are fibrotic lung diseases from inhaled mineral dusts (silica, asbestos, coal, beryllium) and often present at night as “something else”: **acute hypoxemia**, **hemoptysis**, **new pneumothorax**, **arrhythmia from hypoxemia**, or **decompensated pulmonary hypertension**; anchor on exposure history early (job, tasks, duration, PPE, latency).\n- Separate what must happen now vs what can wait: tonight you stabilize oxygenation/ventilation, exclude immediately reversible threats (pneumothorax, PE, pneumonia, cardiogenic edema), and trigger infection control when indicated; outpatient-level occupational attribution and disability documentation can wait until daylight consults.\n- Guideline Must Know: For suspected active TB (cough + systemic symptoms, cavitation, upper-lobe fibronodular disease, or high-risk exposure like silica), initiate **airborne isolation immediately** and obtain microbiologic testing promptly; empiric TB therapy is reserved for high likelihood/severe disease and should be coordinated with ID/public health guidance (ATS/CDC/IDSA TB guidance).\n- Guideline Must Know: Silica exposure increases TB risk and can produce chronic nodular upper-lobe disease or progressive massive fibrosis; acute heavy exposure can cause rapid hypoxemic respiratory failure (silicoproteinosis pattern), where supportive care and early critical care involvement are key (CDC/NIOSH silicosis guidance).\n- Guideline Must Know: Asbestos-related disease is suggested by pleural plaques/diffuse pleural thickening and can coexist with restrictive physiology; any new pleural effusion in an exposed patient warrants evaluation for malignant and nonmalignant etiologies, and you should not dismiss it as “CHF” without objective support (ATS asbestos statement).\n- Guideline Must Know: Chronic beryllium disease can mimic sarcoidosis (granulomatous ILD, adenopathy); the diagnostic cornerstone is **beryllium lymphocyte proliferation testing (BeLPT)** plus compatible lung findings, and steroid decisions are guided by clinically significant impairment/decline (ATS beryllium statement).\n- Guideline Must Know: In any hypoxemic ILD/pneumoconiosis decompensation, avoid anchoring on fibrosis alone; treat superimposed infection, volume overload, PE, and pneumothorax aggressively because these are common inpatient “extra hits” that drive rapid decline and are time-sensitive.\n- Guideline Must Know: Occupational silica standards emphasize prevention (exposure limits, controls, surveillance) and are not bedside therapies, but knowing them helps identify high-risk modern exposures (engineered stone, abrasive blasting) and supports accurate documentation and reporting (OSHA silica standard; CDC/NIOSH silica resources).\n- What must happen now (night shift priorities): obtain focused exposure history (silica/engineered stone, shipyard/insulation, mining, aerospace/beryllium, sandblasting), quantify symptoms (dyspnea trajectory, orthopnea, pleuritic pain), and screen for TB red flags; order CXR immediately and consider CT angiography only if it will change management tonight.\n- Oxygen/ventilation pearls: ILD physiology may deteriorate quickly with minimal reserve; aim for **SpO₂ ≥92%** unless chronic hypercapnia is documented; use HFNC early for tachypnea/hypoxemia; avoid excessive sedation; intubation carries higher risk of ventilator-induced injury—use lung-protective ventilation and call ICU early if escalating.\n- Infection is common and dangerous: pneumoconiosis does not protect from pneumonia; if febrile, leukocytosis, purulent sputum, or new focal opacity, start empiric antibiotics promptly per local pneumonia pathways while simultaneously evaluating for TB when risk features exist; do not delay antibiotics for TB tests in a septic patient.\n- Hemoptysis: pneumoconiosis (especially silica/coal with progressive massive fibrosis) can be complicated by bronchiectasis, mycetoma, or TB; prioritize airway protection and hemodynamics; stop contributing meds; obtain type and screen; if ongoing or causing hypoxemia, coordinate urgent pulmonary/ICU and consider CTA chest or bronchoscopy depending on stability and local capabilities.\n- Pulmonary hypertension/cor pulmonale: chronic hypoxemia can lead to right heart strain; nocturnal decompensation often follows infection, arrhythmia, or excess fluids; use bedside echo when available, treat precipitant, diurese cautiously if congested, and avoid large empiric fluid boluses unless clear hypovolemia/sepsis physiology.\n- Diagnostic strategy that works at 2 a.m.: CXR first; CT chest without contrast if CXR is nondiagnostic and you need to clarify pneumothorax, new consolidation, or diffuse ground-glass; reserve bronchoscopy/biopsy for daytime unless life-threatening hemoptysis or inability to secure diagnostic samples in a high-risk TB case.\n- Pitfalls: mislabeling chronic beryllium disease as sarcoidosis (missed exposure history), missing pneumothorax in fibrotic lungs (subtle CXR), and under-isolating high TB risk silica-exposed patients; also avoid reflex high-dose steroids for “ILD flare” before excluding infection/TB unless the patient is crashing and ICU agrees.\n- When to call consults: ICU for escalating oxygen/ventilatory support, shock, or significant hemoptysis; pulmonary for complex oxygenation, hemoptysis, bronchoscopy decisions, or suspected occupational ILD needing diagnostic pathway; ID for suspected TB or unusual infections; oncology/thoracic surgery if concern for malignant pleural disease or mesothelioma signal (new effusion with pleural thickening).\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Need for HFNC/NIV with persistent tachypnea or hypoxemia, or any impending respiratory fatigue/intubation concern.\n- Hemoptysis with respiratory compromise, rising oxygen needs, or hemodynamic instability (life-threatening bleeding risk).\n- Shock or rising lactate requiring vasopressors, or new severe arrhythmia attributable to hypoxemia/strain.\n- Suspected active TB requiring airborne isolation with inability to obtain diagnostic samples or concern for severe disease.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Oxygen therapy — {device} {flow/FiO₂} {SpO₂ target}\n- Order: Chest radiograph (portable) — {indication: hypoxemia/hemoptysis/pleuritic pain}\n- Order: Venous blood gas or arterial blood gas — {if escalating O₂ needs or altered mental status} {current O₂ settings}\n- Order: Airborne isolation — {indication: suspected pulmonary TB/high-risk exposure} {room type if available}\n- Order: Sputum AFB smear/culture + NAAT — {number of specimens} {collection method: spontaneous/induced} {timing}\n- Order: Pulmonary/ICU consult — {reason: escalating oxygen/hemoptysis/diagnostic bronchoscopy decision}\n\n## ABIM Style Question 1\n\n### Stem\nA 54-year-old man is admitted overnight for worsening dyspnea and cough. He worked for 15 years cutting and polishing engineered stone countertops. He reports 2 months of weight loss and night sweats and now has new streaky hemoptysis. On exam, he is febrile and tachypneic with SpO₂ 90% on 4 L/min nasal cannula. Chest radiograph shows upper-lobe nodular opacities with areas of conglomerate mass-like fibrosis. Which of the following is the most appropriate next step?\n\n### Options\nA. Start high-dose intravenous methylprednisolone for presumed inflammatory ILD flare  \nB. Begin diuretics for presumed cardiogenic pulmonary edema  \nC. Place the patient in airborne isolation and obtain sputum AFB testing with NAAT  \nD. Order a D-dimer test to screen for pulmonary embolism  \nE. Defer additional evaluation until daytime because findings are chronic\n\n### Correct answer\nC\n\n### Rationale\nSilica exposure is strongly associated with chronic nodular upper-lobe disease and increases the risk of active tuberculosis; systemic symptoms and hemoptysis require immediate infection control and expedited TB testing. ATS/CDC/IDSA guidance supports prompt microbiologic evaluation and appropriate isolation when active TB is suspected. Steroids can worsen occult infection, and “chronic” imaging does not exclude an acute, transmissible process.\n\n## Second ABIM Style Case (Pitfall Variant)\n\n### Stem\nA 47-year-old woman is admitted for hypoxemia and dry cough. CT chest from the ED shows bilateral perihilar adenopathy and scattered upper-lobe interstitial changes. She was diagnosed with sarcoidosis last year and has been on prednisone intermittently. On further questioning overnight, she reports working in aerospace manufacturing with potential beryllium exposure. Vital signs are stable on 2 L/min oxygen. Which is the best next step to clarify the diagnosis and guide management?\n\n### Options\nA. Increase prednisone to high dose and reassess symptoms in 48 hours  \nB. Start methotrexate for steroid-sparing immunosuppression  \nC. Order serum angiotensin-converting enzyme level  \nD. Order beryllium lymphocyte proliferation testing (BeLPT) and coordinate occupational evaluation  \nE. Start empiric 4-drug tuberculosis therapy\n\n### Correct answer\nD\n\n### Rationale\nChronic beryllium disease can closely mimic sarcoidosis, and ATS guidance identifies BeLPT as the cornerstone test for diagnosing beryllium sensitization and chronic beryllium disease in exposed individuals. The pitfall is escalating immunosuppression for “sarcoid” without confirming an occupational granulomatous mimic. What changed the decision here?\n\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What exposure history detail most strongly raises concern for modern severe silica exposure? A: Cutting/polishing engineered stone (artificial quartz) or abrasive blasting with inadequate dust control.\n- Q: What immediate infection-control action is indicated when active pulmonary TB is suspected in a silica-exposed patient? A: Place the patient in airborne isolation and send sputum for AFB smear/culture and NAAT.\n- Q: What diagnostic test is central to confirming beryllium sensitization/chronic beryllium disease in an exposed worker? A: Beryllium lymphocyte proliferation testing (BeLPT).\n- Q: In an exposed patient with new pleural effusion and pleural abnormalities suggestive of asbestos-related disease, what is the key next diagnostic step? A: Diagnostic pleural fluid evaluation (thoracentesis) unless contraindicated by instability or procedural risk.\n\n## Guidelines & Key References (3–5 bullets)\n- ATS: Diagnosis and Initial Management of Nonmalignant Diseases Related to Asbestos (2004) — https://www.thoracic.org/statements/resources/eoh/asbestos.pdf\n- ATS: Diagnosis and Management of Beryllium Sensitivity and Chronic Beryllium Disease (2014) — https://www.thoracic.org/statements/resources/eold/beryllium-full-text.pdf\n- CDC/NIOSH: Silicosis Reporting Guidelines (2025) — https://www.cdc.gov/niosh/surveillance/respiratorydisease/silicosis-reporting.html\n- OSHA: Respirable Crystalline Silica Standard, Construction (29 CFR 1926.1153) — https://www.osha.gov/laws-regs/regulations/standardnumber/1926/1926.1153\n- ATS/CDC/IDSA: Treatment of Drug-Susceptible Tuberculosis (2016) — https://www.cdc.gov/tb/publications/guidelines/pdf/clin-infect-dis.-2016-nahid-cid_ciw376.pdf\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute hypoxemic respiratory failure due to {suspected pneumoconiosis exacerbation vs superimposed pneumonia vs pulmonary edema}; severity: {SpO₂, O₂ device/FiO₂, ABG/VBG}; organ dysfunction: {RR, mental status}; treatment: {HFNC/NIV/intubation, antibiotics/diuresis}\n- Hemoptysis due to {suspected TB/bronchiectasis/fungal ball/anticoagulation-related}; acuity: {onset/volume}; objective evidence: {Hgb trend, CXR/CT findings}; interventions: {airway plan, blood products, reversal held/started, consults}\n- Suspected active pulmonary tuberculosis in high-risk exposure context {silica/engineered stone}; objective evidence: {symptoms, imaging pattern}; infection control: {airborne isolation}; diagnostics: {AFB/NAAT orders}; empiric therapy: {if started, rationale and consult}\n- Chronic occupational interstitial lung disease due to {silica/asbestos/beryllium/coal}; acuity: {acute decompensation vs baseline}; objective evidence: {CT/CXR pattern, PFT history if known}; monitoring/treatment: {oxygen requirement trend, consult plan}\n", "pulmonary-hypertension.md": "---\nfilename: pulmonary-hypertension.md\nid: pulmonary-hypertension\ntitle: Pulmonary hypertension\nslug: pulmonary-hypertension\ntags: [pulmonary-hypertension, cardiology, right-heart-failure, inpatient, night-float]\nlevel: resident\nestimatedtimemin: 12\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Pulmonary hypertension\n\n## Panic Card (3–6 bullets)\n\n- Airway/breathing: oxygen to lowest needed to keep **SpO₂ ≥92%** (or patient’s baseline in chronic lung disease); avoid hypercapnia/acidemia which spikes PVR; consider early ICU if escalating support.\n- Circulation: treat RV failure as preload-sensitive but fluid-intolerant—give **small bolus 250 mL** only if clear hypovolemia, then reassess; avoid large-volume resuscitation.\n- Pressors/inotropy: if **MAP <65 mmHg** or shock, start **norepinephrine** first-line; add **dobutamine** (or **milrinone** if adequate BP) for low cardiac output with RV dysfunction.\n- Reduce RV afterload now: correct triggers (hypoxia, pain, agitation, acidosis); consider inhaled pulmonary vasodilator (ICU) if refractory hypoxemia/RV failure.\n- Confirm Before Proceed: intubation/positive pressure can precipitate collapse in severe PH—optimize hemodynamics first, call ICU early, and plan peri-intubation pressors/vasodilator strategy.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n\n- Pulmonary hypertension (PH) is hemodynamic, not just echo-based: diagnostic definition is **mPAP >20 mmHg** on right heart catheterization; phenotype and treatment depend on PH group (1–5) and whether it is pre-capillary vs post-capillary.\n- Night-float framing: most overnight crises are not “new PAH diagnosis” but decompensation from a trigger (infection, PE, missed prostacyclin, arrhythmia, hypoxia/hypercapnia, volume shifts, bleeding/anemia, sedatives) causing acute RV failure and low output.\n- Separate tasks: (1) stabilize RV perfusion and oxygen delivery now; (2) identify reversible trigger; (3) avoid iatrogenesis (fluid overload, intubation-induced collapse, stopping PAH infusions, contraindicated vasodilators).\n- What must happen now: trend perfusion (mental status, urine output, lactate), ECG for tachyarrhythmia, bedside echo for RV size/function and pericardial effusion, and rapid trigger search (CXR, ABG/VBG, troponin/BNP, cultures if septic).\n- What can wait (until daylight/consult): formal PH workup, definitive group classification, outpatient therapy optimization, and elective vasoreactivity testing unless patient is stable and already in a PH program.\n- Guideline Must Know: do not treat PH based on echo alone—right heart catheterization is required to confirm diagnosis and guide group-specific therapy; echo is a screening/risk tool.\n- Guideline Must Know: for suspected chronic thromboembolic PH (CTEPH), ventilation/perfusion scanning is a key screening test and referral for definitive therapy (endarterectomy/balloon angioplasty) is recommended when appropriate.\n- Guideline Must Know: acute RV failure physiology—RV is afterload-sensitive; hypoxia, hypercapnia, and acidemia increase pulmonary vascular resistance (PVR) and can rapidly worsen shock; correct these aggressively.\n- Guideline Must Know: shock management prioritizes **MAP ≥65 mmHg** to preserve RV coronary perfusion; **norepinephrine** is preferred initial vasopressor, with an inotrope added if low output persists.\n- Guideline Must Know: in PAH, calcium channel blockers should not be used empirically; they are reserved for patients with proven acute vasoreactivity in expert centers (and can be harmful in decompensated RV failure).\n- Guideline Must Know: PAH therapies are group-specific—avoid starting PAH-targeted vasodilators (ERA/PDE5i/riociguat/prostacyclin) for PH due to left heart disease or hypoxic lung disease without specialist input.\n- Guideline Must Know: interruption of continuous prostacyclin therapy (e.g., epoprostenol/treprostinil) can cause rapid clinical deterioration; treat as an emergency and restart immediately while calling ICU/PH specialist.\n- Volume strategy: aim for “just-right” preload—if JVP high, edema, hepatic congestion, or echo shows RV dilation with septal shift, prioritize cautious diuresis; if clearly volume-depleted, use **250 mL** aliquots with reassessment and early pressors rather than liters of fluid.\n- Oxygen/ventilation pitfalls: avoid excessive PEEP and high intrathoracic pressures; if ventilating, use lung-protective settings and accept permissive hypoxemia only if consistent with patient’s baseline, while avoiding severe hypercapnia/acidosis.\n- Rhythm matters: loss of atrial contribution or rapid rates (AF/flutter/SVT) can crash RV output—treat unstable tachyarrhythmia with synchronized cardioversion; otherwise rate/rhythm control with careful hemodynamic monitoring.\n- Embolic/bleeding decision points: if sudden shock and RV strain, consider massive PE; Confirm Before Proceed: systemic thrombolysis requires bleeding-risk assessment and multidisciplinary input when feasible, because it is potentially irreversible.\n- When to call specialists early: ICU for any shock/advanced oxygen/ventilation needs; cardiology/pulmonary hypertension team for known PAH/CTEPH; CT surgery/interventional for suspected CTEPH-related decompensation; anesthesia early if airway is likely.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n\n- **MAP <65 mmHg** or **SBP <90 mmHg** after initial measures, or need for vasopressors/inotropes to maintain perfusion.\n- Escalating respiratory support: need for **HFNC**, **noninvasive ventilation**, impending intubation, or rapidly rising CO₂/acidemia with worsening mental status.\n- Evidence of acute RV failure: new severe RV dilation/dysfunction on bedside echo, rising lactate (**>2 mmol/L**) with oliguria, syncope, or refractory hypoxemia.\n- Suspected massive PE, tamponade, or interrupted prostacyclin infusion requiring urgent advanced therapy/monitoring.\n\n## Orders to Place Now (3–6 bullets)\n\n- Order: Continuous telemetry — {indication: suspected RV failure/arrhythmia risk}\n- Order: Continuous pulse oximetry — {SpO2 goal: 92% (or baseline target if chronic hypoxemia)}\n- Order: STAT bedside transthoracic echocardiogram — {indication: RV size/function, estimated PASP, pericardial effusion}\n- Order: ABG or VBG with lactate — {on oxygen device: nasal cannula/HFNC/NIV; repeat interval: 2–4 h as needed}\n- Order: CMP, magnesium, phosphorus, CBC, troponin, BNP/NT-proBNP — {frequency: now; repeat: 6–8 h if trending}\n- Order: CTA chest for PE OR V/Q scan — {if contrast contraindicated: yes/no; pretest probability: low/moderate/high}\n\n## ABIM Style Question 1\n\n### Stem\n\nA 52-year-old woman with known pulmonary arterial hypertension (on tadalafil and ambrisentan) is admitted for pneumonia. Overnight she becomes acutely dyspneic and hypotensive. Vitals: T 38.3°C, HR 128, BP 82/50, RR 28, SpO₂ 88% on 6 L/min nasal cannula. Exam shows JVP 12 cm, cool extremities, and a loud P2. Lactate is 3.4 mmol/L. Bedside echo shows a severely dilated right ventricle with reduced function and septal bowing into the left ventricle. Which is the best immediate next step?\n\n### Options\n\nA. Give 2 liters of isotonic crystalloid rapidly  \nB. Start norepinephrine infusion and transfer to ICU for RV failure management  \nC. Start sublingual nitroglycerin for suspected pulmonary vasoconstriction  \nD. Intubate immediately for airway protection and start high PEEP ventilation  \nE. Give intravenous metoprolol for rate control\n\n### Correct answer\n\nB\n\n### Rationale\n\nThis patient has shock from acute decompensated RV failure in severe PH; maintaining **MAP ≥65 mmHg** with **norepinephrine** supports RV coronary perfusion while ICU-level care addresses triggers and considers adjuncts (inotrope, inhaled pulmonary vasodilator). Large fluid boluses can worsen RV dilation and leftward septal shift, and urgent intubation without hemodynamic optimization can precipitate collapse.\n\n## Second ABIM Style Case (Pitfall Variant)\n\n### Stem\n\nA 34-year-old man with idiopathic pulmonary arterial hypertension on continuous IV epoprostenol is hospitalized for nausea. At 2 a.m. he becomes anxious and dyspneic with chest pressure. Vitals: HR 140, BP 86/54, RR 30, SpO₂ 90% on 4 L/min. The nurse reports his infusion pump alarmed “occlusion” 30 minutes ago and the line was temporarily stopped while troubleshooting. Bedside echo shows marked RV dilation. What is the most appropriate next action?\n\n### Options\n\nA. Hold epoprostenol until morning rounds because vasodilators worsen hypotension  \nB. Restart epoprostenol immediately at the prior dose while initiating vasopressor support and calling ICU/PH team  \nC. Switch from epoprostenol to oral sildenafil and observe  \nD. Give a large fluid bolus and reassess before addressing the pump  \nE. Administer IV furosemide and discontinue all PAH therapies\n\n### Correct answer\n\nB\n\n### Rationale\n\nAbrupt interruption of continuous prostacyclin therapy is a high-risk pitfall that can cause rapid rebound pulmonary vasoconstriction, RV failure, and shock; restarting the infusion immediately (while supporting **MAP ≥65 mmHg** and escalating care) is time-critical. The confounder is hypotension, but the causal, reversible driver is the stopped prostacyclin infusion, not medication excess.  \nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n\n- Q: What hemodynamic criterion defines pulmonary hypertension on right heart catheterization in modern guidelines? A: Mean pulmonary arterial pressure **>20 mmHg** at rest.\n- Q: In acute RV failure with shock from PH, what is the preferred first-line vasopressor to support perfusion? A: **Norepinephrine** to achieve **MAP ≥65 mmHg**.\n- Q: Why are large fluid boluses dangerous in decompensated PH with RV dilation? A: They can worsen RV dilation and septal shift, reducing LV filling and cardiac output.\n- Q: What is the emergency concern with stopping continuous IV epoprostenol? A: Rebound pulmonary vasoconstriction leading to rapid RV failure and shock.\n\n## Guidelines & Key References (3–5 bullets)\n\n- ESC/ERS Guidelines for the diagnosis and treatment of pulmonary hypertension, **2022**: https://www.escardio.org/guidelines/clinical-practice-guidelines/all-esc-practice-guidelines/pulmonary-hypertension-guidelines-on-diagnosis-and-treatment-of/\n- European Heart Journal: 2022 ESC/ERS Guidelines (full guideline article), **2022**: https://academic.oup.com/eurheartj/article/43/38/3618/6673929\n- American Heart Association Scientific Statement: Evaluation and Management of Right-Sided Heart Failure, **2018**: https://www.ahajournals.org/doi/pdf/10.1161/CIR.0000000000000560?download=true\n- CHEST Guideline and Expert Panel Report: Therapy for pulmonary arterial hypertension in adults, **2019**: https://journal.chestnet.org/article/S0012-3692%2819%2930002-9/fulltext\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n\n- Acute right ventricular failure due to decompensated pulmonary hypertension — {acuity: acute} {severity: shock with **MAP <65**} {evidence: lactate {value}, oliguria {yes/no}, echo RV dilation/dysfunction} {treatment: norepinephrine/inotrope/O₂}\n- Pulmonary hypertension type suspected — {group: 1/2/3/4/5} {cause: {etiology}} {evidence: echo PASP {value}, known PAH meds {list}, RHC history {yes/no}}\n- Acute hypoxemic respiratory failure — {cause: pneumonia/PE/other} {severity: O₂ device {type} at {flow}} {evidence: SpO₂ {value}, ABG/VBG {values}} {treatment: antibiotics/diuresis/PE workup}\n- Lactic acidosis due to hypoperfusion from RV failure — {lactate: {value}} {hemodynamics: BP {value}} {organ dysfunction: AKI {yes/no}, encephalopathy {yes/no}} {monitoring: repeat lactate q{hours}}\n"};

const def=()=>({un:'',pgy:'',obc:false,pre:{done:false,ans:{},sc:0,cq:0,perTopic:{}},post:{done:false,ans:{},sc:0,perTopic:{}},tc:{},xp:0,lv:1,coins:0,clif:0,streak:{c:0,ld:null},badges:[],topO:[],qa:{},mf:[],sv:{},shop:{p:[],eq:{av:null}},hs:{c:0},snd:false,dl:[],wc:{w:null,p:0},theme:'dark',bsd:null});
function ld(){try{var s=localStorage.getItem(SK);if(s){var p=JSON.parse(s);var d=def();p.pre={...d.pre,...(p.pre||{})};p.post={...d.post,...(p.post||{})};p.streak={...d.streak,...(p.streak||{})};p.shop={...d.shop,...(p.shop||{})};p.shop.eq={...d.shop.eq,...(p.shop&&p.shop.eq||{})};p.hs={...d.hs,...(p.hs||{})};p.wc={...d.wc,...(p.wc||{})};return{...d,...p};}}catch(e){}return def();}
function sv(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch(e){}}
function getL(x){for(var i=LEVELS.length-1;i>=0;i--)if(x>=LEVELS[i].x)return LEVELS[i];return LEVELS[0];}
function getN(x){for(var i=0;i<LEVELS.length;i++)if(x<LEVELS[i].x)return LEVELS[i];return null;}
function getMult(s){if(s>=8)return 3;if(s>=6)return 2.5;if(s>=4)return 2;if(s>=2)return 1.5;return 1;}
function getIW(){var d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+3-(d.getDay()+6)%7);var w=new Date(d.getFullYear(),0,4);return 1+Math.round(((d.getTime()-w.getTime())/86400000-3+(w.getDay()+6)%7)/7);}
function getWC(){return WEEKLYS[getIW()%7];}
function renderBT(t){if(!t)return t;t=t.replace(/\*\*Guideline Must[\s\u2011-]Know:\*\*/gi,'<span class="gltag">Guideline</span>');t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');t=t.replace(/\{([^}]+)\}/g,'<span class="hlpill">$1</span>');return t;}
function compTC(tid,st,td){
  var opened=(st.topO||[]).includes(tid);
  var svw=(st.sv||{})[tid]||[];
  var totalSec=td?Object.keys(td.sections||{}).length+(td.refs&&td.refs.length?1:0):0;
  var qa=st.qa||{};
  var qAns=0,totalQ=td?(td.quizzes||[]).length:0;
  for(var i=0;i<totalQ;i++)if(qa[tid+'Q'+i])qAns++;
  var mFlip=0,totalM=td?(td.micros||[]).length:0;
  for(var i=0;i<totalM;i++)if((st.mf||[]).includes(tid+'M'+i))mFlip++;
  var crit=0;if(opened)crit++;if(svw.length>=4)crit++;if(totalQ>0&&qAns>=totalQ)crit++;if(totalM>0&&mFlip>=totalM)crit++;
  return{opened,svw:svw.length,totalSec,qAns,totalQ,mFlip,totalM,crit,done:crit>=3};
}

  useEffect(()=>{sv(state);},[state]);

  useEffect(()=>{
    async function load(){
      try{
        let files=window.TOPIC_MANIFEST||null;
        let embedded=window.TOPIC_FILES||null;
        if(!files){
          const res=await fetch('topics/manifest.json');
          if(!res.ok)throw new Error('No manifest');
          const data=await res.json();
          files=data.topics||data;
        }
        const loaded=[];
        for(let i=0;i<files.length;i++){
          try{
            let txt=null;
            if(embedded&&embedded[files[i]]){txt=embedded[files[i]];}
            else{const r=await fetch('topics/'+files[i]);if(!r.ok)continue;txt=await r.text();}
            if(!txt||txt.trim().startsWith('<!'))continue;
            loaded.push(window.parseMD(txt,files[i]));
          }catch(e){}
          setLprog(Math.round(((i+1)/files.length)*100));
        }
        setTopics(loaded);
        setState(prev=>{const tc={...prev.tc};loaded.forEach(t=>{tc[t.id]=compTC(t.id,prev,t);});return{...prev,tc};});
      }catch(e){console.warn('No manifest',e);}
      setLoading(false);
    }
    load();
  },[]);

  useEffect(()=>{
    if(loading)return;
    const today=new Date().toISOString().slice(0,10);
    setState(prev=>{
      const dl=[...prev.dl];if(!dl.includes(today))dl.push(today);
      const last=prev.streak.ld;let c=prev.streak.c;
      if(last){const diff=Math.floor((new Date(today)-new Date(last))/86400000);if(diff===1)c++;else if(diff>1)c=1;}else c=1;
      return{...prev,dl,streak:{c,ld:today},bsd:prev.bsd||today};
    });
  },[loading]);

  const addToast=useCallback((msg,type='info')=>{
    const id=Date.now()+Math.random();

  },[]);

  const mult=useMemo(()=>getMult(state.streak.c),[state.streak.c]);

  const awardXP=useCallback((base)=>{
    const total=Math.round(base*mult);
    setState(prev=>{
      const nx=prev.xp+total;const ol=getL(prev.xp),nl=getL(nx);
      let nc=prev.coins+Math.floor(total/10),ncl=prev.clif+Math.floor(total/10);
      if(nl.l>ol.l){nc+=50;ncl+=50;try{confetti({particleCount:100,spread:70,origin:{y:0.6}})}catch(e){}}
      return{...prev,xp:nx,lv:nl.l,coins:nc,clif:ncl};
    });
    addToast(`+${total} XP${mult>1?' (×'+mult.toFixed(1)+')':''}`,'xp');
  },[mult,addToast]);

  const checkBadges=useCallback((ns)=>{
    const earned=[...ns.badges];const nb=[];
    BADGES.forEach(b=>{
      if(earned.includes(b.id))return;let u=false;
      if(b.cat==='topic'){(ns.topO||[]).forEach(tid=>{(b.kw||[]).forEach(kw=>{if(tid.includes(kw))u=true;});});}
      else if(b.cond==='s2')u=ns.streak.c>=2;
      else if(b.cond==='s4')u=ns.streak.c>=4;
      else if(b.cond==='s8')u=ns.streak.c>=8;
      else if(b.cond==='q100')u=Object.keys(ns.qa||{}).length>=100;
      else if(b.cond==='t15')u=(ns.topO||[]).length>=15;
      else if(b.cond==='hot5')u=ns.hs.c>=5;
      else if(b.cond==='c500')u=ns.clif>=500;
      else if(b.cond==='all20')u=(ns.topO||[]).length>=20;
      else if(b.cond==='assessed')u=ns.post&&ns.post.done;
      if(u){earned.push(b.id);nb.push(b);}
    });
    if(nb.length){nb.forEach(b=>addToast(`🏅 ${b.e} ${b.n}`,'badge'));try{confetti({particleCount:50,spread:60})}catch(e){}}
    return earned;
  },[addToast]);

  const eqAv=useMemo(()=>{const av=(state.shop&&state.shop.eq&&state.shop.eq.av)||null;if(av){const it=SHOP_DATA.avatars.find(a=>a.id===av);return it?it.e:'❤️';}return'❤️';},[state.shop]);
  const blockDay=useMemo(()=>Math.min(28,Math.max(1,Math.floor((Date.now()-new Date(state.bsd||Date.now()).getTime())/86400000)+1)),[state.bsd]);

  if(loading)return<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
    <h2 style={{fontFamily:'Playfair Display'}}>🫁 The Ventilator Vault</h2>

  if(!state.obc)return<Onboarding state={state} setState={setState} setView={setView}/>;
  if(view==='pretest')return<Assessment type="pretest" data={window.PRETEST_DATA} state={state} setState={setState} setView={setView} addToast={addToast}/>;
  if(view==='pretest-results')return<PretestResults state={state} setView={setView}/>;
  if(view==='posttest')return<Assessment type="posttest" data={window.POSTTEST_DATA} state={state} setState={setState} setView={setView} addToast={addToast} awardXP={awardXP} checkBadges={checkBadges}/>;
  if(view==='posttest-results')return<PosttestResults state={state} setView={setView}/>;
  if(view==='comparison')return<ComparisonView state={state} setView={setView}/>;

  return<div className={`wrap ${state.theme==='light'?'light':''}`}>
    <div className="tcontainer">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}</div>
    <div className="mob">
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button style={{background:'none',border:'none',color:'var(--t1)',fontSize:'1.4rem',cursor:'pointer'}} onClick={()=>setDrawer(!drawer)}>☰</button>
        <span style={{fontSize:'.8rem',fontWeight:600}}>{cl.n}</span>
        {mult>1&&<span className="mult">×{mult.toFixed(1)}</span>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12,fontSize:'.85rem'}}>
        <span>🪙 {state.coins}</span>
        <span style={{cursor:'pointer'}} onClick={()=>setState(p=>({...p,theme:p.theme==='dark'?'light':'dark'}))}>{state.theme==='dark'?'🌙':'☀️'}</span>
      </div>
    </div>
    <div className={`ov${drawer?' on':''}`} onClick={()=>setDrawer(false)}/>
    <div className={`side${drawer?' on':''}`}>
      <div className="slogo"><h2>🫁 The Ventilator Vault</h2><span className="tag">Breathe easy, score big</span></div>
      <div style={{fontSize:'.85rem',color:'var(--t2)',textAlign:'center'}}>Welcome, {state.un}!</div>
      <div className="sdiv"/>
      <div>
        <div className="xplbl"><span>{cl.n} (Lv.{cl.l})</span>{mult>1&&<span className="mult">×{mult.toFixed(1)}</span>}</div>
        <div className="xpbar"><div className="xpfill" style={{width:xpPct+'%'}}/></div>
        <div className="xptxt">{state.xp} / {nl?nl.x:'MAX'} XP</div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <div style={{flex:1}}><div style={{fontSize:'.75rem',color:'var(--t2)',marginBottom:3}}>Topics {compCount}/20</div><div className="minibar"><div className="minifill" style={{width:(compCount/20*100)+'%',background:'linear-gradient(90deg,#10b981,#06b6d4)'}}/></div></div>

      </div>

  const[ci,setCi]=useState(state[key].cq||0);
  const[sel,setSel]=useState(null);
  const ans=useRef({...(state[key].ans||{})});
  const submit=()=>{
    if(!sel)return;ans.current[ci]=sel;
    setState(p=>{const a={...p[key],ans:{...ans.current},cq:ci+1};return{...p,[key]:a};});
    if(ci<qs.length-1){setCi(ci+1);setSel(null);}
    else{
      let sc=0;const perTopic={};
      qs.forEach((q,i)=>{const correct=ans.current[i]===q.correct;if(correct)sc++;perTopic[q.topicSlug]={correct,userAnswer:ans.current[i],correctAnswer:q.correct};});
      setState(p=>{
        const upd={...p[key],done:true,completedAt:new Date().toISOString(),ans:{...ans.current},sc,perTopic,cq:0};
        const ns={...p,[key]:upd};
        if(type==='posttest'&&checkBadges){const earned=[...ns.badges];BADGES.forEach(b=>{if(!earned.includes(b.id)&&b.cond==='assessed'&&ns.post&&ns.post.done)earned.push(b.id);});ns.badges=earned;}
        return ns;
      });
      if(type==='posttest'&&awardXP)awardXP(500);
      setView(type+'-results');
    }
  };
  const q=qs[ci];
  return<div className={state.theme==='light'?'light':''} style={{minHeight:'100vh'}}><div className="ascreen">
    <div className="ahead">
      <h2 className="atitle">{type==='pretest'?'📋 Pre-Test: Baseline':'📝 Post-Test: Final'}</h2>
      <p style={{color:'var(--t2)',fontSize:'.85rem'}}>{type==='pretest'?'20 ABIM-style questions · No penalty':'20 ABIM-style questions · Show growth'}</p>
      <div className="aprog"><div className="apfill" style={{width:(ci/qs.length)*100+'%'}}/></div>
      <div className="aqnum">Question {ci+1} of {qs.length}</div>
    </div>
    <div className="astem">{q.stem}</div>
    {q.options.map((opt,oi)=>{const letter=opt.charAt(0);return<div key={oi} className={`aopt${sel===letter?' sel':''}`} onClick={()=>setSel(letter)}>{opt}</div>;})}
    <button className="anxt" disabled={!sel} onClick={submit}>{ci<qs.length-1?'Next →':'Finish Assessment'}</button>
  </div></div>;
}

function PretestResults({state,setView}){
  const sc=state.pre.sc;const pct=Math.round(sc/20*100);
  return<div className={state.theme==='light'?'light':''} style={{minHeight:'100vh'}}><div className="rscreen">
    <h2>📋 Pre-Test Results</h2>
    <div className="rscore" style={{color:pct>=70?'#10b981':pct>=50?'#f59e0b':'#ef4444'}}>{sc}/20</div>
    <div className="rsub">{pct}% — {pct>=80?'Strong foundation!':pct>=60?'Good start!':pct>=40?'Solid baseline!':'Perfect starting point!'}</div>
    <div className="rmsg">Your pre-test establishes a baseline. Complete topics, then take the post-test to measure growth.</div>
    {window.PRETEST_DATA.questions.map((q,i)=><div key={i} className="rrow"><span className="rn">{q.topicTitle}</span><span className="rs">{state.pre.ans[i]===q.correct?'✅':'❌'}</span></div>)}
    <button className="anxt" style={{marginTop:24}} onClick={()=>setView('home')}>Start Learning →</button>
  </div></div>;
}

function PosttestResults({state,setView}){
  const sc=state.post.sc;const pct=Math.round(sc/20*100);
  return<div className={state.theme==='light'?'light':''} style={{minHeight:'100vh'}}><div className="rscreen">
    <h2>📝 Post-Test Results</h2>
    <div className="rscore" style={{color:pct>=70?'#10b981':pct>=50?'#f59e0b':'#ef4444'}}>{sc}/20</div>
    <div className="rsub">{pct}%</div>
    {window.POSTTEST_DATA.questions.map((q,i)=><div key={i} className="rrow"><span className="rn">{q.topicTitle}</span><span className="rs">{state.post.ans[i]===q.correct?'✅':'❌'}</span></div>)}
    <button className="anxt" style={{marginTop:24}} onClick={()=>setView('comparison')}>View Comparison →</button>
  </div></div>;
}

function ComparisonView({state,setView}){
  const preS=state.pre.sc||0,postS=state.post.sc||0,diff=postS-preS;
  const prePT=state.pre.perTopic||{},postPT=state.post.perTopic||{};
  const improved=[],maintained=[],gaps=[];
  window.PRETEST_DATA.questions.forEach(q=>{
    const slug=q.topicSlug;const preC=(prePT[slug]||{}).correct;const postC=(postPT[slug]||{}).correct;
    if(!preC&&postC)improved.push(q.topicTitle);else if(preC&&postC)maintained.push(q.topicTitle);else gaps.push(q.topicTitle);
  });
  return<div className={state.theme==='light'?'light':''} style={{minHeight:'100vh'}}><div className="rscreen">
    <h2>📊 Pre vs Post Comparison</h2>
    <div className="scomp"><span>{preS}/20</span><span style={{fontSize:'1.2rem',color:diff>0?'#10b981':diff===0?'#f59e0b':'#ef4444'}}>→</span><span style={{color:diff>0?'#10b981':diff===0?'#f59e0b':'#ef4444'}}>{postS}/20</span></div>
    <p style={{color:'var(--t2)',marginBottom:20}}>{diff>0?`+${diff} questions improved! 🎉`:diff===0?'Same score — review focus areas':'Review topics below'}</p>
    <div className="csec"><div className="cst">Topic-by-Topic</div>
      {improved.map((t,i)=><div key={'i'+i} className="crow ig"><span style={{flex:1,textAlign:'left'}}>{t}</span><span>❌→✅</span></div>)}
      {maintained.map((t,i)=><div key={'m'+i} className="crow"><span style={{flex:1,textAlign:'left'}}>{t}</span><span>✅→✅</span></div>)}
      {gaps.map((t,i)=><div key={'g'+i} className="crow gap"><span style={{flex:1,textAlign:'left'}}>{t}</span><span>⚠️</span></div>)}
    </div>
    {gaps.length>0&&<div className="fbox"><div className="ft">📌 Focus Areas</div>{gaps.map((t,i)=><div key={i} className="fi">• {t}</div>)}</div>}
    <button className="anxt" style={{marginTop:24}} onClick={()=>setView('home')}>← Back to Home</button>
  </div></div>;
}

function Home({state,topics,openTopic,compCount,setView}){
  return<div>
    <h2 style={{fontSize:'1.4rem',marginBottom:4}}>Your Pulmonology Dashboard</h2>
    <p style={{color:'var(--t2)',fontSize:'.85rem',marginBottom:20}}>{compCount}/20 topics completed · {state.xp} XP earned</p>
    {state.pre.done&&<div className="prhcard" onClick={()=>setView('pretest-results')}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:'.85rem',color:'var(--t2)'}}>📋 Pre-Test: {state.pre.sc}/20 ({Math.round(state.pre.sc/20*100)}%)</span>
        <span style={{fontSize:'.75rem',color:'var(--t3)'}}>Details →</span>
      </div>
    </div>}
    <div className={`pohcard${compCount>=16?' ul':''}`}>
      <div style={{fontSize:'1rem',fontWeight:600,marginBottom:8,display:'flex',alignItems:'center',gap:8}}>{compCount>=16?'📝':'🔒'} Post-Test Assessment</div>
      <div className="minibar" style={{height:8,marginBottom:4}}><div className="minifill" style={{width:Math.min(100,compCount/16*100)+'%',background:'linear-gradient(90deg,#6366f1,#a855f7)'}}/></div>
      <div style={{fontSize:'.8rem',color:'var(--t2)'}}>{compCount>=16?(state.post.done?`✅ ${state.post.sc}/20 (${Math.round(state.post.sc/20*100)}%)`:'Unlocked! Take it now.'):`Complete ${Math.max(0,16-compCount)} more topics (${compCount}/16)`}</div>
      {compCount>=16&&<button className="anxt" style={{marginTop:12,display:'inline-block'}} onClick={()=>setView(state.post.done?'comparison':'posttest')}>{state.post.done?'View Comparison':'Take Post-Test →'}</button>}
    </div>
    <h3 style={{fontSize:'1.1rem',marginBottom:12}}>Topics</h3>
    <div className="hgrid">{topics.map((t,i)=>{const tc=state.tc[t.id];const done=tc&&tc.done;return<div key={t.id} className="tcard" onClick={()=>openTopic(t)}>
      <div className="acc" style={{background:COLORS[i%COLORS.length]}}/>
      <div className="ttl">{t.title}</div>
      <div className="tags">{t.tags.slice(0,3).map((tag,ti)=><span key={ti} className="tg">{tag}</span>)}</div>
      <div className="meta"><span>{(t.quizzes||[]).length} quiz</span><span>{(t.micros||[]).length} micro</span><span>{Object.keys(t.sections||{}).length} sec</span></div>
      {done&&<div className="comp">✅</div>}
    </div>;})}</div>
  </div>;
}

function Detail({topic,state,setState,setView,awardXP,addToast,topics,checkBadges}){
  const[flipped,setFlipped]=useState({});const[quizState,setQuizState]=useState({});
  const markViewed=(secKey)=>{
    setState(prev=>{const svw={...prev.sv};const arr=[...(svw[topic.id]||[])];if(!arr.includes(secKey)){arr.push(secKey);awardXP(30);}svw[topic.id]=arr;const tc={...prev.tc};tc[topic.id]=compTC(topic.id,{...prev,sv:svw},topic);return{...prev,sv:svw,tc};});
  };
  const answerQuiz=(qid,letter,correct)=>{
    if(quizState[qid])return;setQuizState(p=>({...p,[qid]:{ans:letter,correct}}));
    setState(prev=>{const qa={...prev.qa};qa[qid]=letter;let hs={...prev.hs};if(correct){hs.c=(hs.c||0)+1;awardXP(50);}else{hs.c=0;awardXP(15);}const tc={...prev.tc};tc[topic.id]=compTC(topic.id,{...prev,qa},topic);const ns={...prev,qa,hs,tc};ns.badges=checkBadges(ns);return ns;});
  };
  const flipMicro=(mid)=>{
    setFlipped(p=>({...p,[mid]:true}));
    setState(prev=>{const mf=[...prev.mf];if(!mf.includes(mid)){mf.push(mid);awardXP(20);}const tc={...prev.tc};tc[topic.id]=compTC(topic.id,{...prev,mf},topic);return{...prev,mf,tc};});
  };
  const secMap={panic_card:{title:'🚨 Panic Card',cls:'panic'},brief_overview:{title:'📖 Brief Overview',cls:'overview'},icu_consult_triggers:{title:'🏥 ICU/Consult Triggers',cls:'icu'},orders_to_place_now:{title:'📋 Orders to Place Now',cls:'orders'},cdi:{title:'📊 CDI',cls:'cdi'},other:{title:'📝 Additional Notes',cls:'overview'}};
  const secOrder=['panic_card','brief_overview','icu_consult_triggers','orders_to_place_now','cdi','other'];
  const viewed=(state.sv||{})[topic.id]||[];
  return<div className="detail">
    <button className="dbk" onClick={()=>setView('home')}>← Back to Topics</button>
    <h2 className="dtitle">{topic.title}</h2>
    <div className="dtags">{topic.tags.map((t,i)=><span key={i} className="dtag">{t}</span>)}</div>
    {secOrder.filter(k=>topic.sections[k]&&topic.sections[k].length>0).map(key=>{
      const info=secMap[key]||{title:key,cls:'overview'};const isV=viewed.includes(key);
      return<div key={key} className={`sec ${info.cls}`} onClick={()=>{if(!isV)markViewed(key);}}>
        <div className="shead"><div className="stitle">{info.title}</div>{isV&&<span className="sviewed">✓ Viewed</span>}</div>
        <ul>{topic.sections[key].map((item,i)=><li key={i} dangerouslySetInnerHTML={{__html:renderBT(item)}}/>)}</ul>
      </div>;
    })}
    {topic.quizzes.map((q,qi)=>{const qs2=quizState[q.id];return<div key={q.id} className="qcard">
      <div className="qlbl">ABIM-Style Question {qi+1}</div><div className="qstem">{q.stem}</div>
      {q.options.map((opt,oi)=>{const letter=opt.charAt(0);let cls='qopt';if(qs2){if(letter===q.correct)cls+=' ok';else if(letter===qs2.ans&&!qs2.correct)cls+=' bad';else cls+=' dis';}return<div key={oi} className={cls} onClick={()=>answerQuiz(q.id,letter,letter===q.correct)}>{opt}</div>;})}
      {qs2&&<div className="qrat"><strong>{qs2.correct?'✅ Correct!':'❌ Incorrect.'}</strong> {q.rationale}</div>}
    </div>;})}
    {topic.micros.length>0&&<div><h3 style={{fontSize:'1.1rem',margin:'20px 0 12px'}}>🔬 Micro Questions</h3>
      {topic.micros.map(m=><div key={m.id} className="mcard" onClick={()=>flipMicro(m.id)}>
        <div className="mq">Q: {m.q}</div>
        {(flipped[m.id]||(state.mf||[]).includes(m.id))&&<div className="ma">A: {m.a}</div>}
      </div>)}</div>}
    {topic.refs.length>0&&<div style={{marginTop:20}} onClick={()=>markViewed('refs')}>
      <h3 style={{fontSize:'1.1rem',marginBottom:12}}>📚 References</h3>
      {topic.refs.map((r,i)=>r.url?<a key={i} className="rlink" href={r.url} target="_blank" rel="noopener noreferrer">{r.label||r.url}</a>:<div key={i} className="rlink">{r.label}</div>)}</div>}
  </div>;
}

function ShopModal({state,setState,onClose,addToast}){
  const buy=(item)=>{if(state.shop.p.includes(item.id))return;if(state.coins<item.p){addToast('Not enough coins!');return;}setState(prev=>({...prev,coins:prev.coins-item.p,shop:{...prev.shop,p:[...prev.shop.p,item.id]}}));addToast(`Purchased ${item.e} ${item.n}`,'badge');};
  const equip=(id)=>{setState(prev=>{const eq=(prev.shop&&prev.shop.eq)||{av:null};return{...prev,shop:{...prev.shop,eq:{...eq,av:eq.av===id?null:id}}};});};
  return<div className="molay" onClick={onClose}><div className="mocnt" onClick={e=>e.stopPropagation()}>
    <button className="mocls" onClick={onClose}>✕</button>
    <h3 className="motitle">🛒 Shop — 🪙 {state.coins}</h3>
    <div style={{marginBottom:16}}><div className="mosect">Avatars</div><div className="sgrid">{SHOP_DATA.avatars.map(item=>{const owned=state.shop.p.includes(item.id);const eq=state.shop&&state.shop.eq&&state.shop.eq.av===item.id;return<div key={item.id} className={`sitem${owned?' own':''}`} onClick={()=>owned?equip(item.id):buy(item)}><div className="se">{item.e}</div><div className="sn">{item.n}</div><div className="sd">{item.d}</div>{owned?<div className="so">{eq?'✅ Equipped':'Tap to equip'}</div>:<div className="sp">🪙 {item.p}</div>}</div>;})}</div></div>
    <div><div className="mosect">Memes</div><div className="sgrid">{SHOP_DATA.memes.map(item=>{const owned=state.shop.p.includes(item.id);return<div key={item.id} className={`sitem${owned?' own':''}`} onClick={()=>buy(item)}><div className="se">{item.e}</div><div className="sn">{item.n}</div><div className="sd">{item.d}</div>{owned?<div className="so">✅ Owned</div>:<div className="sp">🪙 {item.p}</div>}</div>;})}</div></div>
  </div></div>;
}

function ProfileModal({state,onClose,setView}){
  return<div className="molay" onClick={onClose}><div className="mocnt" onClick={e=>e.stopPropagation()}>
    <button className="mocls" onClick={onClose}>✕</button>
    <h3 className="motitle">{state.un}'s Profile</h3>
    <div style={{fontSize:'.85rem',color:'var(--t2)',marginBottom:16}}>{state.pgy} · Level {getL(state.xp).l} {getL(state.xp).n} · {state.xp} XP · 🪙 {state.coins} · 🔥 {state.streak.c}d streak · {(state.topO||[]).length} topics</div>
    <div style={{marginBottom:16}}><div className="mosect">Badges ({state.badges.length}/{BADGES.length})</div>
      <div className="bgrid">{BADGES.map(b=>{const has=state.badges.includes(b.id);return<div key={b.id} className={`bitem${has?'':' lk'}`}><div className="be">{b.e}</div><div className="bn">{has?b.n:'???'}</div></div>;})}</div>
    </div>
    {state.post.done&&state.pre.done&&<button className="anxt" onClick={()=>{onClose();setView('comparison');}}>📊 View Comparison</button>}
  </div></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

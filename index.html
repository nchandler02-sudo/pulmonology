<script>
function parseMD(text,filename){
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  if(text.trim().startsWith('<!'))return{id:filename.replace(/\.md$/,''),title:filename.replace(/\.md$/,'').replace(/-/g,' '),tags:[],sections:{},quizzes:[],micros:[],refs:[]};
  var lines=text.split('\n'),id=filename.replace(/\.md$/,''),title=id.replace(/-/g,' '),tags=[],i,line;
  var inFM=false,fmEnd=0;
  for(i=0;i<lines.length;i++){line=lines[i].trim();if(i===0&&line==='---'){inFM=true;continue;}if(inFM&&line==='---'){fmEnd=i+1;break;}if(inFM){if(line.indexOf('title:')===0)title=line.substring(6).trim().replace(/^["']|["']$/g,'');if(line.indexOf('tags:')===0){var tm=line.match(/\[([^\]]*)\]/);if(tm)tags=tm[1].split(',').map(function(t){return t.trim();});}}}
  for(i=fmEnd;i<lines.length;i++){if(lines[i].trim().indexOf('# ')===0&&lines[i].trim().indexOf('## ')!==0){title=lines[i].trim().substring(2).trim();break;}}
  var secList=[],cur=null;
  for(i=fmEnd;i<lines.length;i++){line=lines[i];if(line.trim().indexOf('## ')===0){if(cur)secList.push(cur);cur={heading:line.trim().substring(3).trim(),lines:[]};}else if(cur){cur.lines.push(line);}}
  if(cur)secList.push(cur);
  var sections={},quizzes=[],micros=[],refs=[],qIdx=0;
  for(var s=0;s<secList.length;s++){
    var sec=secList[s],h=sec.heading.toLowerCase();
    if(/abim|quiz.*case|style.*case|pitfall/i.test(h)){var q=parseQuiz(sec.lines,id,qIdx);if(q){quizzes.push(q);qIdx++;}}
    else if(/check.*micro|check.*yourself|micro.*question/i.test(h)){micros=parseMicro(sec.lines,id);}
    else if(/reference|guideline.*ref/i.test(h)){refs=parseRefs(sec.lines);}
    else{var key='other';if(/panic/i.test(h))key='panic_card';else if(/brief.*overview|overview/i.test(h))key='brief_overview';else if(/icu|consult.*trigger/i.test(h))key='icu_consult_triggers';else if(/order/i.test(h))key='orders_to_place_now';else if(/cdi/i.test(h))key='cdi';sections[key]=parseBullets(sec.lines);}
  }
  return{id:id,title:title,tags:tags,sections:sections,quizzes:quizzes,micros:micros,refs:refs};
}
function parseBullets(lines){var r=[];for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(l.indexOf('- ')===0)r.push(l.substring(2));else if(l.length>0&&r.length>0)r[r.length-1]+=' '+l;}return r;}
function parseRefs(lines){var r=[];for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(l.indexOf('- ')===0)l=l.substring(2);else continue;var parts=l.split(/ [—|] /);if(parts.length>=2){var um=parts[parts.length-1].match(/https?:\/\/[^\s)]+/);r.push({label:parts[0].trim(),url:um?um[0]:''});}else{var um2=l.match(/https?:\/\/[^\s)]+/);r.push({label:l.replace(/https?:\/\/[^\s)]+/,'').trim(),url:um2?um2[0]:''});}}return r;}
function parseMicro(lines,topicId){var r=[],idx=0;for(var i=0;i<lines.length;i++){var l=lines[i].trim(),qm=l.match(/^-?\s*Q:\s*(.+)/);if(qm){var q=qm[1],a='';for(var j=i+1;j<lines.length;j++){var am=lines[j].trim().match(/^A:\s*(.+)/);if(am){a=am[1];i=j;break;}if(lines[j].trim().match(/^-?\s*Q:/))break;}r.push({id:topicId+'M'+idx,q:q,a:a});idx++;}}return r;}
function parseQuiz(lines,topicId,qIdx){var sub={},ck='';for(var i=0;i<lines.length;i++){var l=lines[i];if(l.trim().indexOf('### ')===0){ck=l.trim().substring(4).trim().toLowerCase();sub[ck]=[];}else if(ck){sub[ck].push(l);}}if(!sub['stem']&&!sub['options'])return null;var stem=(sub['stem']||[]).filter(function(l){return l.trim().length>0;}).join(' ');var options=[];var ol=sub['options']||[];for(var o=0;o<ol.length;o++){var om=ol[o].trim().match(/^([A-E])\.\s*(.+)/);if(om)options.push(om[0]);}var cl=((sub['correct answer']||sub['correct']||[])[0]||'').trim();var correct=cl.charAt(0);if(!/[A-E]/.test(correct))correct='A';var rat=(sub['rationale']||sub['rationale (2\u20134 sentences)']||sub['rationale (2-4 sentences)']||[]).filter(function(l){return l.trim().length>0;}).join(' ');return{id:topicId+'Q'+qIdx,stem:stem,options:options,correct:correct,rationale:rat};}
window.parseMD=parseMD;

<script>
window.PRETEST_DATA={"assessmentType": "pretest", "totalQuestions": 20, "questions": [{"id": "pre-01", "questionNumber": 1, "topicSlug": "community-acquired-pneumonia", "topicTitle": "Community-Acquired Pneumonia", "stem": "A 65-year-old man presents with fever, productive cough, and a new right lower lobe infiltrate on chest radiograph. He is admitted to the general medicine floor. Vitals: T 38.4°C, HR 98/min, BP 132/76 mmHg, RR 20/min, SpO₂ 93% on 2 L/min nasal cannula. He has no prior MRSA or Pseudomonas respiratory isolates and has not been hospitalized or received parenteral antibiotics in the past 90 days. Which empiric antibiotic regimen is most appropriate?", "options": ["A. Ceftriaxone plus azithromycin", "B. Piperacillin-tazobactam plus vancomycin", "C. Azithromycin monotherapy", "D. Meropenem plus linezolid", "E. Cefepime plus levofloxacin plus vancomycin"], "correct": "A", "rationale": "For nonsevere inpatient CAP without MRSA or Pseudomonas risk factors, ATS/IDSA guidelines recommend a β-lactam plus macrolide (e.g., ceftriaxone + azithromycin) or a respiratory fluoroquinolone as monotherapy. Azithromycin alone (C) lacks reliable pneumococcal coverage for inpatient use. Broad-spectrum regimens with MRSA and antipseudomonal coverage (B, D, E) are not indicated without validated risk factors or severe physiology."}, {"id": "pre-02", "questionNumber": 2, "topicSlug": "copd", "topicTitle": "COPD", "stem": "A 70-year-old woman with severe COPD presents with increased dyspnea and wheezing over the past 2 days. She is using accessory muscles and speaking in short phrases. SpO₂ is 85% on room air. After starting supplemental oxygen, what oxygen saturation target is most appropriate while awaiting blood gas results?", "options": ["A. SpO₂ 98–100%", "B. SpO₂ 94–98%", "C. SpO₂ 88–92%", "D. SpO₂ 82–86%", "E. No specific target; maximize oxygen flow"], "correct": "C", "rationale": "In COPD patients at risk for hypercapnic respiratory failure, oxygen should be titrated to a target SpO₂ of 88–92% pending blood gas assessment. Liberal oxygen targeting higher saturations (A, B) can worsen CO₂ retention and acidosis in these patients. There is no evidence to support targeting below 88% (D), and oxygen without a defined target (E) risks both hyperoxia-induced hypercapnia and unnecessary escalation."}, {"id": "pre-03", "questionNumber": 3, "topicSlug": "asthma", "topicTitle": "Asthma", "stem": "A 40-year-old woman with asthma is admitted for a severe exacerbation. She has received three back-to-back albuterol and ipratropium nebulizations and IV methylprednisolone. She remains in significant distress with poor air movement and peak expiratory flow at 25% of predicted. Which additional therapy is most appropriate at this time?", "options": ["A. Oral theophylline", "B. IV magnesium sulfate 2 g over 20 minutes", "C. Empiric azithromycin", "D. Inhaled corticosteroid alone", "E. IV morphine for dyspnea relief"], "correct": "B", "rationale": "IV magnesium sulfate 2 g is recommended as an adjunct for severe asthma exacerbations with poor initial response (PEF/FEV₁ <25–30% predicted) per GINA 2024. Theophylline (A) has limited acute benefit and significant toxicity risk. Antibiotics (C) are not indicated without evidence of bacterial infection. Opioids (E) can worsen ventilation and are contraindicated in this setting."}, {"id": "pre-04", "questionNumber": 4, "topicSlug": "acute-hypoxemic-respiratory-failure", "topicTitle": "Acute Hypoxemic Respiratory Failure", "stem": "A 60-year-old man with no significant pulmonary history develops worsening dyspnea and SpO₂ of 87% on room air. He is tachypneic with RR 28/min but hemodynamically stable. Conventional nasal cannula oxygen at 6 L/min maintains SpO₂ at only 90% with persistent tachypnea. According to ERS 2022 recommendations, what is the most appropriate next step in oxygen delivery?", "options": ["A. Continue nasal cannula and observe", "B. Switch to a nonrebreather mask at 15 L/min", "C. Start high-flow nasal cannula (HFNC)", "D. Immediate endotracheal intubation", "E. Start bilevel noninvasive ventilation"], "correct": "C", "rationale": "ERS 2022 suggests HFNC over conventional oxygen therapy for adults with hypoxemic acute respiratory failure (conditional recommendation), making HFNC the preferred escalation step when conventional oxygen is failing. Continuing inadequate nasal cannula (A) risks deterioration. Immediate intubation (D) is premature in a hemodynamically stable patient. NIV (E) is generally reserved for hypercapnic failure, cardiogenic pulmonary edema, or selected post-extubation contexts per the same guideline."}, {"id": "pre-05", "questionNumber": 5, "topicSlug": "acute-hypercapnic-respiratory-failure", "topicTitle": "Acute Hypercapnic Respiratory Failure", "stem": "A 68-year-old man with COPD presents with worsening dyspnea. He is somnolent but arousable and can follow commands. ABG shows pH 7.30, PaCO₂ 65 mmHg, PaO₂ 56 mmHg on 2 L/min nasal cannula. He has no vomiting and no contraindication to mask ventilation. What is the ABG threshold that most supports initiating bilevel NIV in this clinical context?", "options": ["A. PaCO₂ >40 mmHg regardless of pH", "B. pH ≤7.35 with PaCO₂ >45 mmHg", "C. PaO₂ <80 mmHg on room air", "D. pH <7.10 only", "E. Bicarbonate >30 mmol/L"], "correct": "B", "rationale": "Bilevel NIV is recommended for AECOPD with acute hypercapnic respiratory acidosis when pH ≤7.35 with PaCO₂ >45 mmHg. A pH <7.10 threshold (D) is too restrictive and would delay beneficial therapy. An elevated PaCO₂ alone without acidemia (A) does not necessarily indicate acute ventilatory failure requiring NIV. Hypoxemia criteria (C) and bicarbonate (E) are not the primary triggers for NIV initiation in this setting."}, {"id": "pre-06", "questionNumber": 6, "topicSlug": "ards", "topicTitle": "ARDS", "stem": "A 55-year-old woman with sepsis from pyelonephritis develops bilateral pulmonary opacities on chest radiograph, worsening hypoxemia requiring intubation, and a PaO₂/FiO₂ ratio of 90 on PEEP 10 cm H₂O. Echocardiogram shows normal LV function. According to the Berlin definition, what severity classification does this represent?", "options": ["A. Mild ARDS (PaO₂/FiO₂ 200–300)", "B. Moderate ARDS (PaO₂/FiO₂ 100–200)", "C. Severe ARDS (PaO₂/FiO₂ ≤100)", "D. Cardiogenic pulmonary edema", "E. Not ARDS because the cause is extrapulmonary"], "correct": "C", "rationale": "The Berlin criteria define severe ARDS as PaO₂/FiO₂ ≤100 with PEEP/CPAP ≥5 cm H₂O, bilateral opacities not fully explained by effusions or collapse, and respiratory failure not primarily from cardiac causes. A PaO₂/FiO₂ of 90 meets severe criteria. ARDS can result from both pulmonary and extrapulmonary insults (E is incorrect), and the normal echo excludes primary cardiogenic edema (D)."}, {"id": "pre-07", "questionNumber": 7, "topicSlug": "mechanical-ventilation", "topicTitle": "Mechanical Ventilation", "stem": "A 65-year-old man is mechanically ventilated for ARDS. His peak inspiratory pressure is 42 cm H₂O and plateau pressure is 24 cm H₂O. What does the discrepancy between peak and plateau pressures most likely indicate?", "options": ["A. Worsening alveolar compliance (e.g., pulmonary edema or atelectasis)", "B. Airway resistance problem (e.g., secretions, bronchospasm, or ETT kink)", "C. Pneumothorax", "D. Auto-PEEP from air trapping", "E. Ventilator malfunction requiring circuit replacement"], "correct": "B", "rationale": "A high peak pressure with a relatively normal plateau pressure indicates a resistance issue in the conducting airways (secretions, bronchospasm, tube kink, or biting). Compliance problems (A, C) elevate both peak and plateau pressures. Auto-PEEP (D) can contribute to elevated peak pressures but is specifically identified by incomplete expiratory flow, not simply a peak-plateau gap. Ventilator malfunction (E) is possible but far less likely than common airway resistance causes."}, {"id": "pre-08", "questionNumber": 8, "topicSlug": "hospital-acquired-and-ventilator-associated-pneumonia", "topicTitle": "Hospital-Acquired & Ventilator-Associated Pneumonia", "stem": "A 60-year-old woman on mechanical ventilation develops fever, purulent secretions, and a new infiltrate on hospital day 5. She is hemodynamically stable without shock. She has no prior MRSA colonization and has not received IV antibiotics in the past 90 days. According to ATS/IDSA HAP/VAP guidelines, which empiric antibiotic backbone is most appropriate?", "options": ["A. Azithromycin monotherapy", "B. Ceftriaxone plus azithromycin", "C. An antipseudomonal β-lactam (e.g., piperacillin-tazobactam)", "D. Vancomycin monotherapy", "E. Oral amoxicillin-clavulanate"], "correct": "C", "rationale": "HAP/VAP empiric therapy should cover S. aureus and gram-negative bacilli including Pseudomonas. An antipseudomonal β-lactam is the recommended backbone. MRSA coverage is added only when specific risk factors are present or the patient has septic shock. Azithromycin (A) and ceftriaxone-based CAP regimens (B) lack reliable antipseudomonal activity. Vancomycin alone (D) does not cover gram-negatives. Oral agents (E) are inappropriate for suspected VAP."}, {"id": "pre-09", "questionNumber": 9, "topicSlug": "pulmonary-embolism", "topicTitle": "Pulmonary Embolism", "stem": "A 58-year-old woman presents with sudden dyspnea and pleuritic chest pain. Her Wells score indicates intermediate clinical probability. D-dimer is elevated. CTPA confirms bilateral segmental pulmonary emboli. She is hemodynamically stable with BP 126/78 mmHg. Troponin is mildly elevated, and bedside echocardiography shows RV/LV ratio of 1.2. What risk category does this patient fall into?", "options": ["A. Low-risk PE", "B. Intermediate-low risk PE", "C. Intermediate-high risk PE", "D. High-risk (massive) PE", "E. Cannot be classified without right heart catheterization"], "correct": "C", "rationale": "Intermediate-high risk PE is defined by the presence of RV dysfunction (RV/LV ≥1.0 on echo or CTPA) plus elevated cardiac biomarkers (troponin) in a hemodynamically stable patient. High-risk (massive) PE (D) requires hemodynamic instability (SBP <90 mmHg or need for vasopressors). Low-risk (A) would have neither RV dysfunction nor biomarker elevation. Right heart catheterization (E) is not required for risk stratification in acute PE."}, {"id": "pre-10", "questionNumber": 10, "topicSlug": "pleural-effusion", "topicTitle": "Pleural Effusion", "stem": "A 70-year-old man with fever and cough has a moderate right pleural effusion. Diagnostic thoracentesis yields cloudy fluid with the following results: pleural fluid protein/serum protein ratio 0.65, pleural LDH/serum LDH ratio 0.72, and pleural LDH above two-thirds the upper limit of normal. How many of Light's criteria are met, and what does this indicate?", "options": ["A. Zero criteria met; this is a transudate", "B. One criterion met; borderline, likely transudate", "C. All three criteria met; this is an exudate", "D. Criteria cannot be applied without pleural fluid glucose", "E. Light's criteria require imaging confirmation before interpretation"], "correct": "C", "rationale": "Light's criteria classify a pleural effusion as exudative if any one of three criteria is met: pleural/serum protein ratio >0.5, pleural/serum LDH ratio >0.6, or pleural LDH >2/3 the serum upper limit. This patient meets all three. Glucose and imaging are useful for further characterization but are not part of Light's criteria themselves."}, {"id": "pre-11", "questionNumber": 11, "topicSlug": "pneumothorax", "topicTitle": "Pneumothorax", "stem": "A 25-year-old otherwise healthy man presents with sudden right-sided pleuritic chest pain. He is comfortable at rest with stable vitals and SpO₂ 96% on room air. Chest radiograph shows a small right apical pneumothorax. What is the most appropriate initial management?", "options": ["A. Immediate chest tube thoracostomy", "B. Emergent needle decompression", "C. High-flow oxygen and observation with repeat imaging", "D. CT chest with IV contrast", "E. Intubation and positive-pressure ventilation"], "correct": "C", "rationale": "Stable primary spontaneous pneumothorax with minimal symptoms and small size can be managed conservatively with supplemental oxygen and observation, with repeat imaging in 6–24 hours per BTS/ACCP guidance. Chest tube (A) and needle decompression (B) are reserved for larger, symptomatic, or hemodynamically unstable pneumothoraces. Positive-pressure ventilation (E) increases the risk of converting a simple pneumothorax into tension physiology."}, {"id": "pre-12", "questionNumber": 12, "topicSlug": "obstructive-sleep-apnea", "topicTitle": "Obstructive Sleep Apnea", "stem": "A 55-year-old man with known OSA (uses CPAP at home) is postoperative day 1 after abdominal surgery. Overnight he has intermittent oxygen desaturations to 83% with loud snoring and witnessed apneas that resolve when he is awakened and repositioned upright. He received IV hydromorphone 2 hours ago. What is the most appropriate immediate intervention?", "options": ["A. Increase oxygen to 15 L/min nonrebreather and continue opioids", "B. Apply the patient's home CPAP and reduce/hold opioid medications", "C. Start empiric antibiotics for hospital-acquired pneumonia", "D. Order a formal inpatient polysomnography tonight", "E. Administer IV furosemide for suspected pulmonary edema"], "correct": "B", "rationale": "The intermittent desaturation pattern with snoring and obstruction that resolves with arousal/repositioning is classic for OSA exacerbation, compounded by postoperative opioid use. Applying CPAP addresses airway obstruction, and reducing opioids removes a key contributor to hypoventilation. Perioperative OSA guidance emphasizes increased sensitivity to opioids/sedatives and the need for CPAP use when appropriate. Escalating oxygen alone (A) without addressing the obstruction does not fix the underlying problem and may mask hypoventilation."}, {"id": "pre-13", "questionNumber": 13, "topicSlug": "idiopathic-pulmonary-fibrosis", "topicTitle": "Idiopathic Pulmonary Fibrosis", "stem": "A 74-year-old man with known IPF presents with progressive dyspnea over 3 weeks. CT chest shows new bilateral ground-glass opacities superimposed on honeycombing. BNP is normal and echocardiogram shows no significant left heart dysfunction. According to the international working group definition, what is the typical time window for symptom worsening that characterizes an acute exacerbation of IPF?", "options": ["A. Within 1 week", "B. Within 1 month", "C. Within 3 months", "D. Within 6 months", "E. Any duration of worsening qualifies"], "correct": "B", "rationale": "The 2016 international working group defines acute exacerbation of IPF as an acute respiratory deterioration typically within 1 month, with new widespread alveolar abnormality on imaging, after excluding cardiac failure and fluid overload. A 1-week window (A) is too restrictive, while 3–6 months (C, D) would not qualify as 'acute' in this framework."}, {"id": "pre-14", "questionNumber": 14, "topicSlug": "sarcoidosis", "topicTitle": "Sarcoidosis", "stem": "A 44-year-old woman with known pulmonary sarcoidosis is admitted with confusion, weakness, and polyuria. Labs show corrected calcium of 14.2 mg/dL, suppressed PTH, and creatinine elevated above baseline. What is the primary mechanism of hypercalcemia in sarcoidosis?", "options": ["A. Primary hyperparathyroidism", "B. PTHrP secretion from malignant cells", "C. Increased extrarenal production of 1,25-dihydroxyvitamin D by granulomas", "D. Excessive dietary calcium intake", "E. Thiazide diuretic–induced calcium reabsorption"], "correct": "C", "rationale": "Sarcoidosis-related hypercalcemia is caused by granuloma-driven extrarenal production of 1,25-dihydroxyvitamin D (calcitriol), leading to increased intestinal calcium absorption and bone resorption. The suppressed PTH excludes primary hyperparathyroidism (A). PTHrP (B) is the mechanism in humoral hypercalcemia of malignancy, not granulomatous disease."}, {"id": "pre-15", "questionNumber": 15, "topicSlug": "tuberculosis", "topicTitle": "Tuberculosis", "stem": "A 50-year-old man is admitted with 6 weeks of cough, night sweats, and weight loss. Chest radiograph shows right upper lobe cavitary disease. He is hemodynamically stable with SpO₂ 94% on room air. What is the most important immediate infection control action?", "options": ["A. Place patient on contact precautions with gown and gloves", "B. Place patient in airborne infection isolation with N95/PAPR for staff", "C. Standard precautions only until culture results return", "D. Place patient on droplet precautions with a surgical mask for staff", "E. No isolation needed if the patient is not coughing at the time of assessment"], "correct": "B", "rationale": "Suspected contagious pulmonary TB requires immediate airborne precautions (negative-pressure room if available) with fit-tested N95 or PAPR respirators for staff and a surgical mask on the patient during transport. TB is transmitted via airborne nuclei, not large droplets (D) or contact (A). Waiting for culture results (C) delays critical infection control. Active coughing is not required for transmission (E)."}, {"id": "pre-16", "questionNumber": 16, "topicSlug": "bronchiectasis", "topicTitle": "Bronchiectasis", "stem": "A 66-year-old man with known bronchiectasis and prior sputum cultures growing Pseudomonas aeruginosa is hospitalized for an acute exacerbation with increased purulent sputum, fever, and hypoxemia. Which empiric antibiotic approach is most appropriate?", "options": ["A. Oral amoxicillin-clavulanate", "B. Oral azithromycin monotherapy", "C. IV antipseudomonal β-lactam (e.g., piperacillin-tazobactam)", "D. Inhaled tobramycin alone", "E. Withhold antibiotics until new culture results are available"], "correct": "C", "rationale": "Prior isolation of Pseudomonas aeruginosa is a key driver of empiric therapy choice in bronchiectasis exacerbations. A hospitalized patient with severe symptoms requires IV antipseudomonal coverage while cultures are pending. Oral agents (A, B) lack reliable antipseudomonal activity for inpatient-level disease. Inhaled antibiotics alone (D) are insufficient for acute systemic infection. Delaying antibiotics (E) is not recommended in a sick hospitalized patient."}, {"id": "pre-17", "questionNumber": 17, "topicSlug": "chronic-cough", "topicTitle": "Chronic Cough", "stem": "A 60-year-old man with heart failure reports a persistent dry cough for 3 months that is worse at night. He denies fever, sputum, wheeze, and heartburn. Chest radiograph is unremarkable. He started lisinopril 4 months ago. What is the most appropriate next step?", "options": ["A. Start pantoprazole for presumed GERD", "B. Start inhaled fluticasone for cough-variant asthma", "C. Discontinue lisinopril and switch to an angiotensin receptor blocker", "D. Order CT chest with contrast to evaluate for malignancy", "E. Start gabapentin for unexplained chronic cough"], "correct": "C", "rationale": "ACE inhibitor–associated cough is a common cause of chronic dry cough and should be addressed early by stopping the drug, with expected improvement often within 1–4 weeks. Stepwise chronic cough algorithms prioritize removing offending medications before pursuing empiric therapy for GERD (A), asthma (B), or neuromodulators (E). Advanced imaging (D) is premature when the CXR is normal and a likely medication cause exists."}, {"id": "pre-18", "questionNumber": 18, "topicSlug": "hypersensitivity-pneumonitis", "topicTitle": "Hypersensitivity Pneumonitis", "stem": "A 52-year-old man presents with dyspnea and nonproductive cough 2 days after cleaning a bird enclosure. CT chest shows diffuse ground-glass opacities with mosaic attenuation and air-trapping. According to the ATS/JRS/ALAT 2020 guideline, what two phenotypic categories are used to classify hypersensitivity pneumonitis?", "options": ["A. Acute and chronic", "B. Nonfibrotic and fibrotic", "C. Allergic and nonallergic", "D. Restrictive and obstructive", "E. Seropositive and seronegative"], "correct": "B", "rationale": "The ATS/JRS/ALAT 2020 guideline classifies HP as nonfibrotic versus fibrotic based on the presence of radiologic and/or histopathologic fibrosis, because fibrosis is the major prognostic divider and changes the diagnostic pathway. The older acute/subacute/chronic terminology (A) has been replaced by this binary classification in the current guideline."}, {"id": "pre-19", "questionNumber": 19, "topicSlug": "pneumoconioses-occupational-lung-disease", "topicTitle": "Pneumoconioses / Occupational Lung Disease", "stem": "A 48-year-old woman presents with progressive dyspnea and bilateral perihilar adenopathy on CT chest. She was previously diagnosed with sarcoidosis. On further questioning, she reports working in aerospace manufacturing with potential beryllium exposure. What diagnostic test is most important to differentiate chronic beryllium disease from sarcoidosis?", "options": ["A. Serum angiotensin-converting enzyme (ACE) level", "B. Beryllium lymphocyte proliferation testing (BeLPT)", "C. Serum total IgE level", "D. Tuberculin skin test", "E. Bronchoalveolar lavage cell count only"], "correct": "B", "rationale": "Chronic beryllium disease closely mimics sarcoidosis (granulomatous ILD with adenopathy). The ATS beryllium statement identifies BeLPT as the diagnostic cornerstone for confirming beryllium sensitization and chronic beryllium disease in exposed individuals. Serum ACE (A) is nonspecific and elevated in both conditions. IgE (C) and TST (D) do not distinguish these diagnoses."}, {"id": "pre-20", "questionNumber": 20, "topicSlug": "pulmonary-hypertension", "topicTitle": "Pulmonary Hypertension", "stem": "A 50-year-old woman with known pulmonary arterial hypertension develops acute dyspnea and hypotension overnight. Bedside echocardiography shows severe RV dilation with reduced function and septal bowing into the left ventricle. Lactate is 3.6 mmol/L. What is the most appropriate first-line vasopressor to support perfusion in this setting?", "options": ["A. Phenylephrine", "B. Vasopressin", "C. Norepinephrine", "D. Dopamine", "E. Epinephrine"], "correct": "C", "rationale": "In acute RV failure with shock from pulmonary hypertension, norepinephrine is the preferred first-line vasopressor to maintain MAP ≥65 mmHg and preserve RV coronary perfusion. Phenylephrine (A) increases PVR without inotropic support. The AHA scientific statement on right heart failure supports norepinephrine as the initial pressor, with inotropes (dobutamine or milrinone) added if low cardiac output persists."}]};
window.POSTTEST_DATA={"assessmentType": "posttest", "totalQuestions": 20, "questions": [{"id": "post-01", "questionNumber": 1, "topicSlug": "community-acquired-pneumonia", "topicTitle": "Community-Acquired Pneumonia", "stem": "A 74-year-old woman is admitted with CAP (left lower lobe infiltrate, fever, productive cough). She is hemodynamically stable on 2 L/min nasal cannula. Her ECG shows QTc of 535 ms; she takes methadone for chronic pain. She has no MRSA or Pseudomonas risk factors. The admitting team orders ceftriaxone plus azithromycin. What modification to the antibiotic regimen is most appropriate?", "options": ["A. Continue ceftriaxone plus azithromycin as ordered", "B. Switch to ceftriaxone plus doxycycline", "C. Switch to levofloxacin monotherapy", "D. Switch to piperacillin-tazobactam plus vancomycin", "E. Discontinue all antibiotics until QTc normalizes"], "correct": "B", "rationale": "Both macrolides and fluoroquinolones are QT-prolonging agents; in a patient already on methadone with a QTc of 535 ms, these carry significant arrhythmia risk. The ATS/IDSA guideline supports β-lactam plus doxycycline as an alternative that provides atypical coverage while avoiding QT prolongation. Broad-spectrum MRSA/antipseudomonal therapy (D) is not indicated without risk factors. Withholding antibiotics (E) is not appropriate for confirmed CAP."}, {"id": "post-02", "questionNumber": 2, "topicSlug": "copd", "topicTitle": "COPD", "stem": "A 73-year-old woman with COPD on home oxygen is hospitalized for an exacerbation. Overnight she becomes progressively somnolent. She is on a nonrebreather mask with SpO₂ 99%. RR is 18/min. VBG shows pH 7.24 and PCO₂ 78 mmHg. What is the best next step?", "options": ["A. Continue nonrebreather and give morphine for dyspnea", "B. Titrate oxygen to SpO₂ 88–92% and start bilevel NIV", "C. Increase oxygen flow to keep SpO₂ 100% and repeat VBG in 4 hours", "D. Give flumazenil empirically", "E. Administer IV sodium bicarbonate to correct the acidosis"], "correct": "B", "rationale": "This is the hyperoxia pitfall: SpO₂ 99% in a hypercapnia-prone patient can worsen CO₂ retention and acidosis. The correct approach is controlled oxygen targeting SpO₂ 88–92% plus bilevel NIV for acute respiratory acidosis (pH ≤7.35) to support ventilation and improve pH. Opioids (A) worsen respiratory drive, and bicarbonate (E) does not address the underlying ventilatory failure. The key decision-changer is recognizing that excess oxygen is driving the clinical deterioration."}, {"id": "post-03", "questionNumber": 3, "topicSlug": "asthma", "topicTitle": "Asthma", "stem": "A 52-year-old man with asthma is treated overnight with continuous nebulized albuterol and IV steroids. Two hours later, the nurse reports he is 'less wheezy' and appears drowsy. RR is 10/min with shallow breaths, SpO₂ 92% on 6 L/min. Breath sounds are markedly diminished bilaterally. ABG shows pH 7.28, PaCO₂ 58 mmHg. What is the best next step?", "options": ["A. Reassure the team that reduced wheezing indicates improvement", "B. Administer a benzodiazepine to reduce anxiety", "C. Escalate to ICU and prepare for intubation with a low-rate, long-expiratory-time strategy", "D. Stop albuterol because of tachycardia and switch to inhaled corticosteroid only", "E. Start empiric ceftriaxone and azithromycin for occult pneumonia"], "correct": "C", "rationale": "This is the 'silent chest' pitfall: drowsiness with rising PaCO₂ and diminished breath sounds indicates impending ventilatory failure, not improvement. The decrease in wheezing reflects inadequate airflow, not bronchodilation success. Intubation with a strategy to minimize dynamic hyperinflation (low rate, long expiratory time) is required. Benzodiazepines (B) can precipitate respiratory arrest in this setting."}, {"id": "post-04", "questionNumber": 4, "topicSlug": "acute-hypoxemic-respiratory-failure", "topicTitle": "Acute Hypoxemic Respiratory Failure", "stem": "A 71-year-old woman with severe COPD is admitted for pneumonia. Overnight she becomes more dyspneic on high-flow oxygen; SpO₂ rises to 99%. Thirty minutes later she is somnolent. VBG shows pH 7.26 with elevated CO₂. What is the best immediate oxygenation strategy?", "options": ["A. Maintain SpO₂ 98–100% to maximize oxygen delivery", "B. Stop oxygen completely because hyperoxia is harmful", "C. Titrate oxygen to SpO₂ 88–92% and obtain/monitor blood gases", "D. Switch to nonrebreather at 15 L/min to 'blow off' CO₂", "E. Delay oxygen changes until CT chest is completed"], "correct": "C", "rationale": "In patients at risk for hypercapnic respiratory failure, un-targeted high oxygen can drive CO₂ retention and depressed mental status. The correct approach is controlled titration to SpO₂ 88–92% with blood gas monitoring. Stopping oxygen entirely (B) risks dangerous hypoxemia. High-flow oxygen does not 'blow off' CO₂ (D); that requires ventilatory support. The key decision-changer is recognizing that excess oxygen is the iatrogenic driver of deterioration."}, {"id": "post-05", "questionNumber": 5, "topicSlug": "acute-hypercapnic-respiratory-failure", "topicTitle": "Acute Hypercapnic Respiratory Failure", "stem": "A 72-year-old woman with COPD presents with acute dyspnea and wheeze. RR 32/min, SpO₂ 90% on 2 L/min. ABG shows pH 7.18, PaCO₂ 82 mmHg. While preparing NIV, she becomes increasingly obtunded and has repeated vomiting into the mask during a brief trial. What is the best next step?", "options": ["A. Continue NIV and add a benzodiazepine to improve mask tolerance", "B. Switch to CPAP only and reassess ABG in 2 hours", "C. Administer high-flow oxygen to target SpO₂ 98–100%", "D. Proceed with endotracheal intubation for airway protection", "E. Administer IV sodium bicarbonate to raise pH above 7.25"], "correct": "D", "rationale": "This patient has a very low pH with severe hypercapnia and has developed functional contraindications to NIV: obtundation with aspiration risk (repeated vomiting). Continuing NIV (A) with sedation in this context risks catastrophic aspiration. The key decision-changer is the loss of airway protection ability, which overrides the usual preference for NIV and mandates intubation."}, {"id": "post-06", "questionNumber": 6, "topicSlug": "ards", "topicTitle": "ARDS", "stem": "A 45-year-old woman with influenza pneumonia and ARDS is ventilated at Vt 6 mL/kg PBW, RR 26, PEEP 10, FiO₂ 0.70, with plateau pressure 28 cm H₂O and SpO₂ 90%. She also has severe diabetic ketoacidosis with pH 7.05 and bicarbonate 8 mmol/L. The team wants to increase tidal volume to 10 mL/kg PBW to correct the severe acidosis. What is the best ventilator adjustment?", "options": ["A. Increase tidal volume to 10 mL/kg PBW to rapidly correct acidosis", "B. Increase respiratory rate while maintaining Vt 6 mL/kg PBW and plateau ≤30 cm H₂O", "C. Decrease respiratory rate to reduce auto-PEEP risk", "D. Switch to pressure control and maximize inspiratory pressure regardless of plateau", "E. Reduce PEEP to 5 cm H₂O to lower intrathoracic pressure"], "correct": "B", "rationale": "The pitfall is allowing severe metabolic acidosis to push abandonment of lung-protective ventilation. The correct approach preserves Vt 6 mL/kg PBW and plateau ≤30 cm H₂O while increasing minute ventilation primarily by raising respiratory rate (watching for auto-PEEP). This balances ARDS lung protection with the urgent need to mitigate life-threatening acidemia without causing volutrauma. The key decision-changer is the concurrent metabolic acidosis tempting you to use injuriously large tidal volumes."}, {"id": "post-07", "questionNumber": 7, "topicSlug": "mechanical-ventilation", "topicTitle": "Mechanical Ventilation", "stem": "A 70-year-old man with severe COPD is intubated for hypercapnic respiratory failure. Shortly after increasing the respiratory rate from 14 to 22 breaths/min, his blood pressure drops to 78/44 mmHg. Peak inspiratory pressure is 55 cm H₂O, plateau pressure is 26 cm H₂O, and the expiratory flow waveform does not return to baseline before the next breath. What is the best ventilator adjustment?", "options": ["A. Increase PEEP to 15 cm H₂O", "B. Increase tidal volume to improve minute ventilation", "C. Decrease respiratory rate and increase expiratory time to reduce auto-PEEP", "D. Perform a recruitment maneuver immediately", "E. Start prone positioning"], "correct": "C", "rationale": "The constellation of hypotension after RR increase, high peak with normal plateau pressure, and incomplete expiratory flow is classic auto-PEEP from dynamic hyperinflation. The correct fix is reducing minute ventilation demand and lengthening expiratory time (lower RR, adjust I:E ratio). Increasing PEEP (A) or recruitment (D) can worsen hyperinflation and shock. The key decision-changer is recognizing that the attempt to 'blow off CO₂' with a higher rate caused the hemodynamic collapse."}, {"id": "post-08", "questionNumber": 8, "topicSlug": "hospital-acquired-and-ventilator-associated-pneumonia", "topicTitle": "Hospital-Acquired & Ventilator-Associated Pneumonia", "stem": "A 72-year-old woman develops suspected HAP on hospital day 6 with new infiltrate and fever. She is hemodynamically stable. She has end-stage kidney disease on hemodialysis and reports an anaphylactic reaction to cefazolin. The local antibiogram shows substantial Pseudomonas prevalence on the unit. Which empiric regimen is the safest appropriate choice?", "options": ["A. Piperacillin-tazobactam plus tobramycin", "B. Cefepime monotherapy", "C. Aztreonam plus levofloxacin plus linezolid", "D. Meropenem monotherapy", "E. Vancomycin plus ceftriaxone"], "correct": "C", "rationale": "The two key pitfalls are severe β-lactam allergy (anaphylaxis to cefazolin) and ESRD. Aztreonam provides gram-negative coverage with minimal cross-reactivity in severe cephalosporin allergy. Adding a fluoroquinolone as a second antipseudomonal agent plus linezolid for MRSA coverage addresses the high-resistance unit ecology. Aminoglycosides (A) carry unacceptable nephro/ototoxicity risk in ESRD. Other β-lactams (B, D) carry cross-reactivity concerns with documented anaphylaxis. The decisive issue is the allergy history changing the entire antibiotic backbone."}, {"id": "post-09", "questionNumber": 9, "topicSlug": "pulmonary-embolism", "topicTitle": "Pulmonary Embolism", "stem": "A 70-year-old woman with eGFR 12 mL/min/1.73 m² (stage 5 CKD) presents with acute PE confirmed on CTPA. She is hemodynamically stable without active bleeding. The admitting team plans to start rivaroxaban. What is the best anticoagulation approach?", "options": ["A. Start rivaroxaban 15 mg twice daily", "B. Start apixaban 10 mg twice daily", "C. Start enoxaparin 1 mg/kg every 12 hours", "D. Start unfractionated heparin infusion with aPTT or anti-Xa monitoring", "E. Withhold anticoagulation and observe"], "correct": "D", "rationale": "Severe CKD (eGFR 12) is a critical pitfall for anticoagulant selection. DOACs and LMWH have dosing and accumulation concerns at very low eGFR, increasing bleeding risk. UFH infusion is preferred because it is not renally cleared and can be rapidly adjusted or reversed. The key decision-changer is the severe renal dysfunction making standard outpatient-style anticoagulation unsafe."}, {"id": "post-10", "questionNumber": 10, "topicSlug": "pleural-effusion", "topicTitle": "Pleural Effusion", "stem": "A 72-year-old woman with heart failure is admitted for volume overload and receives aggressive IV diuresis. On night float, a diagnostic thoracentesis of a moderate right effusion returns a pleural/serum protein ratio of 0.52 and pleural/serum LDH ratio of 0.62 (meeting exudative Light's criteria). She is afebrile and clinically improving with diuresis. What is the most appropriate interpretation and next step?", "options": ["A. Start empiric broad-spectrum antibiotics for pleural infection", "B. Order urgent pleuroscopy for suspected malignancy", "C. Recognize this as a likely diuretic-associated 'pseudoexudate' and reassess with clinical context and albumin gradient", "D. Begin therapeutic anticoagulation for presumed PE", "E. Place a chest tube because Light's criteria indicate an exudate"], "correct": "C", "rationale": "Aggressive diuresis can concentrate pleural fluid, causing a true transudative heart-failure effusion to narrowly satisfy Light's criteria ('pseudoexudate'). The clinical trajectory (bilateral effusions, improving with diuresis, afebrile) strongly favors heart failure. Using the serum–pleural albumin gradient (>1.2 g/dL supports transudate) helps avoid unnecessary invasive escalation. The key decision-changer is the clinical context of recent diuresis altering the biochemical classification."}, {"id": "post-11", "questionNumber": 11, "topicSlug": "pneumothorax", "topicTitle": "Pneumothorax", "stem": "A 68-year-old woman with severe COPD develops sudden dyspnea after central line placement. SpO₂ is 88% on 6 L/min nasal cannula, BP 92/58 mmHg, HR 112/min. CXR shows a moderate right pneumothorax. What is the best next step?", "options": ["A. Observation with repeat CXR in 6 hours", "B. Needle aspiration only", "C. Chest tube thoracostomy", "D. CT chest to assess exact size before deciding", "E. Discharge with outpatient follow-up"], "correct": "C", "rationale": "This is the pitfall of underestimating severity based on pneumothorax size alone. In secondary pneumothorax (COPD) with hypoxia and hypotension, the limited pulmonary reserve makes conservative management unsafe. Chest tube drainage is required regardless of apparent size. Observation (A) and imaging delays (D) risk rapid decompensation. The key decision-changer is the underlying COPD making any pneumothorax physiologically significant."}, {"id": "post-12", "questionNumber": 12, "topicSlug": "obstructive-sleep-apnea", "topicTitle": "Obstructive Sleep Apnea", "stem": "A 46-year-old woman with BMI 52 kg/m² is admitted for cellulitis. Overnight she becomes increasingly sleepy with sustained SpO₂ 86–88% on room air. On 6 L/min nasal cannula, SpO₂ rises to 96%, but she is more somnolent with RR 8/min. VBG shows pH 7.28 and PCO₂ 72 mmHg. Serum bicarbonate is 34 mmol/L. What is the best next step?", "options": ["A. Continue high-flow oxygen and recheck blood gas in the morning", "B. Start CPAP only without further evaluation", "C. Start noninvasive ventilation (BiPAP) and target SpO₂ 88–92%", "D. Administer sodium bicarbonate infusion to correct acidosis", "E. Give flumazenil empirically for presumed benzodiazepine intoxication"], "correct": "C", "rationale": "This is the OHS/hypercapnia pitfall: the elevated baseline bicarbonate (34 mmol/L) suggests chronic CO₂ retention, and oxygen administration worsened somnolence by removing hypoxic ventilatory drive. She needs ventilatory support with BiPAP (not just CPAP, because of significant hypercapnia) and controlled oxygen targeting SpO₂ 88–92%. The key decision-changer is recognizing that supplemental oxygen unmasked severe hypoventilation requiring bilevel support, not just obstruction relief."}, {"id": "post-13", "questionNumber": 13, "topicSlug": "idiopathic-pulmonary-fibrosis", "topicTitle": "Idiopathic Pulmonary Fibrosis", "stem": "A 68-year-old woman with IPF on home oxygen is admitted for dyspnea and is receiving bilevel NIV with SpO₂ 90%. She suddenly develops pleuritic chest pain and SpO₂ drops to 78% with increased work of breathing. Exam shows unilateral decreased breath sounds on the right. What is the best next step?", "options": ["A. Increase PEEP and inspiratory pressure to improve oxygenation", "B. Give IV methylprednisolone 1,000 mg for presumed acute exacerbation", "C. Order portable CXR immediately and prepare for needle decompression if unstable", "D. Start therapeutic heparin for presumed pulmonary embolism", "E. Administer large-volume IV fluids for possible sepsis"], "correct": "C", "rationale": "IPF patients on positive-pressure ventilation are at high risk for pneumothorax/barotrauma. Sudden pleuritic pain with unilateral breath-sound loss is the classic presentation. Increasing ventilator pressures (A) would worsen a tension pneumothorax. The key decision-changer is the acute unilateral exam finding on positive-pressure ventilation, which shifts the differential from AE-IPF to iatrogenic barotrauma requiring immediate imaging and decompression readiness."}, {"id": "post-14", "questionNumber": 14, "topicSlug": "sarcoidosis", "topicTitle": "Sarcoidosis", "stem": "A 58-year-old man with biopsy-proven sarcoidosis and end-stage kidney disease on hemodialysis (anuric) presents with lethargy and nausea. ECG shows shortened QT interval. Corrected calcium is 15.2 mg/dL with suppressed PTH. He has elevated JVP and is mildly dyspneic at baseline. What is the best immediate management?", "options": ["A. Aggressive 0.9% saline infusion at 250 mL/h", "B. IV pamidronate 90 mg", "C. IM calcitonin and arrange urgent hemodialysis", "D. Start prednisone 40 mg daily alone and reassess in 24 hours", "E. IV furosemide 80 mg for calciuresis"], "correct": "C", "rationale": "The key pitfall is severe hypercalcemia in an anuric ESRD patient with volume overload. Saline-driven calciuresis (A) is ineffective without renal function and will worsen volume overload. Furosemide (E) similarly requires functioning kidneys. Dialysis is the fastest definitive calcium removal strategy in this setting. Calcitonin provides rapid temporary lowering while dialysis is arranged. Glucocorticoids (D) address the calcitriol mechanism but work too slowly for dangerously high calcium levels as sole immediate therapy. The decision-changer is the anuric ESRD eliminating renal-dependent calcium elimination strategies."}, {"id": "post-15", "questionNumber": 15, "topicSlug": "tuberculosis", "topicTitle": "Tuberculosis", "stem": "A 63-year-old man with end-stage kidney disease on hemodialysis is diagnosed with drug-susceptible pulmonary TB based on positive sputum NAAT. The night team plans to start standard daily RIPE therapy. Which approach best addresses the key safety concern for this patient?", "options": ["A. Give full-dose daily pyrazinamide and ethambutol without adjustment", "B. Avoid pyridoxine because it reduces isoniazid efficacy", "C. Adjust renally cleared agents and coordinate dosing with dialysis sessions", "D. Use isoniazid monotherapy until susceptibilities return", "E. Delay treatment until the next outpatient dialysis session"], "correct": "C", "rationale": "Pyrazinamide and ethambutol require renal dosing adjustment in severe CKD/ESRD, and therapy should be coordinated with the TB program (often post-dialysis scheduling) to avoid drug accumulation and toxicity. Pyridoxine (B) is routinely co-prescribed with isoniazid to reduce neuropathy risk, not withheld. Isoniazid monotherapy (D) risks resistance selection. The key decision-changer is that 'standard dosing does not fit all' in ESRD—renal drug accumulation creates a serious safety hazard."}, {"id": "post-16", "questionNumber": 16, "topicSlug": "bronchiectasis", "topicTitle": "Bronchiectasis", "stem": "A 72-year-old woman with bronchiectasis and recurrent exacerbations is admitted and started on azithromycin and cefepime. Her telemetry shows frequent PVCs. ECG reveals QTc 520 ms. Potassium is 3.2 mmol/L and magnesium 1.5 mg/dL. She is hemodynamically stable. What is the best next step?", "options": ["A. Continue azithromycin and recheck ECG in the morning", "B. Stop azithromycin, aggressively replete potassium and magnesium, and select a non-macrolide alternative guided by prior cultures", "C. Add fluconazole to prevent fungal overgrowth", "D. Start chronic daily azithromycin for 12 months since she has frequent exacerbations", "E. Switch to inhaled corticosteroid therapy alone"], "correct": "B", "rationale": "QTc >500 ms with hypokalemia and hypomagnesemia creates significant torsades de pointes risk, and azithromycin is a contributing QT-prolonging agent. The immediate priorities are stopping the offending drug and correcting electrolytes while selecting alternative antibiotic coverage based on prior microbiology. Long-term macrolide therapy (D) is guideline-supported only after stabilization and safety screening, not during active dangerous QT prolongation. The decision-changer is the ECG finding transforming a 'standard' antibiotic into a high-risk medication."}, {"id": "post-17", "questionNumber": 17, "topicSlug": "chronic-cough", "topicTitle": "Chronic Cough", "stem": "A 45-year-old woman is admitted for pyelonephritis and reports an 11-week nonproductive cough that preceded admission. She denies heartburn and post-nasal drip. No wheeze is heard. SpO₂ is 97% on room air. Chest radiograph and spirometry (done last month) are both normal. Labs show eosinophils 0.7 × 10⁹/L (8%). What is the most appropriate treatment for her cough?", "options": ["A. Codeine-guaifenesin at bedtime", "B. Inhaled corticosteroid therapy", "C. Azithromycin for atypical pneumonia", "D. Proton pump inhibitor for 8 weeks", "E. No treatment indicated; reassure the patient"], "correct": "B", "rationale": "Nonasthmatic eosinophilic bronchitis causes chronic cough with normal spirometry and eosinophilic airway inflammation, and it typically responds to inhaled corticosteroids. The pitfall is dismissing steroid-responsive airway disease because spirometry is normal. The key decision-changer is the eosinophilia with a normal CXR and absent reflux/UACS features, pointing to eosinophilic bronchitis as the most likely etiology."}, {"id": "post-18", "questionNumber": 18, "topicSlug": "hypersensitivity-pneumonitis", "topicTitle": "Hypersensitivity Pneumonitis", "stem": "A 63-year-old woman with rheumatoid arthritis on methotrexate presents overnight with acute hypoxemia, diffuse ground-glass opacities, and new oxygen requirement of 10 L/min. Her family mentions a new home humidifier and water damage in the basement. She is febrile to 38.8°C, hypotensive with MAP 60 mmHg, and lactate is 3.8 mmol/L. You suspect HP but infection is also possible. What is the best next step?", "options": ["A. Start IV methylprednisolone immediately and withhold antibiotics", "B. Initiate broad-spectrum empiric antibiotics and stabilize in ICU-level care while pursuing HP workup and exposure cessation", "C. Discharge with prednisone taper and outpatient follow-up", "D. Obtain serum IgG precipitin testing and wait for results before treatment", "E. Begin diuresis with IV furosemide for presumed cardiogenic pulmonary edema"], "correct": "B", "rationale": "Shock physiology (MAP 60 mmHg, lactate 3.8 mmol/L) makes sepsis a cannot-miss diagnosis, especially in an immunosuppressed patient on methotrexate. Empiric antibiotics and ICU-level stabilization are indicated while exposure cessation and diagnostic evaluation proceed in parallel. The pitfall is anchoring on HP and giving high-dose steroids in an undifferentiated septic presentation, which can worsen outcomes if infection is present. The decision-changer is the hemodynamic instability mandating infection coverage before immunosuppressive treatment."}, {"id": "post-19", "questionNumber": 19, "topicSlug": "pneumoconioses-occupational-lung-disease", "topicTitle": "Pneumoconioses / Occupational Lung Disease", "stem": "A 54-year-old man who worked cutting engineered stone countertops for 15 years is admitted with cough, night sweats, weight loss, and hemoptysis. CXR shows upper-lobe nodular opacities with conglomerate mass-like fibrosis. SpO₂ is 90% on 4 L/min. The admitting team plans to start high-dose IV methylprednisolone for presumed ILD flare. What is the most appropriate next step instead?", "options": ["A. Start high-dose steroids as planned", "B. Begin diuretics for presumed cardiogenic pulmonary edema", "C. Place the patient in airborne isolation and obtain sputum AFB testing with NAAT", "D. Order D-dimer to screen for pulmonary embolism", "E. Defer all evaluation until daytime because findings are chronic"], "correct": "C", "rationale": "Silica exposure is a strong risk factor for TB, and the combination of upper-lobe cavitary/nodular disease with systemic symptoms (night sweats, weight loss, hemoptysis) makes active TB a cannot-miss diagnosis. Immediate airborne isolation and expedited microbiologic evaluation are the priority. Starting high-dose steroids (A) without excluding TB can worsen occult infection and delay diagnosis. The decision-changer is the occupational silica exposure history dramatically elevating TB risk in the context of compatible symptoms and imaging."}, {"id": "post-20", "questionNumber": 20, "topicSlug": "pulmonary-hypertension", "topicTitle": "Pulmonary Hypertension", "stem": "A 34-year-old man with idiopathic PAH on continuous IV epoprostenol is hospitalized for nausea. At 2 a.m. he becomes anxious and dyspneic with chest pressure. HR 140/min, BP 86/54 mmHg, SpO₂ 90% on 4 L/min. The nurse reports his infusion pump alarmed 'occlusion' 30 minutes ago and the line was temporarily stopped. Bedside echo shows marked RV dilation. What is the most appropriate next action?", "options": ["A. Hold epoprostenol until morning because vasodilators worsen hypotension", "B. Restart epoprostenol immediately at the prior dose while initiating vasopressor support and calling ICU/PH team", "C. Switch to oral sildenafil and observe", "D. Give a large fluid bolus and reassess before addressing the pump", "E. Administer IV furosemide and discontinue all PAH therapies"], "correct": "B", "rationale": "Abrupt interruption of continuous prostacyclin therapy causes rapid rebound pulmonary vasoconstriction, RV failure, and shock. Restarting the infusion immediately is the highest-priority intervention while supporting MAP ≥65 mmHg with vasopressors and escalating care. The confounder is the hypotension—it might seem logical to withhold a vasodilator—but the causal driver is the stopped infusion, not medication excess. Large fluid boluses (D) can worsen RV dilation. The decision-changer is identifying the interrupted prostacyclin as the reversible cause of acute decompensation."}]};

window.TOPIC_FILES={"community-acquired-pneumonia.md": "---\nfilename: community-acquired-pneumonia.md\nid: community-acquired-pneumonia\ntitle: Community-acquired pneumonia\nslug: community-acquired-pneumonia\ntags: [pulmonology, infectious-disease, pneumonia, antibiotics, sepsis, inpatient]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Community-acquired pneumonia\n\n## Panic Card (3–6 bullets)\n- Airway/breathing: apply oxygen to target **SpO₂ ≥92%** (or **88–92%** if COPD/CO₂ retention risk); escalate to **HFNC/NIV** if persistent distress or rising work of breathing\n- Circulation/sepsis: if **MAP <65 mmHg** or lactate elevated, give **balanced crystalloid 30 mL/kg** for septic shock physiology while reassessing (lung exam, ultrasound, IVC), then start **norepinephrine** to **MAP ≥65 mmHg** if hypotension persists\n- Antibiotics now: give empiric CAP antibiotics promptly; if septic shock, aim **within 1 hour** of recognition; do not delay for imaging if unstable\n- Immediate diagnostics: STAT **CXR**, **blood cultures x2** before antibiotics if feasible (do not delay therapy), CBC/CMP, lactate, ABG/VBG if hypoventilation concern; rapid viral testing if circulating\n- Red flags: call ICU for **new need for vasopressors**, **SpO₂ <90% on ≥6 L/min**, **altered mental status**, or rapidly increasing oxygen requirement\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Now: confirm the diagnosis and severity—CAP requires compatible symptoms plus new infiltrate on imaging; prioritize bedside assessment of **work of breathing**, **hemodynamics**, and **mental status** over “perfect” test completion when unstable\n- Guideline Must Know: use a validated prediction rule to support site-of-care decisions; ATS/IDSA preferentially recommends **PSI** to complement clinical judgment for inpatient vs outpatient, but escalate based on physiology even if the score is low\n- Guideline Must Know: define “severe CAP” by need for **vasopressors** and/or **mechanical ventilation** (major criteria) or multiple minor criteria; treat severe CAP as an ICU-pathway problem and broaden diagnostics early\n- Now: start empiric antibiotics based on severity and MDR risk, not “HCAP” labels; avoid reflexive broad-spectrum therapy unless clear risk factors for **MRSA**/**Pseudomonas** or severe CAP physiology\n- Guideline Must Know: for nonsevere inpatient CAP without MRSA/Pseudomonas risks, choose **β-lactam + macrolide** (e.g., **ceftriaxone 1–2 g IV daily + azithromycin 500 mg daily**) or **respiratory fluoroquinolone** monotherapy (e.g., **levofloxacin 750 mg daily**)\n- Guideline Must Know: for severe inpatient CAP without MRSA/Pseudomonas risks, use **β-lactam + macrolide** (preferred in many severe cases) or **β-lactam + respiratory fluoroquinolone**; ensure first doses are not delayed by bed placement\n- Guideline Must Know: add MRSA coverage only when validated risk is present (e.g., prior MRSA respiratory isolation or recent hospitalization with parenteral antibiotics plus local epidemiology); options include **vancomycin** (AUC-guided) or **linezolid 600 mg q12h**\n- Guideline Must Know: add antipseudomonal coverage only with risk factors (e.g., prior Pseudomonas respiratory isolation or recent hospitalization with parenteral antibiotics); choose an antipseudomonal β-lactam (e.g., **cefepime 2 g q8h** or **piperacillin-tazobactam 4.5 g q6h**) plus atypical coverage\n- What must happen now vs what can wait: Now—oxygenation/ventilatory support, hemodynamic resuscitation, antibiotics, cultures when feasible, CXR; Can wait—CT chest, extensive serologies, and most repeat imaging unless deterioration or alternative diagnosis suspected\n- Diagnostics to prioritize at night: check for **hypoxemia** and **hypercapnia** (ABG/VBG) if somnolence, COPD, or rising PaCO₂ suspected; obtain ECG if QT-prolonging antibiotics (macrolide/fluoroquinolone) are being considered\n- Culture/antigen strategy: obtain sputum culture if severe CAP, intubation, or MRSA/Pseudomonas risk; blood cultures are most useful in severe CAP or when empiric MRSA/Pseudomonas coverage is planned; consider urinary Legionella antigen when severe CAP or epidemiologic risk (travel, outbreaks) and influenza testing when circulating\n- Pitfall: aspiration is common, but routine “anaerobe coverage” is not recommended unless **lung abscess** or **empyema** is suspected; instead, treat per CAP pathways and reassess if imaging shows cavitation/loculated effusion\n- Pitfall: do not use procalcitonin (or any single biomarker) to withhold initial antibiotics when clinical CAP is suspected; use it, if at all, to support de-escalation alongside clinical stability and microbiology\n- De-escalation and duration: reassess at **48–72 hours** with cultures, MRSA nasal PCR (if used), and clinical trajectory; total antibiotic duration is typically **≥5 days** and until the patient is clinically stable (afebrile, improving oxygenation, stable vitals, able to take PO)\n- When to switch to oral: once hemodynamically stable, improving, and tolerating PO, transition to oral agents with adequate bioavailability; align regimen with identified pathogen and stop unnecessary double coverage\n- When to call consultants: ICU for escalating oxygen/vent support, shock, or severe criteria; ID for suspected unusual pathogens, immunocompromise, or persistent bacteremia; pulmonary for complicated effusions/empyema; cardiology if concurrent ACS/arrhythmia or antibiotic-QT risk is limiting options\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Need for **vasopressors** to maintain **MAP ≥65 mmHg** or lactate not clearing despite resuscitation\n- Respiratory failure: **SpO₂ <90%** despite **HFNC** or escalating oxygen, rising PaCO₂ with somnolence, or need for **NIV/IMV**\n- Rapid progression: new confusion, persistent **RR ≥30/min**, or worsening infiltrates with increasing oxygen requirement over hours\n- Complications: suspected empyema/loculated effusion, hemoptysis with instability, or recurrent ventricular arrhythmias/QT-related events limiting standard therapy\n\n## Orders to Place Now (3–6 bullets)\n- Order: Chest X-ray portable — {indication: suspected CAP, compare prior imaging}\n- Order: Blood cultures x2 — {two sites, before antibiotics if feasible without delaying}\n- Order: CBC with differential, CMP, lactate — {STAT; repeat lactate in 2–4 h if elevated}\n- Order: Respiratory viral PCR (or influenza/RSV) — {if community transmission; isolation precautions as indicated}\n- Order: Ceftriaxone — {dose: 2 g IV q24h; renal adjustment: none}\n- Order: Azithromycin — {dose: 500 mg IV/PO q24h; hold/alternative if QTc prolonged}\n\n## ABIM Style Question 1\n### Stem\nA 68-year-old man is admitted from the ED with fever, productive cough, and pleuritic chest pain. Chest radiograph shows a new right lower lobe infiltrate. Vitals: T 38.6°C, HR 104/min, BP 128/72 mmHg, RR 22/min, SpO₂ 92% on 2 L/min nasal cannula. He is alert and oriented. No prior MRSA or Pseudomonas history and no hospitalization with IV antibiotics in the past 90 days. Which empiric regimen is most appropriate?\n\n### Options\nA. Ceftriaxone alone\nB. Piperacillin-tazobactam plus vancomycin\nC. Levofloxacin plus clindamycin\nD. Ceftriaxone plus azithromycin\nE. Meropenem plus linezolid\n\n### Correct answer\nD\n\n### Rationale\nFor nonsevere inpatient CAP without MRSA or Pseudomonas risk factors, recommended empiric therapy is a **β-lactam plus macrolide** (or a respiratory fluoroquinolone alone). Ceftriaxone plus azithromycin provides pneumococcal and atypical coverage without unnecessary broad-spectrum anti-MRSA/antipseudomonal exposure. Broad-spectrum regimens are reserved for validated MRSA/Pseudomonas risk or severe CAP physiology.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 72-year-old woman with CAP is admitted to the floor. Chest radiograph shows a left lower lobe infiltrate. Vitals: T 38.2°C, HR 96/min, BP 134/78 mmHg, RR 20/min, SpO₂ 93% on 2 L/min. ECG shows QTc **540 ms**; she takes methadone for chronic pain. No MRSA/Pseudomonas risk factors. Which empiric regimen is best?\n\n### Options\nA. Ceftriaxone plus azithromycin\nB. Ceftriaxone plus doxycycline\nC. Levofloxacin monotherapy\nD. Azithromycin monotherapy\nE. Piperacillin-tazobactam plus vancomycin\n\n### Correct answer\nB\n\n### Rationale\nIn nonsevere inpatient CAP, a **β-lactam plus macrolide** is standard, but significant **QT prolongation** is a key pitfall because both macrolides and fluoroquinolones can further increase arrhythmia risk. An accepted alternative is **β-lactam plus doxycycline** to maintain atypical coverage while avoiding QT-prolonging agents. Broad-spectrum anti-MRSA/antipseudomonal therapy is not indicated without validated risk factors or severe physiology.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: In hospitalized adults with nonsevere CAP and no MRSA/Pseudomonas risk factors, what are two first-line empiric regimen options? A: A β-lactam plus a macrolide, or a respiratory fluorooroquinolone as monotherapy.\n- Q: What is the usual minimum duration of antibiotic therapy for CAP when the patient achieves clinical stability? A: **At least 5 days** total, continued until clinical stability is met.\n- Q: When is routine anaerobic coverage recommended for suspected aspiration in CAP? A: Only when **lung abscess** or **empyema** is suspected; otherwise it is not routinely recommended.\n- Q: Name one validated risk factor that supports empiric MRSA or Pseudomonas coverage in CAP. A: Prior respiratory isolation of MRSA or Pseudomonas, or recent hospitalization with parenteral antibiotics plus concern for those pathogens.\n\n## Guidelines & Key References (3–5 bullets)\n- ATS/IDSA Clinical Practice Guideline for Adult CAP (2019) (full PDF): https://www.atsjournals.org/doi/pdf/10.1164/rccm.201908-1581st\n- IDSA CAP in Adults Guideline page (2019; updated resources listed by IDSA): https://www.idsociety.org/practice-guideline/community-acquired-pneumonia-cap-in-adults/\n- ATS/IDSA Executive Summary PDF (2019): https://www.idsociety.org/globalassets/idsa/practice-guidelines/community-acquired-pneumonia-in-adults/executive_summary.pdf\n- ATS Guideline Implementation Tools for CAP (2019): https://www.thoracic.org/statements/guideline-implementation-tools/diagnosis-and-treatment-of-cap.php\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Community-acquired pneumonia, {suspected bacterial/viral/mixed}, present on admission; evidence: {CXR/CT infiltrate, fever, WBC, sputum characteristics}; treatment: {agent(s), start time}\n- Acute hypoxemic respiratory failure due to pneumonia; criteria: {SpO₂, PaO₂ if available}; support: {oxygen device and flow/HFNC/NIV}; trajectory: {improving/worsening}\n- Sepsis due to pneumonia, present on admission; organ dysfunction: {lactate, creatinine, altered mentation, hypotension}; interventions: {fluids mL/kg, cultures, antibiotics time}\n- Septic shock due to pneumonia; criteria: {MAP, vasopressor requirement, lactate}; pressor: {norepinephrine dose}; monitoring: {arterial line/ICU transfer}\n", "copd.md": "---\nfilename: COPD.md\nid: copd\ntitle: COPD\nslug: copd\ntags: [pulmonology, copd, night-float]\nlevel: resident\nestimated_time_min: 15\nversion: 2026-03-02\nsource: IM_NightFloat_Engine\n---\n\n# COPD\n\n## Panic Card (3–6 bullets)\n- Airway/breathing first: sit upright, continuous pulse ox, cardiac monitor; titrate oxygen to **SpO₂ 88–92%** (avoid hyperoxia).\n- Give bronchodilators now: **albuterol 2.5–5 mg neb q20 min x3** (or continuous) + **ipratropium 0.5 mg neb q20 min x3**, then q4–6h.\n- Give systemic steroid early: **prednisone 40 mg PO daily x5 days** (or **methylprednisolone 40 mg IV** if cannot take PO).\n- Check ventilation: obtain **VBG/ABG within 30–60 min** if dyspneic, somnolent, or rising O₂ needs; look for **pH ≤7.35** and **PaCO₂ >45 mmHg**.\n- Start bilevel NIV if acute hypercapnic respiratory failure: **pH ≤7.35** with distress; typical start **IPAP 10–15 / EPAP 4–5**, titrate to reduce work of breathing and improve pH.\n- Confirm Before Proceed: if considering intubation, ensure reversible causes addressed (bronchodilators, NIV trial when appropriate) and clarify goals of care; prepare for difficult ventilation and dynamic hyperinflation.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- This module focuses on acute exacerbation of COPD (AECOPD) on nights: increased dyspnea, cough, and/or sputum with need for additional therapy; your priorities are oxygenation targets, ventilation status (hypercapnia/acidosis), and identifying triggers (infection, CHF, PE, pneumothorax, medication/sedative effects).\n- Separate “must happen now” vs “can wait”: now = titrated oxygen **SpO₂ 88–92%**, bronchodilators, steroids, VBG/ABG if concern for CO₂ retention, early NIV when indicated; later = confirm baseline spirometry history, inhaler optimization, smoking cessation, pulmonary rehab planning.\n- **Guideline Must Know:** Controlled oxygen is therapy: for COPD or any hypercapnia-risk patient, target **SpO₂ 88–92%** pending blood gas, because liberal oxygen can worsen hypercapnia and acidosis.\n- **Guideline Must Know:** Obtain ABG/VBG early if any of the following: **altered mental status**, escalating O₂ requirement, severe dyspnea with accessory muscle use, inability to speak full sentences, or suspected hypercapnia; reassess after interventions to ensure pH is improving.\n- **Guideline Must Know:** NIV (bilevel) is first-line ventilatory support for AECOPD with acute respiratory acidosis: consider when **pH ≤7.35** with **PaCO₂ >45 mmHg** and tachypnea **>20–24/min** despite standard therapy; it reduces intubation and mortality when used appropriately.\n- **Guideline Must Know:** There is no absolute lower pH cutoff that forbids an NIV trial, but failure risk rises as pH falls; NIV requires close monitoring and rapid readiness to intubate if not improving within **1–2 hours** or if the patient deteriorates.\n- **Guideline Must Know:** Systemic steroids shorten recovery and reduce treatment failure: typical inpatient regimen is **prednisone 40 mg daily for 5 days** (no taper for this short course in most patients); watch for hyperglycemia, delirium, and fluid retention.\n- **Guideline Must Know:** Antibiotics are not automatic for all AECOPD; treat when bacterial features are present (e.g., increased sputum purulence with increased volume and/or dyspnea) or when ventilatory support is required; choose agent based on severity and risk factors for resistant organisms.\n- **Guideline Must Know:** Bronchodilators should be delivered effectively: short-acting beta-agonist plus anticholinergic (neb or MDI with spacer) on a schedule, then de-escalate as work of breathing improves; reassess for tremor, tachycardia, and hypokalemia.\n- Practical “what must happen now” workflow: (1) titrate oxygen to **88–92%**, (2) start duonebs and steroids, (3) get CXR and ECG, (4) send VBG/ABG and basic labs, (5) if acidotic hypercapnia, start NIV and repeat gas within **60–120 min** to confirm improving pH/PaCO₂.\n- Identify common triggers that change management overnight: pneumonia (fever, focal infiltrate), cardiogenic pulmonary edema (S3, edema, BNP trend, CXR vascular congestion), PE (pleuritic pain, disproportionate tachycardia/hypoxemia), pneumothorax (sudden unilateral decreased breath sounds), and medication-related hypoventilation (opioids/benzodiazepines).\n- Pitfall: treating “dyspnea” with excessive oxygen or sedatives. In COPD, worsening somnolence with high SpO₂ can signal rising CO₂; respond by titrating oxygen down to **88–92%**, checking a blood gas, and supporting ventilation (NIV) rather than escalating FiO₂ alone.\n- NIV practicalities on the floor: start with **IPAP 10–15** and **EPAP 4–5**, increase IPAP by 2–3 to reduce RR and dyspnea; ensure mask fit, manage secretions, and consider brief coaching/targeted anxiolysis only with extreme caution (avoid respiratory depression).\n- When NIV fails (or is contraindicated): inability to protect airway, copious secretions, facial trauma, severe agitation preventing mask tolerance, vomiting/aspiration risk, or hemodynamic instability. Failure signs include worsening mental status, persistent **pH ≤7.25** or rising PaCO₂ despite optimization, refractory hypoxemia, or exhaustion.\n- “What can wait” (but don’t forget): reconcile home inhalers and continue long-acting bronchodilators when stable; evaluate for chronic hypercapnia and OSA overlap; ensure VTE prophylaxis unless contraindicated; plan smoking cessation counseling and vaccination updates when acute crisis resolves.\n- Consult strategy overnight: respiratory therapy early for NIV setup and bronchodilator delivery; ICU consult early if severe acidosis, escalating support, or concerning trajectory; consider cardiology/medicine consult path if CHF features dominate; ID guidance if frequent exacerbations with resistant organisms.\n- Disposition thinking: mild exacerbations without acidosis and improving after initial therapy may stay on ward; any AECOPD requiring NIV, with **pH ≤7.30**, or with recurrent hypercapnic encephalopathy is high risk for ICU-level monitoring.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Persistent or worsening ventilatory failure: **pH ≤7.25**, rising PaCO₂, or no clinical/gas improvement after **1–2 hours** of optimized NIV and bronchodilators.\n- Impending respiratory arrest: **silent chest**, severe fatigue/exhaustion, inability to speak, or declining mental status suggesting hypercapnic encephalopathy.\n- Escalating oxygen/vent support: need for **FiO₂ >0.60**, refractory hypoxemia, or inability to maintain **SpO₂ 88–92%** without increasing work of breathing.\n- Hemodynamic instability or arrhythmia: **MAP <65 mmHg**, new ischemia, or unstable tachyarrhythmia complicating respiratory management.\n- Suspected alternate high-risk diagnosis requiring emergent action: pneumothorax, massive PE, STEMI, or severe pneumonia/sepsis with shock.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Oxygen therapy, titrated — {device, target SpO₂ 88–92%, wean as tolerated}\n- Order: Ipratropium-albuterol nebulizer — {dose 0.5 mg/2.5 mg, frequency q20 min x3 then q4–6h}\n- Order: Albuterol nebulizer (prn or continuous) — {dose 2.5–5 mg, frequency q2–4h prn or continuous per severity}\n- Order: Systemic glucocorticoid — {prednisone 40 mg PO daily x5 days OR methylprednisolone 40 mg IV daily if NPO}\n- Order: Blood gas (VBG or ABG) — {now and repeat in 60–120 min if hypercapnia/acidosis or on NIV}\n- Order: Noninvasive ventilation (BiPAP) — {initial IPAP 10–15, EPAP 4–5, titrate to RR/work of breathing and improving pH; mask type and break schedule}\n\n## ABIM Style Question 1\n### Stem\nA 67-year-old man with severe COPD is admitted for worsening dyspnea and wheezing. On exam he is using accessory muscles and speaking in short phrases. Vitals: T 37.1°C, HR 112, RR 30, BP 148/84, SpO₂ 86% on room air. After controlled oxygen to SpO₂ 90% and three back-to-back albuterol/ipratropium nebulizations, a VBG shows pH 7.28 and PCO₂ 68 mmHg. Chest radiograph shows hyperinflation without focal infiltrate. What is the next best step?\n### Options\nA. Administer high-flow oxygen to increase SpO₂ to 98%\nB. Give intravenous furosemide and start a nitroglycerin infusion\nC. Start empiric ceftriaxone plus azithromycin and reassess in 6 hours\nD. Initiate bilevel noninvasive ventilation (BiPAP)\nE. Intubate immediately without a trial of noninvasive ventilation\n### Correct answer\nD\n### Rationale (2–4 sentences)\nAcute hypercapnic respiratory failure with **pH ≤7.35** in AECOPD is an indication for bilevel NIV, which reduces intubation and mortality when promptly applied and monitored. High-flow oxygen to supranormal saturations risks worsening CO₂ retention; antibiotics may be appropriate if bacterial features exist but do not address acute ventilatory failure. Intubation is reserved for immediate deterioration or NIV failure, not as the first step in a patient who can undergo a monitored NIV trial.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 72-year-old woman with COPD on home oxygen is hospitalized for an exacerbation. Overnight she becomes progressively somnolent. She is on a nonrebreather mask with SpO₂ 99%. Vitals: HR 96, RR 18, BP 136/72. Breath sounds are diminished with scattered wheezes. A VBG returns pH 7.24 and PCO₂ 78 mmHg. What is the best next step?\n### Options\nA. Continue the nonrebreather and give morphine for dyspnea\nB. Titrate oxygen to a target SpO₂ 88–92% and start bilevel noninvasive ventilation\nC. Increase oxygen flow to keep SpO₂ at 100% and repeat VBG in 4 hours\nD. Give flumazenil empirically and observe\nE. Administer sodium bicarbonate infusion to correct the acidosis\n### Correct answer\nB\n### Rationale (2–4 sentences)\nThe pitfall is hyperoxia in a hypercapnia-prone patient: an SpO₂ of **99%** can worsen CO₂ retention and acidosis. The correct approach is controlled oxygen targeting **SpO₂ 88–92%** plus bilevel NIV for acute respiratory acidosis (**pH ≤7.35**) to support ventilation and improve pH. Opioids and bicarbonate can worsen ventilation or do not address the underlying ventilatory failure.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: In AECOPD with risk of hypercapnia, what oxygen saturation target should you order while awaiting a blood gas?\n  A: Target **SpO₂ 88–92%** pending ABG/VBG results.\n- Q: What blood gas threshold supports starting bilevel NIV in an AECOPD patient with hypercapnia?\n  A: **pH ≤7.35** with elevated CO₂ (e.g., **PaCO₂ >45 mmHg**) in the appropriate clinical context.\n- Q: What is the typical systemic steroid regimen for hospitalized AECOPD without contraindications?\n  A: **Prednisone 40 mg PO daily for 5 days** (or equivalent dose IV if unable to take PO).\n- Q: After starting NIV for AECOPD with acidosis, when should you recheck a blood gas to confirm response?\n  A: Recheck in **60–120 minutes** to verify improving pH and CO₂ and decreasing work of breathing.\n\n## Guidelines & Key References (3–5 bullets)\n- Global Initiative for Chronic Obstructive Lung Disease (GOLD). Global Strategy for Prevention, Diagnosis and Management of COPD: 2026 Report. https://goldcopd.org/2026-gold-report-and-pocket-guide/\n- Rochwerg B, et al. ERS/ATS Clinical Practice Guideline: Noninvasive Ventilation for Acute Respiratory Failure. 2017. https://www.thoracic.org/statements/resources/cc/niv-guidelines.pdf\n- British Thoracic Society. BTS Guideline for Oxygen Use in Adults in Healthcare and Emergency Settings. 2017. https://thorax.bmj.com/content/thoraxjnl/72/Suppl_1/ii1.full.pdf\n- ATS/IDSA. Diagnosis and Treatment of Adults with Community-acquired Pneumonia. 2019. https://www.idsociety.org/practice-guideline/community-acquired-pneumonia-cap-in-adults/\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute COPD exacerbation — {trigger suspected: infection/aspiration/CHF/unknown} — {symptoms: increased dyspnea/sputum/wheeze} — {objective: RR, accessory muscle use, peak flow if available} — {treatment: bronchodilators, steroids}\n- Acute on chronic hypercapnic respiratory failure — {ABG/VBG pH, PaCO₂/PCO₂} — {encephalopathy/mental status change} — {ventilatory support: NIV settings, response on repeat gas}\n- Hypoxemic respiratory failure (if present) — {SpO₂ on room air and on O₂, device/FiO₂} — {target range ordered: 88–92%} — {CXR findings} — {need for escalation: NIV/ICU consult}\n- Suspected bacterial respiratory infection (if treated) — {sputum purulence/fever/leukocytosis/CXR infiltrate} — {antibiotics started, duration plan} — {cultures/viral testing ordered if applicable}\n", "asthma.md": "---\nfilename: asthma.md\nid: asthma\ntitle: Asthma\nslug: asthma\ntags: [pulmonology, asthma, status-asthmaticus, respiratory-failure, inpatient, night-float]\nlevel: resident\nestimatedtimemin: 12\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Asthma\n\n## Panic Card (3–6 bullets)\n- Assess ABCs now; place on continuous pulse oximetry and give oxygen to **SpO₂ ≥93%** (titrate; avoid delaying bronchodilators).\n- Start bronchodilators immediately: **albuterol 2.5–5 mg neb q20 min x3** (or continuous **10–15 mg/h**) plus **ipratropium 0.5 mg neb q20 min x3** for severe exacerbation.\n- Give systemic steroids early (do not wait for response): **prednisone 40–60 mg PO** or **methylprednisolone 60–125 mg IV** now.\n- If severe/persistent distress: **magnesium sulfate 2 g IV over 20 min** (especially if **PEF/FEV₁ <25–30%** predicted or poor response) and reassess every 15–30 min.\n- Red flags for impending failure: **silent chest**, exhaustion, altered mental status, **rising PaCO₂/normalizing PaCO₂**, hypotension; prepare ICU and airway plan with lung-protective/low-rate strategy if intubating.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Night-float frame: treat first, measure in parallel—severity is clinical (work of breathing, speech, accessory muscle use, mental status) plus objective response (PEF/FEV₁ if able, oxygen requirement); do not be reassured by less wheeze if the patient is tiring.\n- Now: give repeated/continuous SABA and early systemic steroids; Can wait: detailed trigger hunt (viral vs allergen vs nonadherence, NSAIDs, beta-blocker exposure) once breathing stabilizes and trajectory is clear.\n- Guideline Must Know: For acute severe exacerbations, **inhaled SABA is first-line**; use frequent back-to-back treatments or continuous nebulization for severe obstruction, with objective reassessment after initial hour (GINA 2024).\n- Guideline Must Know: Add **ipratropium** to SABA in **moderate-to-severe** exacerbations to reduce hospitalization risk; typical
